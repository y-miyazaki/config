name: github-mcp
version: 1.0.0
description: GitHub MCP server via Copilot endpoint with mcp-compressor
author: y-miyazaki
license: Apache-2.0

dependencies:
  apm: []
  mcp:
    - name: github
      registry: false
      transport: stdio
      command: bash
      args:
        [
          "-lc",
          'TOKEN="$GH_TOKEN"; if [ -z "$TOKEN" ]; then TOKEN="$GITHUB_TOKEN"; fi; uvx mcp-compressor==0.19.8 -- uvx mcp-proxy==0.12.0 --transport streamablehttp -H Authorization "Bearer $TOKEN" https://api.githubcopilot.com/mcp/',
        ]
