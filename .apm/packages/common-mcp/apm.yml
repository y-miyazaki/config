name: common-mcp
version: 1.0.0
description: Common MCP servers (Context7, GitHub, Playwright, Fetch)
author: y-miyazaki
license: Apache-2.0
includes: auto

dependencies:
  apm: []
  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: npx
      args: ["-y", "@upstash/context7-mcp@2.2.5"]
    - name: github
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-compressor==0.15.0", "-c", "medium", "https://api.githubcopilot.com/mcp/", "--server-name", "github"]
    - name: playwright
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-compressor==0.15.0", "-c", "medium", "--", "npx", "-y", "@playwright/mcp@0.0.75"]
    - name: fetch
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-server-fetch==2025.4.7"]
