name: refactor-eval
description: >-
  Evaluation suite for refactor.
  Verifies session report sections, O1/O2 scope language, and no-op exits.
skill: refactor
version: "1.0"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'Session Metrics' in output"
        - "'Target' in output"
        - "'Applied Change' in output or 'no-op' in output or 'Watch' in output"
  - type: text
    name: report_sections
    weight: 0.5
    config:
      regex_match:
        - (Target|Applied Change|Session Metrics)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml

