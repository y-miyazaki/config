id: refactor-noop-001
name: refactor emits no-op when input empty
description: Verify refactor stops with full session report when nothing actionable.
tags:
  - quality
  - no-op
inputs:
  prompt: >-
    Use refactor. No paths or symbols. Emit the full Refactor Session Report per
    common-output-format: all ## sections including ## Target (path/symbol None or
    N/A; tier none), ## Applied Change (None), ## Characterization / Gates,
    ## Watch Items, and ## Session Metrics table with Outcome no-op. Do not edit
    files in this mock eval.
expected:
  output_contains:
    - "## Target"
    - Target
    - "Outcome"
    - no-op
    - Session Metrics
    - Applied Change
  outcomes:
    - type: task_completed
