id: refactor-loop-l1-001
name: refactor loop path L1 report only
description: Validate loop path emits session report without edits at L1.
tags:
  - quality
  - loop-path
  - output-contract
inputs:
  prompt: >-
    Use refactor (loop path) at L1. Context JSON has one duplication_block hint.
    Do not edit files. Emit Refactor Session Report per common-output-format-loop.md
    with Target, Applied Change, Session Metrics Level L1, plus ## Overview and
    ## Summary for PR.
  context:
    commit_range: eval0001..eval0002
    level: L1
    skip: false
    hints:
      - kind: duplication_block
        path: scripts/example.sh
        detail: lines 10-17 duplicate scripts/other.sh:40-47
        lines: 8
expected:
  output_contains:
    - Refactor Session Report
    - duplication_block
    - Session Metrics
    - "## Overview"
    - "## Summary"
  outcomes:
    - type: task_completed
