id: docs-updater-loop-classification-001
name: docs-updater loop path classifies injected findings
description: Validate findings classify into Candidates and Watch at L1.
tags:
  - quality
  - loop-path
  - classification
inputs:
  prompt: >-
    Use docs-updater (loop path) at L1. Classify injected findings: missing required
    README section is a Candidate; slightly outdated version is Watch. Emit survey
    shape with ## Overview, ### Candidates, ### Watch, and Session Metrics. Do not
    edit files. Do not emit ## Verification or ### Changes.
  context:
    commit_range: eval0001..eval0002
    level: L1
    skip: false
    findings:
      - file: docs/README.md
        reason: missing required installation section
        source_commit: eval0002
      - file: docs/guide/overview.md
        reason: version number slightly outdated
        source_commit: eval0002
expected:
  output_contains:
    - Candidates
    - Watch
    - Overview
  outcomes:
    - type: task_completed
