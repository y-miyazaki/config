id: docs-updater-rename-001
name: docs-updater rename detection
description: Validate renamed files surface documentation path updates under Candidates.
tags:
  - quality
  - rename-path
  - edge-case
inputs:
  prompt: >-
    Use docs-updater. Git detected a rename from '.github/workflows/ci-build.yaml' to
    '.github/workflows/ci-build-deploy.yaml'. Survey which documentation files need path
    updates (including mkdocs.yml nav when applicable). Emit ## Overview and ## Summary
    with ### Candidates per common-output-format.md. Do not edit files. State no edits
    applied in Overview.
  context:
    scope: staged
    skip: false
    renamed_files:
      - from: .github/workflows/ci-build.yaml
        to: .github/workflows/ci-build-deploy.yaml
    affected_docs:
      - docs/guide/overview.md
      - mkdocs.yml
expected:
  output_contains:
    - "## Overview"
    - "### Candidates"
    - ci-build-deploy
    - no edits applied
  outcomes:
    - type: task_completed
