id: changelog-l1-001
name: changelog L1 emits survey without editing changelog
description: Validate L1 lists commit Candidates in survey shape without file edits.
tags:
  - quality
  - level
inputs:
  prompt: >-
    Use changelog at L1. List the injected feat commit under ###
    Candidates in survey shape. Do not edit CHANGELOG.md. Do not emit ##
    Verification or ### Changes.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: true
    commit_range: eval0001..eval0002
    level: L1
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add changelog workflow
expected:
  output_contains:
    - Candidates
    - Overview
    - L1
  outcomes:
    - type: task_completed
