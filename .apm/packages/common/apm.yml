name: config-common
version: 1.0.0
description: Common AI assistant instructions and skills for shared workflows
author: y-miyazaki
license: Apache-2.0
target: all
includes: auto

dependencies:
  apm: []
  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: npx
      args: ["-y", "@upstash/context7-mcp@2.2.5"]
    - name: fetch
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-server-fetch==2025.4.7"]
    - name: github
      registry: false
      transport: stdio
      command: bash
      args:
        [
          "-lc",
          'TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"; exec uvx mcp-compressor==0.31.5 -- https://api.githubcopilot.com/mcp/ -H "Authorization=Bearer ${TOKEN}" --auth explicit-headers',
        ]
    - name: codebase-memory-mcp
      registry: false
      transport: stdio
      command: codebase-memory-mcp
      args: []
    - name: lean-ctx
      registry: false
      transport: stdio
      command: npx
      args: ["-y", "lean-ctx-bin"]
