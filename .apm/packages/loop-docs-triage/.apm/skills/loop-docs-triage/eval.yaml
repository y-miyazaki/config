name: loop-docs-triage-eval
description: "Evaluation suite for loop-docs-triage.

  Verifies skill produces structured triage report and respects path constraints.

  "
skill: loop-docs-triage
version: "1.0"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'High-Priority' in output or 'Watch' in output"
  - type: text
    name: triage_sections
    weight: 0.5
    config:
      regex_match:
        - (High-Priority|Watch)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml
