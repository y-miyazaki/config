id: loop-docs-triage-noaction-001
name: loop-docs-triage handles empty findings
description: Validate loop-docs-triage defines behavior for no actionable items.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use loop-docs-triage. Context has skip=true and findings=[]. Emit the full
    four-section report with High-Priority, Watch, Noise / Ignore, and Summary.
    Outcome must indicate No documentation impact detected. Do not edit files.
  context:
    skip: true
    findings: []
expected:
  output_contains:
    - No documentation impact detected
    - High-Priority
    - Watch
  outcomes:
    - type: task_completed
