id: loop-docs-triage-classification-001
name: loop-docs-triage classifies injected findings
description: Validate findings classify into High-Priority and Watch from context.
tags:
  - quality
  - classification
inputs:
  prompt: >-
    Use loop-docs-triage. Classify injected findings: missing required README
    section is High-Priority; slightly outdated version is Watch. Emit all four
    report sections. Emit PR ## Overview and ## Summary plus Session Metrics table with High-Priority Items, Watch Items, and Noise / Ignore sections.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: docs/README.md
        reason: missing required installation section
        source_commit: eval0002
      - file: docs/guide/overview.md
        reason: version number slightly outdated
        source_commit: eval0002
expected:
  output_contains:
    - High-Priority
    - Watch
    - Summary
  outcomes:
    - type: task_completed
