name: config-aws
version: 1.0.0
description: AI assistant instructions and MCP servers for AWS development
author: y-miyazaki
license: Apache-2.0
target: all
includes: auto

dependencies:
  apm: []
  mcp:
    - name: aws-mcp
      registry: false
      transport: stdio
      command: uvx
      args:
        [
          "mcp-compressor==0.19.8",
          "--",
          "uvx",
          "mcp-proxy-for-aws==1.4.2",
          "https://aws-mcp.us-east-1.api.aws/mcp",
        ]
    - name: aws-knowledge-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args:
        [
          "mcp-compressor==0.19.8",
          "--",
          "uvx",
          "mcp-proxy==0.12.0",
          "--transport",
          "streamablehttp",
          "https://knowledge-mcp.global.api.aws",
        ]
    - name: aws-documentation-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-documentation-mcp-server==1.1.24"]
    - name: aws-pricing-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-pricing-mcp-server==1.0.30"]
    - name: awslabs-aws-api-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-api-mcp-server==1.3.36"]
      env:
        AWS_REGION: "${AWS_REGION}"
