name: config-aws
version: 1.0.0
description: AI assistant instructions and MCP servers for AWS development
author: y-miyazaki
license: Apache-2.0
target: all
includes: auto

dependencies:
  apm: []
  mcp:
    - name: aws-mcp
      registry: false
      transport: streamable-http
      url: https://aws-mcp.us-east-1.api.aws/mcp?oauth=initialize
    - name: aws-knowledge-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args:
        [
          "mcp-proxy==0.12.0",
          "--transport",
          "streamablehttp",
          "https://knowledge-mcp.global.api.aws",
        ]
    - name: aws-documentation-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-documentation-mcp-server==1.1.26"]
    - name: aws-pricing-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-pricing-mcp-server==1.0.31"]
