id: terraform-review-contract-001
name: terraform-review output contract sections
description: |
  Validate that terraform-review returns mandatory review sections from common-output-format.

tags:
  - quality
  - output-contract

inputs:
  prompt: "Use terraform-review. Return Markdown with sections: ## Checks Summary, ## Checks (Failed/Deferred Only), ## Issues."
  context:
    target: SKILL.md

expected:
  output_contains:
    - "## Checks Summary"
    - "## Checks (Failed/Deferred Only)"
    - "## Issues"
  outcomes:
    - type: task_completed
