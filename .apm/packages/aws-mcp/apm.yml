name: aws-mcp
version: 1.0.0
description: MCP servers for AWS development (API and Knowledge)
author: y-miyazaki
license: Apache-2.0
includes: auto

dependencies:
  apm: []
  mcp:
    - name: aws-mcp
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-compressor==0.15.0", "-c", "medium", "--", "uvx", "mcp-proxy-for-aws==1.4.2", "https://aws-mcp.us-east-1.api.aws/mcp"]
    - name: awslabs-aws-api-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-api-mcp-server==1.3.36"]
      env:
        AWS_REGION: "${AWS_REGION}"
    - name: aws-knowledge-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["mcp-proxy", "--transport", "streamablehttp", "https://knowledge-mcp.global.api.aws"]
    - name: aws-documentation-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-documentation-mcp-server==1.1.24"]
    - name: aws-pricing-mcp-server
      registry: false
      transport: stdio
      command: uvx
      args: ["awslabs.aws-pricing-mcp-server==1.0.30"]
