id: loop-ci-sweeper-trigger-negative-001
name: loop-ci-sweeper rejects manual debugging requests
description: Validate manual CI debugging is out of scope for loop automation.
tags:
  - quality
  - trigger-negative
inputs:
  prompt: >-
    Use loop-ci-sweeper. The user asks you to manually debug a flaky test on
    their laptop. This skill runs only from loop automation with injected
    failures[]. Explain the request is out of scope. Emit triage report sections
    with Summary Outcome indicating no actionable failures when failures is empty.
  context:
    level: L2
    skip: true
    failures: []
expected:
  output_contains:
    - out of scope
    - no actionable
    - Summary
  outcomes:
    - type: task_completed
