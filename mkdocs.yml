site_name: Shared Config Distribution
site_description: APM packages, reusable GitHub Actions workflows, and Renovate policy presets.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - md_in_html
  - mdx_truly_sane_lists
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
      separator: "-"
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

plugins:
  - search

nav:
  - Home: index.md
  - Tutorials:
      - APM Packages: tutorials/apm-getting-started.md
      - GitHub Actions: tutorials/github-actions-getting-started.md
      - Lint Configs: tutorials/lint-configs-getting-started.md
      - Renovate: tutorials/renovate-getting-started.md
  - How-To:
      - Troubleshooting: how-to/troubleshooting.md
  - Reference:
      - Specification: reference/specification.md
      - Loop Package Design: reference/loop-package-design.md
  - Explanation:
      - Architecture: explanation/architecture.md
      - Instructions Sync Workflow: explanation/instructions-sync-workflow.md
  - Report:
