          - Batch: report/aws/service-comparison/service-comparison-batch.md
          - Compute: report/aws/service-comparison/service-comparison-compute.md
          - Database: report/aws/service-comparison/service-comparison-database.md
          - Evaluation Rules: report/aws/service-comparison/service-comparison-evaluation-rules.md
          - Gateway: report/aws/service-comparison/service-comparison-gateway.md
          - Messaging: report/aws/service-comparison/service-comparison-messaging.md
          - Storage: report/aws/service-comparison/service-comparison-storage.md
      - Go:
