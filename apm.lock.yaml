- codebase-memory-mcp
- context7
- fetch
- github
- hashicorp-terraform-mcp-server
- lean-ctx
- playwright
mcp_configs:
  aws-documentation-mcp-server:
    name: aws-documentation-mcp-server
    transport: stdio
    args:
    - awslabs.aws-documentation-mcp-server==1.1.24
    registry: false
    command: uvx
  aws-knowledge-mcp-server:
    name: aws-knowledge-mcp-server
    transport: stdio
    args:
    - mcp-compressor==0.19.8
    - --
    - uvx
    - mcp-proxy==0.12.0
    - --transport
    - streamablehttp
    - https://knowledge-mcp.global.api.aws
    registry: false
    command: uvx
  aws-mcp:
    name: aws-mcp
    transport: stdio
    args:
    - mcp-compressor==0.19.8
    - --
    - uvx
    - mcp-proxy-for-aws==1.4.2
    - https://aws-mcp.us-east-1.api.aws/mcp
    registry: false
    command: uvx
  aws-pricing-mcp-server:
    name: aws-pricing-mcp-server
    transport: stdio
    args:
    - awslabs.aws-pricing-mcp-server==1.0.30
    registry: false
    command: uvx
  awslabs-aws-api-mcp-server:
    name: awslabs-aws-api-mcp-server
    transport: stdio
    env:
      AWS_REGION: ${AWS_REGION}
    args:
    - awslabs.aws-api-mcp-server==1.3.36
    registry: false
    command: uvx
  awslabs-terraform-mcp-server:
    name: awslabs-terraform-mcp-server
    transport: stdio
    env:
      FASTMCP_LOG_LEVEL: ERROR
    args:
    - awslabs.terraform-mcp-server==1.0.18
    registry: false
    command: uvx
  codebase-memory-mcp:
    name: codebase-memory-mcp
    transport: stdio
    args: []
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@2.2.5'
    registry: false
    command: npx
  fetch:
    name: fetch
    transport: stdio
    args:
    - mcp-server-fetch==2025.4.7
    registry: false
    command: uvx
  github:
    name: github
    transport: stdio
    args:
    - -lc
    - TOKEN="$GH_TOKEN"; if [ -z "$TOKEN" ]; then TOKEN="$GITHUB_TOKEN"; fi; uvx mcp-compressor==0.19.8
      -- uvx mcp-proxy==0.12.0 --transport streamablehttp -H Authorization "Bearer
      $TOKEN" https://api.githubcopilot.com/mcp/
    registry: false
    command: bash
  hashicorp-terraform-mcp-server:
    name: hashicorp-terraform-mcp-server
    transport: stdio
    args:
    - -y
    - terraform-mcp-server@0.13.0
    registry: false
    command: npx
  lean-ctx:
    name: lean-ctx
    transport: stdio
    args:
    - mcp
    registry: false
    command: lean-ctx
  playwright:
    name: playwright
    transport: stdio
    args:
    - -y
    - '@playwright/mcp@0.0.75'
    registry: false
    command: npx
