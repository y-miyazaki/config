mcp_configs:
  codebase-memory-mcp:
    name: codebase-memory-mcp
    transport: stdio
    args: []
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@3.2.3'
    registry: false
    command: npx
  fetch:
    name: fetch
    transport: stdio
    args:
    - mcp-server-fetch==2026.7.10
    registry: false
    command: uvx
  github:
    name: github
    transport: stdio
    args:
    - -lc
    - TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"; exec uvx mcp-compressor==0.31.5 -- https://api.githubcopilot.com/mcp/
      -H "Authorization=Bearer ${TOKEN}" --auth explicit-headers
    registry: false
    command: bash
  lean-ctx:
    name: lean-ctx
    transport: stdio
    args:
    - -y
    - lean-ctx-bin@3.9.12
    registry: false
    command: npx
