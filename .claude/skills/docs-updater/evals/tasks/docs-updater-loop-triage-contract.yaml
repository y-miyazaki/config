id: docs-updater-loop-triage-001
name: docs-updater loop triage report contract
description: |
  Validate loop path survey shape and PR Overview when findings present at L1.
tags:
  - quality
  - loop-path
  - output-contract
inputs:
  prompt: >-
    Use docs-updater (loop path). Context JSON: level=L1, skip=false, findings=[{
    "file": "docs/guide.md", "reason": "stale workflow path", "source_commit":
    "abc1234" }]. Do not edit files. Emit survey shape with ## Overview, ###
    Candidates, and Session Metrics. Do not emit ## Verification.
  context:
    level: L1
    skip: false
    findings:
      - file: docs/guide.md
        reason: stale workflow path
        source_commit: abc1234
expected:
  output_contains:
    - Candidates
    - Overview
    - Session Metrics
    - L1
  outcomes:
    - type: task_completed
