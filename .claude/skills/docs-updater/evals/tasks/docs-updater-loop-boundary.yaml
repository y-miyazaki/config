id: docs-updater-loop-boundary-001
name: docs-updater loop path defers denylist infrastructure finding
description: Validate infrastructure path finding is Deferred, not edited.
tags:
  - quality
  - loop-path
  - boundary-guardrail
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. A finding points at src/infrastructure/deploy.md
    on the denylist. Classify it under ### Deferred; do not edit denylist paths.
    Fix only the allowlisted stale doc under ### Changes. Emit apply shape with ##
    Overview, ### Changes, ### Deferred, and ## Verification plus Session Metrics.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: docs/guide/overview.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
      - file: src/infrastructure/deploy.md
        reason: stale runbook reference
        source_commit: eval0002
expected:
  output_contains:
    - Changes
    - Deferred
    - denylist
    - Overview
  outcomes:
    - type: task_completed
