id: docs-updater-loop-denylist-001
name: docs-updater loop path skips denylist src path
description: Validate src/** finding is not edited and is classified as Deferred.
tags:
  - quality
  - loop-path
  - boundary-guardrail
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. The only finding is src/handler.go with a doc
    comment drift note on the denylist. Classify under ### Deferred; do not edit.
    Emit apply shape noting denylist constraint in Overview. Include ## Verification
    and Session Metrics.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: src/handler.go
        reason: godoc references removed API
        source_commit: eval0002
expected:
  output_contains:
    - Deferred
    - denylist
    - Overview
  outcomes:
    - type: task_completed
