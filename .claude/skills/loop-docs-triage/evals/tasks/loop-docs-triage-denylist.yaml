id: loop-docs-triage-denylist-001
name: loop-docs-triage skips denylist src path
description: Validate src/** finding is not edited and is classified as Watch.
tags:
  - quality
  - boundary-guardrail
inputs:
  prompt: >-
    Use loop-docs-triage at L2. The only finding is src/handler.go with a doc
    comment drift note. This path is denylisted. Classify as Watch or Noise /
    Ignore; do not edit. Summary must note denylist constraint.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: src/handler.go
        reason: godoc references removed API
        source_commit: eval0002
expected:
  output_contains:
    - Watch
    - denylist
    - Summary
  outcomes:
    - type: task_completed
