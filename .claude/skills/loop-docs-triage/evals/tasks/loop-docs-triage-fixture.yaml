id: loop-docs-triage-fixture-001
name: loop-docs-triage fixes stale workflow reference
description: Validate High-Priority fix targets stale workflow path in fixture doc.
tags:
  - quality
  - fixture
inputs:
  prompt: >-
    Use loop-docs-triage at L2. Fix the High-Priority stale workflow reference in
    evals/files/README.stale.md per injected finding. Report the fix in
    High-Priority Items (Fixed) and Summary.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - High-Priority
    - README.stale.md
    - ci-build.yaml
    - Summary
  outcomes:
    - type: task_completed
