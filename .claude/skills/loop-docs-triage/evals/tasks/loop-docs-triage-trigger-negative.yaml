id: loop-docs-triage-trigger-negative-001
name: loop-docs-triage rejects code fix requests
description:
  "Validate that loop-docs-triage does not attempt to fix code issues.

  "
tags:
  - quality
  - trigger-negative
  - boundary-guardrail
inputs:
  prompt: >-
    Use loop-docs-triage. The user asks to fix a bug in src/handler.go. This is
    not documentation triage. Note the request as out of scope. Emit High-Priority,
    Watch, Noise / Ignore, and Summary without editing src paths. Emit PR ## Overview and ## Summary plus Session Metrics table with High-Priority Items, Watch Items, and Noise / Ignore sections.
  context:
    level: L2
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - out of scope
    - High-Priority
  outcomes:
    - type: task_completed
