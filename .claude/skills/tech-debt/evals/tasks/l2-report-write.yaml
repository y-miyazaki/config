id: tech-debt-l2-write-001
name: tech-debt L2 writes persisted report file
description: Validate L2 emits apply shape and writes report_file path in Changes.
tags:
  - quality
  - level
inputs:
  prompt: >-
    Use tech-debt at L2. Classify the injected eol_hint as dependency_version
    under High-Priority in persisted report. Emit apply PR shape with ###
    Changes listing report_file docs/report/tech-debt/2026-07-19.md and ##
    Verification. Include Session Metrics with L2.
  context:
    level: L2
    report_file: docs/report/tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
    hotspots: []
expected:
  output_contains:
    - dependency_version
    - docs/report/tech-debt/2026-07-19.md
    - Changes
    - L2
    - Verification
  outcomes:
    - type: task_completed
