# Pre-commit hooks for Terraform projects
# Install via: bash install_terraform.sh
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-case-conflict
      - id: check-json
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json)$)'
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        exclude: '^(lambda/template\.yaml|mkdocs\.yml)$'
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
        exclude: '(?:^|/)(?:.*/)?terraform\.[^.]+\.tfvars$'
      - id: end-of-file-fixer
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json|.*\.md)$)'
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json)$)'
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: '(.*_test.go|.gitleaks.toml|apm.lock.yaml|aqua-checksums.json|(?:^|/)(?:.*/)?terraform\.(?!example\.)[^.]+\.tfvars$)'
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]
  # Shell
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Shell script static analysis tool.
        language: system
        entry: shellcheck
        types: [shell]
      - id: shfmt
        name: shfmt
        description: Shell script formatter.
        language: system
        entry: shfmt -w -i 4 -ci -bn -sr
        types: [shell]
  # GitHub Actions
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        description: GitHub Actions workflow linter.
        language: system
        entry: actionlint -color=false
        types: [yaml]
        files: ^\.github/workflows/.*\.(ya?ml)$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor
  # Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--no-color
          - --args=--fix
      - id: terraform_trivy
        args:
          - --args=--config=__GIT_WORKING_DIR__/trivy.yaml
          - --args=--format=table
          - --args=--skip-dirs=**/.terraform
  # Markdown
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]
        files: \.md$
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--quiet]
  # Commit message
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
