id: loop-changelog-l1-001
name: loop-changelog L1 emits report without editing changelog
description: Validate L1 processes commits in report only without file edits.
tags:
  - quality
  - level
inputs:
  prompt: >-
    Use loop-changelog at L1. Process the injected feat commit in the report
    with Commits Processed and Summary sections. Do not edit CHANGELOG.md.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: true
    commit_range: eval0001..eval0002
    level: L1
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add loop-changelog workflow
expected:
  output_contains:
    - Commits Processed
    - Summary
    - L1
  outcomes:
    - type: task_completed
