id: loop-changelog-basic-001
name: loop-changelog-basic
description: >-
  Process conventional commits and report changelog updates with Commits
  Processed and Summary sections.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use loop-changelog at L2. Process the injected conventional commits and emit
    the full changelog report with sections Commits Processed, Skipped Commits,
    and Summary. Include Commits Processed and Summary wording in the report.
  context:
    changelog_file: CHANGELOG.md
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add loop-changelog workflow
expected:
  output_contains:
    - Commits Processed
    - Summary
  outcomes:
    - type: task_completed
