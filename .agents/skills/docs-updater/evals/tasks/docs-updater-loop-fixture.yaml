id: docs-updater-loop-fixture-001
name: docs-updater loop path fixes stale workflow reference
description: Validate L2 apply shape fixes stale workflow path in fixture doc.
tags:
  - quality
  - loop-path
  - fixture
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. Fix the stale workflow reference in
    evals/files/README.stale.md per injected finding. Emit apply shape with ###
    Changes listing the file, ## Overview naming the fix, and ## Verification.
    Include Session Metrics.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - Changes
    - README.stale.md
    - ci-build.yaml
    - Overview
    - Verification
  outcomes:
    - type: task_completed
