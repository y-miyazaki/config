id: docs-updater-loop-trigger-negative-001
name: docs-updater loop path rejects code fix requests
description: Validate that docs-updater does not attempt to fix code issues.
tags:
  - quality
  - loop-path
  - trigger-negative
  - boundary-guardrail
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. The user asks to fix a bug in src/handler.go.
    This is not documentation triage. Note the request as out of scope in Overview
    or ### Deferred. Fix only the allowlisted doc finding under ### Changes. Emit
    apply shape with ## Verification and Session Metrics.
  context:
    level: L2
    skip: false
    findings:
      - file: docs/guide/overview.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - out of scope
    - Changes
    - Overview
  outcomes:
    - type: task_completed
