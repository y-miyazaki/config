id: docs-updater-loop-noaction-001
name: docs-updater loop path no findings
description: |
  Validate loop path emits survey no-op when skip or empty findings.
tags:
  - quality
  - loop-path
  - skip-path
inputs:
  prompt: >-
    Use docs-updater (loop path). Context JSON has skip=true and findings=[].
    Emit survey no-op with ## Overview indicating no documentation impact
    detected. Include Session Metrics. Do not edit files. Do not emit ###
    Changes or ## Verification.
  context:
    level: L2
    skip: true
    findings: []
expected:
  output_contains:
    - Overview
    - Session Metrics
    - no documentation impact
  outcomes:
    - type: task_completed
