id: ci-sweeper-classification-001
name: ci-sweeper classifies infra as watch
description: Validate infra failures are deferred, not auto-fixed.
tags:
  - classification
inputs:
  prompt: >-
    Use ci-sweeper at L1. One failure has failure_type=infra (runner OOM).
    Emit survey shape with ## Overview, ### Candidates or ### Watch as appropriate.
    Classify the infra failure under ### Watch and do not edit files. Emit Session
    Metrics. Do not emit ## Verification or ### Changes.
  context:
    level: L1
    failures:
      - workflow_name: ci-go
        job_name: test
        failure_type: infra
        reason: runner OOM
expected:
  output_contains:
    - Watch
    - Overview
  outcomes:
    - type: task_completed
