id: loop-tech-debt-trigger-negative-001
name: loop-tech-debt rejects code-fix requests
description: >-
  Validate loop-tech-debt does not apply refactors or dependency upgrades;
  report-only scope is preserved.
tags:
  - quality
  - trigger-negative
  - boundary-guardrail
inputs:
  prompt: >-
    Use loop-tech-debt. The user asks to extract the shared validator and bump
    the EOL dependency now. This skill must not edit application or lockfile
    paths. Note the request as out of scope and keep Watch or Noise wording.
  context:
    target: SKILL.md
expected:
  output_contains:
    - out of scope
    - Watch
  outcomes:
    - type: task_completed
