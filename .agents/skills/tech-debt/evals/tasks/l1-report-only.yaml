id: tech-debt-l1-001
name: tech-debt L1 emits survey without report file
description: >-
  Validate L1 classifies with Category labels in Candidates but does not write report_file.
tags:
  - quality
  - level
  - edge-case
inputs:
  prompt: >-
    Use tech-debt at L1. Classify the injected signal with Category
    code_quality as a Candidate. Emit survey shape with ## Overview, ###
    Candidates, and optional ### Watch. Do not write report_file. Do not emit
    ## Verification or ### Changes.
  context:
    level: L1
    report_file: docs/report/tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: todo_comment
        path: evals/files/sample_service.go.txt
        line: 5
        snippet: "TODO: extract shared validator used by HandleCreate and HandleUpdate"
        hint: code_quality
    hotspots: []
expected:
  output_contains:
    - code_quality
    - Candidates
    - Overview
    - L1
  outcomes:
    - type: task_completed
