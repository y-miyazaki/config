id: loop-docs-triage-contract-001
name: loop-docs-triage triages injected stale doc finding
description: >-
  Validate loop-docs-triage classifies injected findings into High-Priority and
  Watch with full report sections.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use loop-docs-triage at L2. Classify the injected findings. The stale
    workflow reference is High-Priority; the version drift is Watch. Emit
    High-Priority, Watch, Noise / Ignore, and Summary. Do not edit files in
    this mock eval. Emit PR ## Overview and ## Summary plus Session Metrics table with High-Priority Items, Watch Items, and Noise / Ignore sections.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
      - file: docs/guide/overview.md
        reason: version number slightly outdated (1.0.0 vs 1.0.1)
        source_commit: eval0002
expected:
  output_contains:
    - High-Priority
    - Watch
    - Summary
    - README.stale.md
  outcomes:
    - type: task_completed
