name: setup-go-with-cache
description: "Setup Go with module and build cache. Returns cache paths and hit status."
author: "GitHub Copilot"
inputs:
  go_project_path:
    description: "Path to the Go project root (directory containing go.mod)"
    required: true
  go_version:
    description: "Go version to install"
    required: true
  cache_prefix:
    description: "Cache key prefix (e.g. environment-component)"
    required: true
outputs:
  cache-hit:
    description: "Whether the cache was hit"
    value: ${{ steps.go-cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        cache: false
        go-version: ${{ inputs.go_version }}

    - name: Determine Go cache paths
      id: go-cache-paths
      working-directory: ${{ inputs.go_project_path }}
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "gomodcache=$(go env GOMODCACHE)"
          echo "gocache=$(go env GOCACHE)"
        } >> "$GITHUB_OUTPUT"

    - name: Cache Go build and module caches
      id: go-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: go-cache-${{ inputs.cache_prefix }}-${{ runner.os }}-${{ inputs.go_version }}-${{ hashFiles(format('{0}/go.mod', inputs.go_project_path), format('{0}/go.sum', inputs.go_project_path)) }}
        path: |
          ${{ steps.go-cache-paths.outputs.gomodcache }}
          ${{ steps.go-cache-paths.outputs.gocache }}
        restore-keys: |
          go-cache-${{ inputs.cache_prefix }}-${{ runner.os }}-${{ inputs.go_version }}-
          go-cache-${{ inputs.cache_prefix }}-${{ runner.os }}-

    - name: Download Go Modules
      if: steps.go-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.go_project_path }}
      run: go mod download
