name: loop-state-write
description: "Write per-target loop state JSON and commit/push to LOOP_STATE_PUSH_BRANCH."

inputs:
  additional_commit_paths:
    default: ""
    description: "Comma-separated extra paths to commit with state (e.g. domain ledger)"
    required: false
  base_branch:
    default: "main"
    description: "Default branch when state_push_branch is empty"
    required: false
  loop_name:
    default: ""
    description: "Loop name for pending records"
    required: false
  open_rejections:
    default: "[]"
    description: "JSON array of unresolved structured rejections (recorded when outcome is rejected)"
    required: false
  outcome:
    default: ""
    description: "Run outcome (no-op|no-changes|pr-created|rejected|watch|error|escalated|merged|pr-closed)"
    required: false
  pending_pr_number:
    default: ""
    description: "PR number for pending/promote/clear_pending state_write_mode"
    required: false
  pending_pr_url:
    default: ""
    description: "PR URL recorded in pending state"
    required: false
  reject_reason:
    default: ""
    description: "Verifier rejection reason (recorded when outcome is rejected)"
    required: false
  sha:
    default: ""
    description: "Commit SHA to record in state for target"
    required: false
  skip_state_pr:
    default: "false"
    description: "When true, skip state PR fallback when direct push to branch_state is blocked"
    required: false
  state_file:
    description: "Path to state JSON file (e.g. .loop/state-docs-triage.json)"
    required: true
  state_write_mode:
    default: "advance"
    description: "advance|pending|metadata|promote|clear_pending"
    required: false
  state_push_branch:
    default: ""
    description: "Branch for .loop/* commits (empty = base_branch)"
    required: false
  target_key:
    default: ""
    description: "Target state key (e.g. integration:main). Required for per-target writes."
    required: false
  token:
    description: "GitHub token for push"
    required: true
  write_target_state:
    default: "true"
    description: "When false, skip target field updates (metadata-only writes)"
    required: false

runs:
  using: composite
  steps:
    - name: Write State
      shell: bash
      env:
        ADDITIONAL_COMMIT_PATHS: ${{ inputs.additional_commit_paths }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        GH_TOKEN: ${{ inputs.token }}
        LOOP_NAME: ${{ inputs.loop_name }}
        OPEN_REJECTIONS: ${{ inputs.open_rejections }}
        OUTCOME: ${{ inputs.outcome }}
        PENDING_PR_NUMBER: ${{ inputs.pending_pr_number }}
        PENDING_PR_URL: ${{ inputs.pending_pr_url }}
        REJECT_REASON: ${{ inputs.reject_reason }}
        SHA: ${{ inputs.sha }}
        SKIP_STATE_PR: ${{ inputs.skip_state_pr }}
        STATE_FILE: ${{ inputs.state_file }}
        STATE_PUSH_BRANCH: ${{ inputs.state_push_branch }}
        STATE_WRITE_MODE: ${{ inputs.state_write_mode }}
        TARGET_KEY: ${{ inputs.target_key }}
        WRITE_TARGET_STATE: ${{ inputs.write_target_state }}
      run: bash "${GITHUB_ACTION_PATH}/lib/run.sh"
