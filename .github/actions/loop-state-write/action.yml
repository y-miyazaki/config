name: loop-state-write
description: "Write per-target loop state JSON and commit/push to LOOP_STATE_PUSH_BRANCH."

inputs:
  acting_on_action:
    default: ""
    description: "acting_on coordination: set | clear (empty = no change)"
    required: false
  acting_on_loop_name:
    default: ""
    description: "Loop name recorded in acting_on when action=set"
    required: false
  acting_on_target_key:
    default: ""
    description: "Target key recorded in acting_on when action=set"
    required: false
  base_branch:
    default: "main"
    description: "Base branch for state PR when direct push to a protected branch is blocked"
    required: false
  branch:
    default: ""
    description: "Deprecated: state always commits to state_push_branch"
    required: false
  loop_name:
    default: ""
    description: "Loop name for acting_on metadata"
    required: false
  open_rejections:
    default: "[]"
    description: "JSON array of unresolved structured rejections (recorded when outcome is rejected)"
    required: false
  outcome:
    default: ""
    description: "Run outcome (no-op|no-changes|pr-created|rejected|watch|error|escalated)"
    required: false
  reject_reason:
    default: ""
    description: "Verifier rejection reason (recorded when outcome is rejected)"
    required: false
  sha:
    default: ""
    description: "Commit SHA to record in state for target"
    required: false
  state_file:
    description: "Path to state JSON file (e.g. .loop/state-docs-triage.json)"
    required: true
  state_push_branch:
    default: ""
    description: "Branch for .loop/* commits (empty = base_branch)"
    required: false
  additional_commit_paths:
    default: ""
    description: "Comma-separated extra paths to commit with state (e.g. domain ledger)"
    required: false
  target_key:
    default: ""
    description: "Target state key (e.g. integration:main). Required for per-target writes."
    required: false
  token:
    description: "GitHub token for push"
    required: true
  write_target_state:
    default: "true"
    description: "When false, only apply acting_on_action without updating target fields"
    required: false

runs:
  using: composite
  steps:
    - name: Configure Git Auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

    - name: Switch State Branch
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        STATE_PUSH_BRANCH: ${{ inputs.state_push_branch }}
      run: |
        set -euo pipefail
        TARGET_BRANCH="${STATE_PUSH_BRANCH:-${BASE_BRANCH}}"
        if ! [[ "${TARGET_BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
          echo "::error::Invalid state push branch: ${TARGET_BRANCH}"
          exit 1
        fi
        git fetch origin "${TARGET_BRANCH}" --prune
        if git show-ref --verify --quiet "refs/remotes/origin/${TARGET_BRANCH}"; then
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
        else
          git checkout -B "${TARGET_BRANCH}"
        fi

    - name: Write State
      shell: bash
      env:
        ACTING_ON_ACTION: ${{ inputs.acting_on_action }}
        ACTING_ON_LOOP_NAME: ${{ inputs.acting_on_loop_name != '' && inputs.acting_on_loop_name || inputs.loop_name }}
        ACTING_ON_TARGET_KEY: ${{ inputs.acting_on_target_key }}
        OPEN_REJECTIONS: ${{ inputs.open_rejections }}
        OUTCOME: ${{ inputs.outcome }}
        REJECT_REASON: ${{ inputs.reject_reason }}
        SHA: ${{ inputs.sha }}
        STATE_FILE: ${{ inputs.state_file }}
        TARGET_KEY: ${{ inputs.target_key }}
        WRITE_TARGET_STATE: ${{ inputs.write_target_state }}
        ADDITIONAL_COMMIT_PATHS: ${{ inputs.additional_commit_paths }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "${STATE_FILE}")"

        if [[ -z "${TARGET_KEY}" ]]; then
          echo "::error::target_key is required for loop-state-write"
          exit 1
        fi

        if [[ ! -f "${STATE_FILE}" ]]; then
          echo '{"targets":{}}' > "${STATE_FILE}"
        fi

        if ! jq -e '.targets' "${STATE_FILE}" >/dev/null 2>&1; then
          echo '{"targets":{}}' > "${STATE_FILE}"
        fi

        NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

        if [[ "${WRITE_TARGET_STATE}" == "true" ]]; then
          if [[ -z "${OUTCOME}" || -z "${SHA}" ]]; then
            echo "::error::outcome and sha are required when write_target_state=true"
            exit 1
          fi
          PREV_CONSECUTIVE=$(jq -r --arg key "${TARGET_KEY}" '.targets[$key].consecutive_failures // 0' "${STATE_FILE}" 2>/dev/null || echo "0")
          if ! jq -e . >/dev/null 2>&1 <<< "${OPEN_REJECTIONS}"; then
            echo "::warning::open_rejections is not valid JSON; using []"
            OPEN_REJECTIONS='[]'
          fi

          case "${OUTCOME}" in
            rejected)
              CONSECUTIVE=$((PREV_CONSECUTIVE + 1))
              ;;
            watch|error|escalated)
              CONSECUTIVE="${PREV_CONSECUTIVE}"
              if [[ "${OUTCOME}" != "watch" ]]; then
                OPEN_REJECTIONS='[]'
              fi
              ;;
            *)
              CONSECUTIVE=0
              OPEN_REJECTIONS='[]'
              ;;
          esac

          jq \
            --arg key "${TARGET_KEY}" \
            --arg sha "${SHA}" \
            --arg last_run "${NOW}" \
            --arg outcome "${OUTCOME}" \
            --arg last_reject_reason "${REJECT_REASON}" \
            --argjson consecutive_failures "${CONSECUTIVE}" \
            --argjson open_rejections "${OPEN_REJECTIONS}" \
            '
            .targets = (.targets // {}) |
            .targets[$key] = (
              (.targets[$key] // {})
              | .last_sha = $sha
              | .last_run = $last_run
              | .outcome = $outcome
              | .consecutive_failures = $consecutive_failures
              | .open_rejections = $open_rejections
              | if $last_reject_reason != "" then .last_reject_reason = $last_reject_reason else . end
            )
            ' "${STATE_FILE}" > "${STATE_FILE}.tmp"
          mv "${STATE_FILE}.tmp" "${STATE_FILE}"
        fi

        case "${ACTING_ON_ACTION}" in
          set)
            jq \
              --arg target_key "${ACTING_ON_TARGET_KEY}" \
              --arg loop_name "${ACTING_ON_LOOP_NAME}" \
              --arg started_at "${NOW}" \
              '.acting_on = {target_key: $target_key, loop_name: $loop_name, started_at: $started_at}' \
              "${STATE_FILE}" > "${STATE_FILE}.tmp"
            mv "${STATE_FILE}.tmp" "${STATE_FILE}"
            ;;
          clear)
            jq 'del(.acting_on)' "${STATE_FILE}" > "${STATE_FILE}.tmp"
            mv "${STATE_FILE}.tmp" "${STATE_FILE}"
            ;;
        esac

    - name: Commit and Push
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        GH_TOKEN: ${{ inputs.token }}
        OUTCOME: ${{ inputs.outcome }}
        SHA: ${{ inputs.sha }}
        STATE_FILE: ${{ inputs.state_file }}
        STATE_PUSH_BRANCH: ${{ inputs.state_push_branch }}
        ADDITIONAL_COMMIT_PATHS: ${{ inputs.additional_commit_paths }}
      run: |
        set -euo pipefail
        TARGET_BRANCH="${STATE_PUSH_BRANCH:-${BASE_BRANCH}}"
        declare -a paths_to_add=("${STATE_FILE}")
        if [[ -n "${ADDITIONAL_COMMIT_PATHS}" ]]; then
            item=""
            declare -a extra=()
            IFS=',' read -r -a extra <<< "${ADDITIONAL_COMMIT_PATHS}"
            for item in "${extra[@]}"; do
                item="${item#"${item%%[![:space:]]*}"}"
                item="${item%"${item##*[![:space:]]}"}"
                [[ -z ${item} ]] && continue
                paths_to_add+=("${item}")
            done
        fi
        has_changes="false"
        for path in "${paths_to_add[@]}"; do
            if ! git diff --quiet "${path}" 2>/dev/null || [[ -n "$(git status --porcelain "${path}")" ]]; then
                has_changes="true"
                break
            fi
        done
        if [[ ${has_changes} != "true" ]]; then
          echo "No state changes to commit."
          exit 0
        fi
        for path in "${paths_to_add[@]}"; do
            if [[ -e ${path} ]] || [[ -n "$(git status --porcelain "${path}")" ]]; then
                git add "${path}" || true
            fi
        done
        git commit -m "chore(loop): update state [skip ci]"
        if git push origin HEAD:"${TARGET_BRANCH}" 2>/dev/null; then
          echo "State pushed to ${TARGET_BRANCH}."
          exit 0
        fi
        echo "Direct push blocked; opening state PR."
        STATE_BRANCH="loop/state-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        git checkout -B "${STATE_BRANCH}"
        git push origin "${STATE_BRANCH}"
        PR_URL=$(gh pr create \
          --repo "${GITHUB_REPOSITORY}" \
          --base "${TARGET_BRANCH}" \
          --head "${STATE_BRANCH}" \
          --title "chore(loop): update state [skip ci]" \
          --body "Automated loop state advance to ${SHA} (outcome: ${OUTCOME}).")
        if gh pr merge "${PR_URL}" --auto --delete-branch --squash 2>/dev/null; then
          echo "State PR queued for auto-merge: ${PR_URL}"
        elif gh pr merge "${PR_URL}" --delete-branch --squash 2>/dev/null; then
          echo "State PR merged: ${PR_URL}"
        else
          echo "::warning::State PR requires manual merge: ${PR_URL}"
        fi
