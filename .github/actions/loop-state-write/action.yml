name: loop-state-write
description: "Write loop state JSON and commit/push. Requires actions/checkout in the caller."

inputs:
  base_branch:
    default: "main"
    description: "Base branch for state PR when direct push to a protected branch is blocked"
    required: false
  branch:
    default: ""
    description: "Target branch for state commit (empty = current/default branch)"
    required: false
  open_rejections:
    default: "[]"
    description: "JSON array of unresolved structured rejections (recorded when outcome is rejected)"
    required: false
  outcome:
    description: "Run outcome (no-op|report-only|pr-created|rejected|escalated)"
    required: true
  reject_reason:
    default: ""
    description: "Verifier rejection reason (recorded when outcome is rejected)"
    required: false
  sha:
    description: "Commit SHA to record in state"
    required: true
  state_file:
    description: "Path to state JSON file (e.g. .loop/state-docs-triage.json)"
    required: true
  token:
    description: "GitHub token for push"
    required: true

runs:
  using: composite
  steps:
    - name: Configure Git Auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

    - name: Switch Branch
      if: inputs.branch != ''
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        set -euo pipefail
        if ! [[ "${BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
          echo "::error::Invalid branch name: ${BRANCH}"
          exit 1
        fi
        git checkout -B "${BRANCH}"

    - name: Write State
      shell: bash
      env:
        OPEN_REJECTIONS: ${{ inputs.open_rejections }}
        OUTCOME: ${{ inputs.outcome }}
        REJECT_REASON: ${{ inputs.reject_reason }}
        SHA: ${{ inputs.sha }}
        STATE_FILE: ${{ inputs.state_file }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "${STATE_FILE}")"
        PREV_CONSECUTIVE=0
        if [[ -f "${STATE_FILE}" ]]; then
          PREV_CONSECUTIVE=$(jq -r '.consecutive_failures // 0' "${STATE_FILE}" 2>/dev/null || echo "0")
        fi
        if ! jq -e . >/dev/null 2>&1 <<< "${OPEN_REJECTIONS}"; then
          echo "::warning::open_rejections is not valid JSON; using []"
          OPEN_REJECTIONS='[]'
        fi
        case "${OUTCOME}" in
          rejected)
            CONSECUTIVE=$((PREV_CONSECUTIVE + 1))
            ;;
          error|escalated)
            CONSECUTIVE="${PREV_CONSECUTIVE}"
            OPEN_REJECTIONS='[]'
            ;;
          *)
            CONSECUTIVE=0
            OPEN_REJECTIONS='[]'
            ;;
        esac
        if [[ "${OUTCOME}" == "rejected" && -n "${REJECT_REASON}" ]]; then
          jq -n \
            --arg sha "${SHA}" \
            --arg last_run "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg outcome "${OUTCOME}" \
            --arg last_reject_reason "${REJECT_REASON}" \
            --argjson consecutive_failures "${CONSECUTIVE}" \
            --argjson open_rejections "${OPEN_REJECTIONS}" \
            '{last_sha: $sha, last_run: $last_run, outcome: $outcome, consecutive_failures: $consecutive_failures, last_reject_reason: $last_reject_reason, open_rejections: $open_rejections}' \
            > "${STATE_FILE}"
        else
          jq -n \
            --arg sha "${SHA}" \
            --arg last_run "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg outcome "${OUTCOME}" \
            --argjson consecutive_failures "${CONSECUTIVE}" \
            --argjson open_rejections "${OPEN_REJECTIONS}" \
            '{last_sha: $sha, last_run: $last_run, outcome: $outcome, consecutive_failures: $consecutive_failures, open_rejections: $open_rejections}' \
            > "${STATE_FILE}"
        fi

    - name: Commit and Push
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        GH_TOKEN: ${{ inputs.token }}
        OUTCOME: ${{ inputs.outcome }}
        SHA: ${{ inputs.sha }}
        STATE_FILE: ${{ inputs.state_file }}
      run: |
        set -euo pipefail
        # Detect both tracked changes and new untracked state file
        if git diff --quiet "${STATE_FILE}" 2>/dev/null && [[ -z "$(git status --porcelain "${STATE_FILE}")" ]]; then
          echo "No state changes to commit."
          exit 0
        fi
        git add "${STATE_FILE}"
        git commit -m "chore(loop): update state [skip ci]"
        if git push origin HEAD 2>/dev/null; then
          echo "State pushed directly."
          exit 0
        fi
        echo "Direct push blocked; opening state PR."
        STATE_BRANCH="loop/state-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        git checkout -B "${STATE_BRANCH}"
        git push origin "${STATE_BRANCH}"
        PR_URL=$(gh pr create \
          --repo "${GITHUB_REPOSITORY}" \
          --base "${BASE_BRANCH}" \
          --head "${STATE_BRANCH}" \
          --title "chore(loop): update state [skip ci]" \
          --body "Automated loop state advance to ${SHA} (outcome: ${OUTCOME}).")
        if gh pr merge "${PR_URL}" --auto --delete-branch --squash 2>/dev/null; then
          echo "State PR queued for auto-merge: ${PR_URL}"
        elif gh pr merge "${PR_URL}" --delete-branch --squash 2>/dev/null; then
          echo "State PR merged: ${PR_URL}"
        else
          echo "::warning::State PR requires manual merge: ${PR_URL}"
        fi
