name: loop-execute
description: "Bounded Agent→Verify loop in one job. Installs CLI once, retries with verifier feedback."

inputs:
  agent_implementer_max_turns:
    default: "5"
    description: "Maximum implementer agent turns per loop attempt"
    required: false
  agent_implementer_model:
    default: ""
    description: "Implementer model override"
    required: false
  agent_loop_max_attempts:
    default: "3"
    description: "Maximum Agent→Verify loop attempts"
    required: false
  agent_token:
    description: "Authentication token for the selected engine"
    required: true
  agent_verifier_criteria:
    default: ""
    description: "Domain-specific APPROVE/REJECT criteria (markdown)"
    required: false
  agent_verifier_max_turns:
    default: "3"
    description: "Maximum verifier agent turns"
    required: false
  agent_verifier_model:
    default: ""
    description: "Verifier model override"
    required: false
  allowlist:
    default: ""
    description: "Comma-separated glob allowlist; when set, changes outside these paths trigger REJECT"
    required: false
  base_branch:
    default: "main"
    description: "Base branch for verify diff"
    required: false
  branch:
    description: "Worktree branch name"
    required: true
  cli_version:
    default: "latest"
    description: "CLI package version"
    required: false
  commit_message:
    default: "chore: loop-automated update"
    description: "Commit message prefix for loop attempts"
    required: false
  denylist:
    default: "**/.env,**/credentials*,**/secrets*,**/migration/*.sql,**/infrastructure/**"
    description: "Comma-separated path denylist"
    required: false
  engine:
    description: "AI engine (claude | copilot | codex | cursor)"
    required: true
  infer_files_pattern:
    default: ""
    description: "Optional extended-regex to infer file paths from verifier text when JSON files is missing"
    required: false
  no_changes_verdict:
    default: "APPROVE"
    description: "Verdict when the implementer produces no file changes (APPROVE or REJECT)"
    required: false
  prompt_implementer_feedback:
    default: ""
    description: "Implementer retry prompt template. Placeholders: {{base_prompt}}, {{feedback}}"
    required: false
  prompt_text:
    description: "Implementer prompt text"
    required: true
  prompt_verifier_default_criteria:
    default: ""
    description: "Default verifier APPROVE/REJECT criteria when agent_verifier_criteria is empty"
    required: false
  prompt_verifier_initial:
    default: ""
    description: "Verifier INITIAL mode intro. Placeholder: {{attempt}}"
    required: false
  prompt_verifier_output_contract:
    default: ""
    description: "Verifier JSON output contract appended to the verifier prompt"
    required: false
  prompt_verifier_regression:
    default: ""
    description: "Verifier REGRESSION mode body. Placeholders: {{attempt}}, {{open_rejections}}, {{attempt_delta}}"
    required: false
  prompt_verifier_task:
    default: ""
    description: "Verifier task section inserted before criteria"
    required: false
  skill_name:
    description: "Skill name for verifier context"
    required: true
  token:
    description: "GitHub token for push (must match worktree-setup)"
    required: true
  verifier_context:
    default: ""
    description: "Additional markdown context appended to the verifier prompt (e.g. CI logs, lint output)"
    required: false
  worktree_path:
    description: "Absolute path to the worktree"
    required: true

outputs:
  attempts:
    description: "Number of Agent→Verify attempts executed"
    value: ${{ steps.loop.outputs.attempts }}
  has_changes:
    description: "Whether any files were committed and pushed"
    value: ${{ steps.push.outputs.has_changes }}
  open_rejections:
    description: "JSON array of unresolved structured rejections"
    value: ${{ steps.loop.outputs.open_rejections }}
  reason:
    description: "Final verifier reason"
    value: ${{ steps.loop.outputs.reason }}
  verdict:
    description: "Final verdict (APPROVE or REJECT)"
    value: ${{ steps.loop.outputs.verdict }}

runs:
  using: composite
  steps:
    - name: Install CLI
      uses: y-miyazaki/config/.github/actions/loop-install-cli@6aaff31f3fd826188a4f18443701b582215e9276 # v1.7.8
      with:
        cli_version: ${{ inputs.cli_version }}
        engine: ${{ inputs.engine }}

    - name: Run Bounded Loop
      id: loop
      shell: bash
      working-directory: ${{ inputs.worktree_path }}
      env:
        AGENT_IMPLEMENTER_MAX_TURNS: ${{ inputs.agent_implementer_max_turns }}
        AGENT_IMPLEMENTER_MODEL: ${{ inputs.agent_implementer_model }}
        AGENT_LOOP_MAX_ATTEMPTS: ${{ inputs.agent_loop_max_attempts }}
        AGENT_TOKEN: ${{ inputs.agent_token }}
        AGENT_VERIFIER_CRITERIA: ${{ inputs.agent_verifier_criteria }}
        AGENT_VERIFIER_MAX_TURNS: ${{ inputs.agent_verifier_max_turns }}
        AGENT_VERIFIER_MODEL: ${{ inputs.agent_verifier_model }}
        ALLOWLIST: ${{ inputs.allowlist }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        BRANCH: ${{ inputs.branch }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        DENYLIST: ${{ inputs.denylist }}
        ENGINE: ${{ inputs.engine }}
        INFER_FILES_PATTERN: ${{ inputs.infer_files_pattern }}
        NO_CHANGES_VERDICT: ${{ inputs.no_changes_verdict }}
        PROMPT_IMPLEMENTER_FEEDBACK: ${{ inputs.prompt_implementer_feedback }}
        PROMPT_TEXT: ${{ inputs.prompt_text }}
        PROMPT_VERIFIER_DEFAULT_CRITERIA: ${{ inputs.prompt_verifier_default_criteria }}
        PROMPT_VERIFIER_INITIAL: ${{ inputs.prompt_verifier_initial }}
        PROMPT_VERIFIER_OUTPUT_CONTRACT: ${{ inputs.prompt_verifier_output_contract }}
        PROMPT_VERIFIER_REGRESSION: ${{ inputs.prompt_verifier_regression }}
        PROMPT_VERIFIER_TASK: ${{ inputs.prompt_verifier_task }}
        SKILL_NAME: ${{ inputs.skill_name }}
        VERIFIER_CONTEXT: ${{ inputs.verifier_context }}
        STATUS_DIR: ${{ runner.temp }}/loop-execute-status
        WORKTREE_PATH: ${{ inputs.worktree_path }}
      run: |
        set -euo pipefail
        mkdir -p "${STATUS_DIR}"
        ATTEMPT=0
        VERDICT="REJECT"
        REASON="No attempts completed"
        HAS_CHANGES="false"
        OPEN_REJECTIONS_JSON='[]'
        REJECT_FEEDBACK=""
        NO_CHANGES_VERDICT=$(printf '%s' "${NO_CHANGES_VERDICT:-APPROVE}" | tr '[:lower:]' '[:upper:]')
        if [[ "${NO_CHANGES_VERDICT}" != "REJECT" ]]; then
          NO_CHANGES_VERDICT="APPROVE"
        fi

        load_default_prompts() {
          if [[ -z "${PROMPT_IMPLEMENTER_FEEDBACK}" ]]; then
            PROMPT_IMPLEMENTER_FEEDBACK=$'{{base_prompt}}\n\n## Verifier Feedback (must address)\n\nPrevious attempt(s) were REJECTED. Edit **only** the files listed under **Files** and apply each **Required fix**:\n\n{{feedback}}\n\nAfter editing, your changes must be written to disk. Do not make unrelated changes.'
          fi
          if [[ -z "${PROMPT_VERIFIER_INITIAL}" ]]; then
            PROMPT_VERIFIER_INITIAL=$'You are in INITIAL verification mode (attempt {{attempt}}).\nScrutinize the branch diff for factual blockers and scope violations.'
          fi
          if [[ -z "${PROMPT_VERIFIER_REGRESSION}" ]]; then
            PROMPT_VERIFIER_REGRESSION=$'You are in REGRESSION verification mode (attempt {{attempt}}).\nCheck whether prior open rejections were fixed. Do not hunt for new nits.\n\n### Rules\n\n- REJECT only if a prior open rejection is still unfixed or factually wrong\n- REJECT if this attempt introduced a new factual error in changed files\n- Do NOT REJECT for style, preference, or unrelated nits\n- Do NOT re-litigate an open rejection that this attempt correctly fixed\n\n### Prior Open Rejections\n\n{{open_rejections}}\n\n### This Attempt'"'"'s Delta\n```\n{{attempt_delta}}\n```'
          fi
          if [[ -z "${PROMPT_VERIFIER_TASK}" ]]; then
            PROMPT_VERIFIER_TASK=$'Review the changes produced by the loop implementer agent and determine whether they should be merged.'
          fi
          if [[ -z "${PROMPT_VERIFIER_OUTPUT_CONTRACT}" ]]; then
            PROMPT_VERIFIER_OUTPUT_CONTRACT=$'## Output (machine-readable — required)\n\nEnd your response with a single fenced JSON block (no prose after it):\n\n```json\n{\n  "verdict": "APPROVE",\n  "reason": "one-line summary"\n}\n```\n\nor on REJECT:\n\n```json\n{\n  "verdict": "REJECT",\n  "files": ["path/to/file"],\n  "issue": "what is factually wrong",\n  "fix": "specific change the implementer must make",\n  "reason": "one-line summary for logs"\n}\n```\n\nRules:\n- "verdict" must be "APPROVE" or "REJECT"\n- On REJECT, "files" (array), "issue", "fix", and "reason" are required\n- Use repo-relative paths in files'
          fi
          if [[ -z "${PROMPT_VERIFIER_DEFAULT_CRITERIA}" ]]; then
            PROMPT_VERIFIER_DEFAULT_CRITERIA=$'## Criteria for APPROVE\n\nALL of the following must be true:\n1. Changes are consistent with the codebase\n2. No sensitive information is exposed\n3. No files outside the expected scope are modified\n4. Changes are coherent and non-destructive\n\n## Criteria for REJECT\n\nANY of the following triggers REJECT:\n- Changes outside expected scope\n- Factual inaccuracies or hallucinated content\n- Sensitive data exposure\n- Gratuitous or unrelated changes'
          fi
        }

        render_template() {
          local template="$1"
          local key value result="${template}"
          shift
          while [[ $# -gt 0 ]]; do
            key="$1"
            value="$2"
            result="${result//\{\{${key}\}\}/${value}}"
            shift 2
          done
          printf '%s' "${result}"
        }

        load_default_prompts

        parse_output_field() {
          local output_file="$1"
          local field="$2"
          grep -E "^${field}:[[:space:]]+" "${output_file}" 2>/dev/null | tail -1 | sed -E "s/^${field}:[[:space:]]*//" || true
        }

        append_open_rejection() {
          local attempt="$1"
          local files="$2"
          local issue="$3"
          local fix="$4"
          OPEN_REJECTIONS_JSON=$(jq -c \
            --argjson attempt "${attempt}" \
            --arg files "${files}" \
            --arg issue "${issue}" \
            --arg fix "${fix}" \
            '. + [{"attempt": $attempt, "files": ($files | if length == 0 then [] else split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0)) end), "issue": $issue, "fix": $fix}]' \
            <<< "${OPEN_REJECTIONS_JSON}")
        }

        format_open_rejections_for_prompt() {
          if [[ "$(jq 'length' <<< "${OPEN_REJECTIONS_JSON}")" -eq 0 ]]; then
            return 0
          fi
          jq -r '.[] | "### Attempt \(.attempt)\n- **Files:** " + (if (.files | length) > 0 then (.files | join(", ")) else "not specified" end) + "\n- **Issue:** \(.issue)\n- **Required fix:** \(.fix)\n"' \
            <<< "${OPEN_REJECTIONS_JSON}"
        }

        sync_reject_feedback() {
          REJECT_FEEDBACK="$(format_open_rejections_for_prompt)"
        }

        record_structured_reject() {
          local attempt_dir="$1"
          local attempt="$2"
          local files="$3"
          local issue="$4"
          local fix="$5"
          local summary="$6"
          printf '%s\n' "${files}" > "${attempt_dir}/reject-files"
          printf '%s\n' "${issue}" > "${attempt_dir}/reject-issue"
          printf '%s\n' "${fix}" > "${attempt_dir}/reject-fix"
          append_open_rejection "${attempt}" "${files}" "${issue}" "${fix}"
          sync_reject_feedback
          printf '%s\n' "REJECT" > "${attempt_dir}/verdict"
          printf '%s\n' "${summary}" > "${attempt_dir}/reason"
        }

        infer_files_from_text() {
          local text="$1"
          local fallback="$2"
          local inferred=""
          if [[ -n "${INFER_FILES_PATTERN}" ]]; then
            inferred=$(printf '%s\n' "${text}" | grep -oE "${INFER_FILES_PATTERN}" | sort -u | paste -sd, - || true)
          else
            inferred=$(printf '%s\n' "${text}" | grep -oE '[[:alnum:]_.-]+/[^[:space:],)]+' | sort -u | paste -sd, - || true)
          fi
          if [[ -n "${inferred}" ]]; then
            printf '%s' "${inferred}"
          else
            printf '%s' "${fallback}"
          fi
        }

        collect_allowlist_violations() {
          local changed_files="$1"
          local violations="" pattern file matched
          if [[ -z "${ALLOWLIST}" ]]; then
            return 0
          fi
          IFS=',' read -ra PATTERNS <<< "${ALLOWLIST}"
          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue
            matched="false"
            for pattern in "${PATTERNS[@]}"; do
              pattern=$(echo "${pattern}" | xargs)
              # shellcheck disable=SC2053
              if [[ "${file}" == ${pattern} ]]; then
                matched="true"
                break
              fi
            done
            if [[ "${matched}" != "true" ]]; then
              violations="${violations}${file}\n"
            fi
          done <<< "${changed_files}"
          if [[ -n "${violations}" ]]; then
            printf '%b' "${violations}"
          fi
        }
        run_agent() {
          local allow_writes="${1:-true}"
          case "${ENGINE}" in
            claude)
              export ANTHROPIC_API_KEY="${AGENT_TOKEN}"
              local -a ARGS=(-p "${PROMPT}" --bare)
              if [[ -n "${MAX_TURNS:-}" ]]; then ARGS+=(--max-turns "${MAX_TURNS}"); fi
              if [[ -n "${MODEL:-}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx claude "${ARGS[@]}"
              ;;
            copilot)
              export COPILOT_GITHUB_TOKEN="${AGENT_TOKEN}"
              local -a ARGS=(-p "${PROMPT}" --no-ask-user)
              if [[ -n "${MAX_TURNS:-}" ]]; then ARGS+=(--max-turns "${MAX_TURNS}"); fi
              if [[ -n "${MODEL:-}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx copilot "${ARGS[@]}"
              ;;
            codex)
              export OPENAI_API_KEY="${AGENT_TOKEN}"
              local -a ARGS=(--prompt "${PROMPT}" --auto-approve)
              if [[ -n "${MODEL:-}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx codex "${ARGS[@]}"
              ;;
            cursor)
              export CURSOR_API_KEY="${AGENT_TOKEN}"
              local -a ARGS=(-p "${PROMPT}" --trust)
              if [[ "${allow_writes}" == "true" && "${WORKING_DIRECTORY}" != "." ]]; then
                ARGS+=(--force)
              fi
              if [[ -n "${MODEL:-}" ]]; then ARGS+=(--model "${MODEL}"); fi
              if command -v agent >/dev/null 2>&1; then
                agent "${ARGS[@]}"
              elif command -v cursor-agent >/dev/null 2>&1; then
                cursor-agent "${ARGS[@]}"
              else
                echo "::error::Cursor CLI (agent) not found in PATH"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported engine: ${ENGINE}"
              exit 1
              ;;
          esac
        }

        commit_worktree_if_needed() {
          local msg="$1"
          (
            cd "${WORKTREE_PATH}"
            if git diff --quiet && git diff --cached --quiet && [[ -z "$(git status --porcelain)" ]]; then
              return 1
            fi
            git add -A
            git commit -m "${msg}"
            return 0
          )
        }

        build_agent_prompt() {
          local feedback="$1"
          if [[ -z "${feedback}" ]]; then
            printf '%s\n' "${PROMPT_TEXT}"
            return
          fi
          render_template "${PROMPT_IMPLEMENTER_FEEDBACK}" \
            base_prompt "${PROMPT_TEXT}" \
            feedback "${feedback}"
          printf '\n'
        }

        extract_last_json_fence() {
          local output_file="$1"
          awk '
            /^```json[[:space:]]*$/ { capture=1; block=""; next }
            capture && /^```[[:space:]]*$/ { blocks[++n]=block; capture=0; next }
            capture { block = block $0 "\n" }
            END { if (n > 0) printf "%s", blocks[n] }
          ' "${output_file}"
        }

        parse_verifier_output() {
          local output_file="$1"
          local json_blob line

          parsed="false"
          verdict="REJECT"
          reason="Verifier output missing or unclear"
          files=""
          issue=""
          fix=""

          json_blob="$(extract_last_json_fence "${output_file}")"
          if [[ -n "${json_blob}" ]] && jq -e '.verdict' >/dev/null 2>&1 <<< "${json_blob}"; then
            verdict=$(jq -r '.verdict' <<< "${json_blob}")
            reason=$(jq -r '.reason // empty' <<< "${json_blob}")
            issue=$(jq -r '.issue // empty' <<< "${json_blob}")
            fix=$(jq -r '.fix // empty' <<< "${json_blob}")
            files=$(jq -r '
              if (.files | type) == "array" then (.files | map(select(type == "string")) | join(","))
              elif (.files | type) == "string" then .files
              else empty end
            ' <<< "${json_blob}")
            parsed="true"
            return 0
          fi

          while IFS= read -r line; do
            if jq -e '.verdict' >/dev/null 2>&1 <<< "${line}"; then
              json_blob="${line}"
            fi
          done < <(tail -30 "${output_file}")

          if [[ -n "${json_blob}" ]]; then
            verdict=$(jq -r '.verdict' <<< "${json_blob}")
            reason=$(jq -r '.reason // empty' <<< "${json_blob}")
            issue=$(jq -r '.issue // empty' <<< "${json_blob}")
            fix=$(jq -r '.fix // empty' <<< "${json_blob}")
            files=$(jq -r '
              if (.files | type) == "array" then (.files | map(select(type == "string")) | join(","))
              elif (.files | type) == "string" then .files
              else empty end
            ' <<< "${json_blob}")
            parsed="true"
            return 0
          fi

          local verdict_line
          verdict_line=$(grep -E '^VERDICT:[[:space:]]*(APPROVE|REJECT)[[:space:]]*$' "${output_file}" | tail -1 || true)
          if [[ -n "${verdict_line}" ]]; then
            verdict=$(echo "${verdict_line}" | sed -E 's/^VERDICT:[[:space:]]*//')
            reason="$(parse_output_field "${output_file}" "REASON")"
            files="$(parse_output_field "${output_file}" "FILES")"
            issue="$(parse_output_field "${output_file}" "ISSUE")"
            fix="$(parse_output_field "${output_file}" "FIX")"
            [[ -n "${reason}" ]] || reason="No reason provided"
            parsed="true"
            echo "::warning::Verifier used legacy line format; prefer JSON verdict block"
            return 0
          fi

          local legacy_line
          legacy_line=$(grep -E '^(APPROVE|REJECT)([[:space:]:]|$)' "${output_file}" | tail -1 || true)
          if [[ -n "${legacy_line}" ]]; then
            verdict=$(echo "${legacy_line}" | grep -oE '^(APPROVE|REJECT)' | head -1)
            reason=$(echo "${legacy_line}" | sed -E 's/^(APPROVE|REJECT):?[[:space:]]*//')
            parsed="true"
            echo "::warning::Verifier used legacy verdict format; prefer JSON verdict block"
          fi
        }

        write_verifier_output_contract() {
          printf '%s\n' "${PROMPT_VERIFIER_OUTPUT_CONTRACT}"
        }

        run_verify() {
          local attempt_dir="$1"
          local attempt_num="$2"
          local attempt_committed="$3"
          local changed_files violations pattern file diff_stat attempt_diff_stat criteria prompt_file output_file json_blob open_rejections_text
          local verdict reason files issue fix summary parsed old_pwd="${PWD}"

          mkdir -p "${attempt_dir}"
          cd "${WORKTREE_PATH}"
          git fetch origin "${BASE_BRANCH}" --depth=1 2>/dev/null || true
          changed_files=$(git diff --name-only "origin/${BASE_BRANCH}...HEAD" -- . ':!.loop/' || true)
          if [[ -z "${changed_files}" ]]; then
            printf '%s\n' "APPROVE" > "${attempt_dir}/verdict"
            printf '%s\n' "No meaningful changes outside .loop/" > "${attempt_dir}/reason"
            cd "${old_pwd}"
            return 0
          fi

          violations=""
          IFS=',' read -ra PATTERNS <<< "${DENYLIST}"
          for pattern in "${PATTERNS[@]}"; do
            pattern=$(echo "${pattern}" | xargs)
            while IFS= read -r file; do
              # shellcheck disable=SC2053
              if [[ "${file}" == ${pattern} ]]; then
                violations="${violations}${file}\n"
              fi
            done <<< "${changed_files}"
          done
          if [[ -n "${violations}" ]]; then
            local denylist_files
            denylist_files=$(printf '%b' "${violations}" | sed '/^$/d' | paste -sd, -)
            record_structured_reject "${attempt_dir}" "${attempt_num}" "${denylist_files}" \
              "Changed files match the denylist" \
              "Remove or revert denylisted paths from the branch diff" \
              "Denylist violation: ${denylist_files}"
            cd "${old_pwd}"
            return 0
          fi

          violations="$(collect_allowlist_violations "${changed_files}")"
          if [[ -n "${violations}" ]]; then
            local allowlist_files
            allowlist_files=$(printf '%b' "${violations}" | sed '/^$/d' | paste -sd, -)
            record_structured_reject "${attempt_dir}" "${attempt_num}" "${allowlist_files}" \
              "Changed files are outside the allowlist" \
              "Limit changes to allowlisted paths or update the allowlist in the caller workflow" \
              "Allowlist violation: ${allowlist_files}"
            cd "${old_pwd}"
            return 0
          fi

          diff_stat=$(git diff --stat "origin/${BASE_BRANCH}...HEAD" -- . ':!.loop/' || true)
          attempt_diff_stat=""
          if [[ "${attempt_committed}" == "true" ]] && git rev-parse HEAD~1 >/dev/null 2>&1; then
            attempt_diff_stat=$(git diff --stat HEAD~1...HEAD -- . ':!.loop/' || true)
          elif [[ "${attempt_num}" -gt 1 ]]; then
            attempt_diff_stat="(no new commit in this attempt)"
          fi

          criteria="${AGENT_VERIFIER_CRITERIA}"
          if [[ -z "${criteria}" ]]; then
            criteria="${PROMPT_VERIFIER_DEFAULT_CRITERIA}"
          fi

          prompt_file="${attempt_dir}/verifier-prompt.txt"
          {
            if [[ "${attempt_num}" -gt 1 && "$(jq 'length' <<< "${OPEN_REJECTIONS_JSON}")" -gt 0 ]]; then
              open_rejections_text="$(format_open_rejections_for_prompt)"
              render_template "${PROMPT_VERIFIER_REGRESSION}" \
                attempt "${attempt_num}" \
                open_rejections "${open_rejections_text}" \
                attempt_delta "${attempt_diff_stat}"
              printf '\n\n'
            else
              render_template "${PROMPT_VERIFIER_INITIAL}" attempt "${attempt_num}"
              printf '\n\n'
            fi
            echo "## Task"
            echo ""
            printf '%s\n' "${PROMPT_VERIFIER_TASK}"
            echo ""
            echo "${criteria}"
            echo ""
            echo "## Input"
            echo ""
            echo "Skill: ${SKILL_NAME}"
            echo ""
            echo "### Branch Diff Stat"
            echo '```'
            echo "${diff_stat}"
            echo '```'
            echo ""
            if [[ -n "${VERIFIER_CONTEXT}" ]]; then
              echo "### Additional Context"
              echo ""
              printf '%s\n' "${VERIFIER_CONTEXT}"
              echo ""
            fi
            echo "### Full Diff"
            echo "Review the checked-out branch for full context."
            echo ""
            write_verifier_output_contract
          } > "${prompt_file}"

          output_file="${attempt_dir}/verifier-output.txt"
          PROMPT="$(cat "${prompt_file}")"
          MAX_TURNS="${AGENT_VERIFIER_MAX_TURNS}"
          MODEL="${AGENT_VERIFIER_MODEL}"
          WORKING_DIRECTORY="${WORKTREE_PATH}"
          export PROMPT MAX_TURNS MODEL WORKING_DIRECTORY
          if ! run_agent "false" 2>&1 | tee "${output_file}"; then
            echo "::warning::Verifier agent exited non-zero"
          fi

          parse_verifier_output "${output_file}"
          verdict=$(printf '%s' "${verdict}" | tr '[:lower:]' '[:upper:]')
          if [[ -f "${output_file}" ]]; then
            json_blob="$(extract_last_json_fence "${output_file}")"
            if [[ -n "${json_blob}" ]]; then
              printf '%s\n' "${json_blob}" > "${attempt_dir}/verifier-verdict.json"
            fi
          fi
          if [[ "${parsed}" != "true" ]]; then
            echo "::warning::Verifier verdict parse failed; defaulting to REJECT"
          fi
          if [[ "${verdict}" != "APPROVE" ]]; then
            verdict="REJECT"
            [[ -n "${issue}" ]] || issue="${reason}"
            [[ -n "${fix}" ]] || fix="${reason}"
            files="$(infer_files_from_text "${issue} ${reason}" "${changed_files//$'\n'/,}")"
            summary="${reason}"
            record_structured_reject "${attempt_dir}" "${attempt_num}" "${files}" "${issue}" "${fix}" "${summary}"
          else
            printf '%s\n' "${verdict}" > "${attempt_dir}/verdict"
            printf '%s\n' "${reason}" > "${attempt_dir}/reason"
          fi
          cd "${old_pwd}"
        }

        while [[ "${ATTEMPT}" -lt "${AGENT_LOOP_MAX_ATTEMPTS}" ]]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "::group::Loop attempt ${ATTEMPT}/${AGENT_LOOP_MAX_ATTEMPTS}"
          ATTEMPT_DIR="${STATUS_DIR}/attempt-${ATTEMPT}"
          mkdir -p "${ATTEMPT_DIR}"
          ATTEMPT_COMMITTED="false"
          sync_reject_feedback

          AGENT_PROMPT="$(build_agent_prompt "${REJECT_FEEDBACK}")"
          printf '%s\n' "${AGENT_PROMPT}" > "${ATTEMPT_DIR}/agent-prompt.txt"
          if [[ -n "${REJECT_FEEDBACK}" ]]; then
            echo "::group::Verifier feedback injected for attempt ${ATTEMPT}"
            printf '%s\n' "${REJECT_FEEDBACK}"
            echo "::endgroup::"
          fi

          PROMPT="${AGENT_PROMPT}"
          MAX_TURNS="${AGENT_IMPLEMENTER_MAX_TURNS}"
          MODEL="${AGENT_IMPLEMENTER_MODEL}"
          WORKING_DIRECTORY="${WORKTREE_PATH}"
          export PROMPT MAX_TURNS MODEL WORKING_DIRECTORY

          echo "Running implementer agent (fresh session)..."
          if ! run_agent "true" 2>&1 | tee "${ATTEMPT_DIR}/agent-output.txt"; then
            echo "::warning::Implementer agent exited non-zero on attempt ${ATTEMPT}"
          fi

          if commit_worktree_if_needed "${COMMIT_MESSAGE} (attempt ${ATTEMPT})"; then
            HAS_CHANGES="true"
            ATTEMPT_COMMITTED="true"
          elif [[ "${ATTEMPT}" -gt 1 && -n "${REJECT_FEEDBACK}" ]]; then
            echo "::error::Attempt ${ATTEMPT} produced no file changes while open rejections remain"
            record_structured_reject "${ATTEMPT_DIR}" "${ATTEMPT}" "" \
              "Implementer produced no file changes on retry" \
              "Edit the files listed in prior open rejections and commit the fixes" \
              "No file changes produced on retry; open rejections were not addressed"
            VERDICT="REJECT"
            REASON="No file changes produced on retry; open rejections were not addressed"
            echo "Verdict: ${VERDICT} — ${REASON}"
            echo "::endgroup::"
            continue
          elif [[ "${ATTEMPT}" -gt 1 ]]; then
            echo "::warning::Attempt ${ATTEMPT} produced no file changes; verifier will review the same diff as the previous attempt"
          fi

          if [[ "${HAS_CHANGES}" != "true" ]]; then
            VERDICT="${NO_CHANGES_VERDICT}"
            REASON="No file changes produced"
            echo "No changes; treating as ${VERDICT}."
            echo "::endgroup::"
            break
          fi

          echo "Running verifier (fresh session)..."
          run_verify "${ATTEMPT_DIR}" "${ATTEMPT}" "${ATTEMPT_COMMITTED}"
          VERDICT="$(cat "${ATTEMPT_DIR}/verdict")"
          REASON="$(cat "${ATTEMPT_DIR}/reason")"
          echo "Verdict: ${VERDICT} — ${REASON}"
          if [[ "${VERDICT}" == "REJECT" && -f "${ATTEMPT_DIR}/reject-files" ]]; then
            echo "Reject files: $(tr '\n' ',' < "${ATTEMPT_DIR}/reject-files" | sed 's/,$//')"
            echo "Reject fix: $(tr '\n' ' ' < "${ATTEMPT_DIR}/reject-fix")"
          fi
          echo "::endgroup::"

          if [[ "${VERDICT}" == "APPROVE" ]]; then
            OPEN_REJECTIONS_JSON='[]'
            break
          fi
        done

        if [[ "${VERDICT}" == "APPROVE" ]]; then
          OPEN_REJECTIONS_JSON='[]'
        fi

        {
          echo "verdict=${VERDICT}"
          echo "attempts=${ATTEMPT}"
          echo "has_changes=${HAS_CHANGES}"
          DELIM="REASON_$(openssl rand -hex 8)"
          echo "reason<<${DELIM}"
          echo "${REASON}"
          echo "${DELIM}"
          DELIM="OPEN_REJECTIONS_$(openssl rand -hex 8)"
          echo "open_rejections<<${DELIM}"
          echo "${OPEN_REJECTIONS_JSON}"
          echo "${DELIM}"
        } >> "${GITHUB_OUTPUT}"
        echo "Final: verdict=${VERDICT} attempts=${ATTEMPT} has_changes=${HAS_CHANGES}"
        if [[ "${VERDICT}" == "REJECT" && "$(jq 'length' <<< "${OPEN_REJECTIONS_JSON}")" -gt 0 ]]; then
          echo "::group::Open rejection history"
          format_open_rejections_for_prompt
          echo "::endgroup::"
        fi

    - name: Push Branch
      id: push
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}
        LOOP_HAS_CHANGES: ${{ steps.loop.outputs.has_changes }}
        WORKTREE_PATH: ${{ inputs.worktree_path }}
      run: |
        set -euo pipefail
        if ! [[ "${BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
          echo "::error::Invalid branch name: ${BRANCH}"
          exit 1
        fi
        if [[ "${LOOP_HAS_CHANGES}" != "true" ]]; then
          echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        cd "${WORKTREE_PATH}"
        git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"
        git push -u origin "${BRANCH}"
        echo "has_changes=true" >> "${GITHUB_OUTPUT}"

    - name: Cleanup Worktree
      if: always()
      shell: bash
      env:
        WORKTREE_PATH: ${{ inputs.worktree_path }}
      run: |
        set -euo pipefail
        cd "${GITHUB_WORKSPACE}"
        git worktree remove "${WORKTREE_PATH}" --force 2>/dev/null || true
        git worktree prune
