name: loop-state-read
description: "Read loop state JSON (targets map). Migrates legacy flat last_sha on first read."

inputs:
  default_branch:
    default: "main"
    description: "Default branch for legacy last_sha migration key"
    required: false
  state_file:
    description: "Path to state JSON file (e.g. .loop/state-docs-triage.json)"
    required: true
  target_key:
    default: ""
    description: "Optional target key (e.g. integration:main). Empty uses legacy integration:<default_branch>."
    required: false

outputs:
  acting_on_json:
    description: "JSON object for acting_on coordination state"
    value: ${{ steps.read.outputs.acting_on_json }}
  consecutive_failures:
    description: "Consecutive rejected outcomes for target (or legacy root)"
    value: ${{ steps.read.outputs.consecutive_failures }}
  current_sha:
    description: "Current HEAD commit SHA"
    value: ${{ steps.read.outputs.current_sha }}
  last_reject_reason:
    description: "Most recent verifier rejection reason for target"
    value: ${{ steps.read.outputs.last_reject_reason }}
  last_sha:
    description: "Last processed SHA for target (or legacy root)"
    value: ${{ steps.read.outputs.last_sha }}
  open_rejections:
    description: "JSON array of open rejections for target"
    value: ${{ steps.read.outputs.open_rejections }}
  open_rejections_prompt:
    description: "Formatted open rejections for implementer prompt injection"
    value: ${{ steps.read.outputs.open_rejections_prompt }}
  targets_json:
    description: "Full targets map JSON"
    value: ${{ steps.read.outputs.targets_json }}

runs:
  using: composite
  steps:
    - name: Read State
      id: read
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ inputs.default_branch }}
        STATE_FILE: ${{ inputs.state_file }}
        TARGET_KEY: ${{ inputs.target_key }}
      run: |
        set -euo pipefail
        RESOLVED_KEY="${TARGET_KEY}"
        if [[ -z "${RESOLVED_KEY}" ]]; then
          RESOLVED_KEY="integration:${DEFAULT_BRANCH}"
        fi

        CONSECUTIVE_FAILURES="0"
        LAST_REJECT_REASON=""
        LAST_SHA=""
        OPEN_REJECTIONS_JSON='[]'
        OPEN_REJECTIONS_PROMPT=""
        ACTING_ON_JSON='null'
        TARGETS_JSON='{}'

        if [[ -f "${STATE_FILE}" ]]; then
          if ! jq -e '.targets' "${STATE_FILE}" >/dev/null 2>&1; then
            LEGACY_SHA=$(jq -r '.last_sha // empty' "${STATE_FILE}" 2>/dev/null || true)
            LEGACY_OUTCOME=$(jq -r '.outcome // empty' "${STATE_FILE}" 2>/dev/null || true)
            LEGACY_FAILURES=$(jq -r '.consecutive_failures // 0' "${STATE_FILE}" 2>/dev/null || echo "0")
            LEGACY_REJECT=$(jq -r '.last_reject_reason // empty' "${STATE_FILE}" 2>/dev/null || true)
            LEGACY_OPEN=$(jq -c '.open_rejections // []' "${STATE_FILE}" 2>/dev/null || echo '[]')
            jq \
              --arg key "${RESOLVED_KEY}" \
              --arg last_sha "${LEGACY_SHA}" \
              --arg outcome "${LEGACY_OUTCOME}" \
              --arg last_reject_reason "${LEGACY_REJECT}" \
              --argjson consecutive_failures "${LEGACY_FAILURES}" \
              --argjson open_rejections "${LEGACY_OPEN}" \
              '
              .targets = (.targets // {}) |
              .targets[$key] = (
                .targets[$key] // {}
                | if $last_sha != "" then .last_sha = $last_sha else . end
                | if $outcome != "" then .outcome = $outcome else . end
                | .consecutive_failures = $consecutive_failures
                | if $last_reject_reason != "" then .last_reject_reason = $last_reject_reason else . end
                | .open_rejections = $open_rejections
              )
              | del(.last_sha, .outcome, .consecutive_failures, .last_reject_reason, .open_rejections)
              ' "${STATE_FILE}" > "${STATE_FILE}.tmp"
            mv "${STATE_FILE}.tmp" "${STATE_FILE}"
          fi

          TARGETS_JSON=$(jq -c '.targets // {}' "${STATE_FILE}" 2>/dev/null || echo '{}')
          ACTING_ON_JSON=$(jq -c '.acting_on // null' "${STATE_FILE}" 2>/dev/null || echo 'null')
          CONSECUTIVE_FAILURES=$(jq -r --arg key "${RESOLVED_KEY}" '.targets[$key].consecutive_failures // 0' "${STATE_FILE}" 2>/dev/null || echo "0")
          LAST_REJECT_REASON=$(jq -r --arg key "${RESOLVED_KEY}" '.targets[$key].last_reject_reason // empty' "${STATE_FILE}" 2>/dev/null || true)
          LAST_SHA=$(jq -r --arg key "${RESOLVED_KEY}" '.targets[$key].last_sha // empty' "${STATE_FILE}" 2>/dev/null || true)
          OPEN_REJECTIONS_JSON=$(jq -c --arg key "${RESOLVED_KEY}" '.targets[$key].open_rejections // []' "${STATE_FILE}" 2>/dev/null || echo '[]')
        fi

        if [[ "$(jq 'length' <<< "${OPEN_REJECTIONS_JSON}")" -gt 0 ]]; then
          OPEN_REJECTIONS_PROMPT=$(jq -r '.[] | "### Attempt \(.attempt // "-")\n- **Files:** " + (if (.files | length) > 0 then (.files | join(", ")) else "not specified" end) + "\n- **Issue:** \(.issue)\n- **Required fix:** \(.fix)\n"' \
            <<< "${OPEN_REJECTIONS_JSON}")
        fi

        if [[ -z "${CONSECUTIVE_FAILURES}" ]]; then
          CONSECUTIVE_FAILURES="0"
        fi
        if [[ -z "${LAST_SHA}" ]]; then
          LAST_SHA=$(git rev-parse --verify HEAD~10 2>/dev/null || git rev-list --max-parents=0 HEAD | head -1)
        fi

        {
          DELIM="ACTING_ON_$(openssl rand -hex 8)"
          echo "acting_on_json<<${DELIM}"
          echo "${ACTING_ON_JSON}"
          echo "${DELIM}"
          echo "consecutive_failures=${CONSECUTIVE_FAILURES}"
          echo "current_sha=$(git rev-parse HEAD)"
          if [[ -n "${LAST_REJECT_REASON}" ]]; then
            DELIM="LAST_REJECT_REASON_$(openssl rand -hex 8)"
            echo "last_reject_reason<<${DELIM}"
            echo "${LAST_REJECT_REASON}"
            echo "${DELIM}"
          else
            echo "last_reject_reason="
          fi
          echo "last_sha=${LAST_SHA}"
          DELIM="OPEN_REJECTIONS_$(openssl rand -hex 8)"
          echo "open_rejections<<${DELIM}"
          echo "${OPEN_REJECTIONS_JSON}"
          echo "${DELIM}"
          if [[ -n "${OPEN_REJECTIONS_PROMPT}" ]]; then
            DELIM="OPEN_REJECTIONS_PROMPT_$(openssl rand -hex 8)"
            echo "open_rejections_prompt<<${DELIM}"
            echo "${OPEN_REJECTIONS_PROMPT}"
            echo "${DELIM}"
          else
            echo "open_rejections_prompt="
          fi
          DELIM="TARGETS_JSON_$(openssl rand -hex 8)"
          echo "targets_json<<${DELIM}"
          echo "${TARGETS_JSON}"
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"
