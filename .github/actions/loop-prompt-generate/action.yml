name: loop-prompt-generate
description: "Generate a structured prompt for loop agent execution from skill name and context."

inputs:
  context:
    default: ""
    description: "Additional context to include in the prompt (multiline text, e.g. state data, detection results)"
    required: false
  skill_name:
    description: "Name of the skill to invoke (e.g. loop-docs-triage)"
    required: true

outputs:
  prompt:
    description: "Generated prompt text for agent consumption"
    value: ${{ steps.generate.outputs.prompt }}

runs:
  using: composite
  steps:
    - name: Generate Prompt
      id: generate
      shell: bash
      env:
        CONTEXT: ${{ inputs.context }}
        SKILL_NAME: ${{ inputs.skill_name }}
      run: |
        set -euo pipefail
        DELIM="PROMPT_DELIM_$(openssl rand -hex 8)"
        {
          echo "prompt<<${DELIM}"
          echo "Run the ${SKILL_NAME} skill."
          if [[ -n "${CONTEXT}" ]]; then
            echo ""
            echo "## Context"
            echo "${CONTEXT}"
          fi
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"
