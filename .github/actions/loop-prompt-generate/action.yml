name: loop-prompt-generate
description: "Generate a structured implementer prompt from skill name, context, domain instructions, and generic loop constraints."

inputs:
  allowlist:
    default: ""
    description: "Comma-separated glob allowlist injected into generic path constraints"
    required: false
  context:
    default: ""
    description: "Operational context (multiline text, e.g. state data, detection results, open rejections)"
    required: false
  instructions:
    default: ""
    description: "Domain-specific task instructions from the caller workflow (multiline markdown)"
    required: false
  level:
    default: ""
    description: "Autonomy level (L1 | L2 | L3) for legacy level constraints shim"
    required: false
  may_edit:
    default: ""
    description: "Agent worktree edit gate: true | false"
    required: false
  report_file:
    default: ""
    description: "Report output path when write_target is report"
    required: false
  skill_name:
    description: "Name of the skill to invoke (e.g. loop-docs-triage)"
    required: true
  write_target:
    default: ""
    description: "Agent artifact when may_edit is true: fix | report"
    required: false

outputs:
  prompt:
    description: "Generated prompt text for agent consumption"
    value: ${{ steps.generate.outputs.prompt }}

runs:
  using: composite
  steps:
    - name: Generate Prompt
      id: generate
      shell: bash
      env:
        ALLOWLIST: ${{ inputs.allowlist }}
        CONTEXT: ${{ inputs.context }}
        INSTRUCTIONS: ${{ inputs.instructions }}
        LEVEL: ${{ inputs.level }}
        MAY_EDIT: ${{ inputs.may_edit }}
        REPORT_FILE: ${{ inputs.report_file }}
        SKILL_NAME: ${{ inputs.skill_name }}
        WRITE_TARGET: ${{ inputs.write_target }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source "${{ github.action_path }}/lib/build_constraints.sh"
        DELIM="PROMPT_DELIM_$(openssl rand -hex 8)"
        {
          echo "prompt<<${DELIM}"
          echo "Run the ${SKILL_NAME} skill."
          if [[ -n "${CONTEXT}" ]]; then
            echo ""
            echo "## Context"
            echo "${CONTEXT}"
          fi
          if [[ -n "${INSTRUCTIONS}" ]]; then
            echo ""
            echo "## Instructions"
            echo "${INSTRUCTIONS}"
          fi
          if [[ -n "${MAY_EDIT}" ]]; then
            echo ""
            emit_loop_constraints "${MAY_EDIT}" "${WRITE_TARGET}" "${ALLOWLIST}" "${REPORT_FILE}"
          elif [[ -n "${LEVEL}" || -n "${ALLOWLIST}" ]]; then
            echo ""
            emit_loop_constraints "${LEVEL}" "${ALLOWLIST}"
          fi
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"
