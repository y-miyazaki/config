name: loop-worktree-push
description: "Commit and push changes from a loop worktree, then clean up."

inputs:
  branch:
    description: "Branch name to push"
    required: true
  commit_message:
    default: "docs: loop-automated documentation update"
    description: "Commit message for changes"
    required: false
  token:
    description: "GitHub token for push (must match token used in loop-worktree-setup)"
    required: true
  worktree_path:
    description: "Path to the worktree"
    required: true

outputs:
  has_changes:
    description: "Whether any files were committed (true/false)"
    value: ${{ steps.push.outputs.has_changes }}

runs:
  using: composite
  steps:
    - name: Validate Branch Name
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
      run: |
        set -euo pipefail
        if ! [[ "${BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
          echo "::error::Invalid branch name: ${BRANCH}"
          exit 1
        fi

    - name: Commit and Push
      id: push
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        GH_TOKEN: ${{ inputs.token }}
        WORKTREE_PATH: ${{ inputs.worktree_path }}
      run: |
        set -euo pipefail
        cd "${WORKTREE_PATH}"

        # Configure auth in worktree
        git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

        if git diff --quiet && git diff --cached --quiet && [[ -z "$(git status --porcelain)" ]]; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No changes to commit."
          exit 0
        fi

        git add -A
        git commit -m "${COMMIT_MESSAGE}"
        git push -u origin "${BRANCH}"
        echo "has_changes=true" >> "$GITHUB_OUTPUT"

    - name: Cleanup Worktree
      if: always()
      shell: bash
      env:
        WORKTREE_PATH: ${{ inputs.worktree_path }}
      run: |
        set -euo pipefail
        cd "${GITHUB_WORKSPACE}"
        git worktree remove "${WORKTREE_PATH}" --force 2>/dev/null || true
        git worktree prune
