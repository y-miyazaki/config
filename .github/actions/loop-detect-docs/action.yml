name: loop-detect-docs
description: "Detect documentation impact from a commit range. Returns affected docs and skip flag."

inputs:
  current_sha:
    description: "Current HEAD SHA (end of range)"
    required: true
  last_sha:
    description: "Last processed SHA (start of range)"
    required: true

outputs:
  result:
    description: "JSON detection result (changed_files, affected_docs, etc.)"
    value: ${{ steps.detect.outputs.result }}
  skip:
    description: "Whether to skip (true if no docs impact)"
    value: ${{ steps.detect.outputs.skip }}

runs:
  using: composite
  steps:
    - name: Detect Documentation Changes
      id: detect
      shell: bash
      env:
        CURRENT_SHA: ${{ inputs.current_sha }}
        LAST_SHA: ${{ inputs.last_sha }}
      run: |
        set -euo pipefail
        DETECT_SCRIPT=".claude/skills/docs-updater/scripts/detect_changes.sh"
        if [[ ! -f "${DETECT_SCRIPT}" ]]; then
          echo "::error::detect_changes.sh not found at ${DETECT_SCRIPT}"
          exit 1
        fi
        RESULT=$(bash "${DETECT_SCRIPT}" --scope range --since "${LAST_SHA}")
        SKIP=$(echo "${RESULT}" | jq -r '.skip // "true"')
        DELIM="RESULT_$(openssl rand -hex 8)"
        {
          echo "skip=${SKIP}"
          echo "result<<${DELIM}"
          echo "${RESULT}"
          echo "${DELIM}"
        } >> "$GITHUB_OUTPUT"
