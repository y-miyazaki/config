name: loop-install-cli
description: "Install an AI agent CLI (claude/copilot/codex/cursor) once for subsequent loop actions."

inputs:
  cli_version:
    default: "latest"
    description: "CLI package version"
    required: false
  engine:
    description: "AI engine (claude | copilot | codex | cursor)"
    required: true
  node_version:
    default: "24.18.0"
    description: "Node.js version for MCP servers (npx); keep aligned with mise.toml node"
    required: false
  uv_version:
    default: "0.11.28"
    description: "uv version for MCP servers (uvx); keep aligned with mise.toml aqua:astral-sh/uv"
    required: false

outputs:
  package:
    description: "Resolved npm package name (empty for cursor)"
    value: ${{ steps.install.outputs.package }}
  version:
    description: "Resolved CLI version"
    value: ${{ steps.install.outputs.version }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
        prune-cache: true
        version: ${{ inputs.uv_version }}

    - name: Install CLI
      id: install
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli_version }}
        ENGINE: ${{ inputs.engine }}
      run: bash "${GITHUB_ACTION_PATH}/lib/install.sh"
