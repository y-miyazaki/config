name: loop-agent-run
description: "Run an AI agent (claude/copilot/codex) with a prompt. Handles install, caching, and execution."

inputs:
  agent_token:
    description: "Authentication token for the selected engine (ANTHROPIC_API_KEY for claude, COPILOT_GITHUB_TOKEN for copilot, OPENAI_API_KEY for codex)"
    required: true
  claude_args:
    default: ""
    description: "Additional arguments for Claude (claude engine only)"
    required: false
  cli_version:
    default: "latest"
    description: "CLI package version (copilot/codex engine)"
    required: false
  engine:
    description: "AI engine (claude or copilot or codex)"
    required: true
  max_turns:
    default: "5"
    description: "Maximum agent conversation turns"
    required: false
  model:
    default: ""
    description: "Optional model override"
    required: false
  prompt_text:
    description: "Prompt text to pass to the agent"
    required: true
  working_directory:
    default: "."
    description: "Working directory for agent execution (CLI engines only)"
    required: false

runs:
  using: composite
  steps:
    # --- Claude (Action-managed) ---
    - name: Run Claude
      if: inputs.engine == 'claude'
      uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
      with:
        anthropic_api_key: ${{ inputs.agent_token }}
        claude_args: "--max-turns ${{ inputs.max_turns }}${{ inputs.model != '' && format(' --model {0}', inputs.model) || '' }}${{ inputs.claude_args != '' && format(' {0}', inputs.claude_args) || '' }}"
        prompt: ${{ inputs.prompt_text }}

    # --- CLI engines (copilot/codex) ---
    - name: Setup Node.js
      if: inputs.engine != 'claude'
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0

    - name: Resolve CLI Package Info
      if: inputs.engine != 'claude'
      id: pkg
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli_version }}
        ENGINE: ${{ inputs.engine }}
      run: |
        set -euo pipefail
        case "${ENGINE}" in
          copilot) PKG="@github/copilot" ;;
          codex)   PKG="@openai/codex" ;;
          *)
            echo "::error::Unsupported engine: ${ENGINE}"
            exit 1
            ;;
        esac
        if [[ "${CLI_VERSION}" == "latest" ]]; then
          RESOLVED=$(npm view "${PKG}" version 2>/dev/null || echo "latest")
        else
          RESOLVED="${CLI_VERSION}"
        fi
        NPM_GLOBAL_PREFIX=$(npm config get prefix)
        {
          echo "package=${PKG}"
          echo "version=${RESOLVED}"
          echo "prefix=${NPM_GLOBAL_PREFIX}"
        } >> "$GITHUB_OUTPUT"

    - name: Cache CLI
      if: inputs.engine != 'claude'
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: loop-cli-${{ inputs.engine }}-${{ steps.pkg.outputs.version }}
        path: ${{ steps.pkg.outputs.prefix }}/lib/node_modules

    - name: Install CLI
      if: inputs.engine != 'claude' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        CLI_VERSION: ${{ steps.pkg.outputs.version }}
        PACKAGE: ${{ steps.pkg.outputs.package }}
      run: |
        set -euo pipefail
        npm install -g "${PACKAGE}@${CLI_VERSION}"

    - name: Link CLI Binary
      if: inputs.engine != 'claude' && steps.cache.outputs.cache-hit == 'true'
      shell: bash
      env:
        ENGINE: ${{ inputs.engine }}
        PREFIX: ${{ steps.pkg.outputs.prefix }}
      run: |
        set -euo pipefail
        case "${ENGINE}" in
          copilot) npm link -g "${PREFIX}/lib/node_modules/@github/copilot" ;;
          codex)   npm link -g "${PREFIX}/lib/node_modules/@openai/codex" ;;
        esac

    - name: Verify CLI
      if: inputs.engine != 'claude'
      shell: bash
      env:
        ENGINE: ${{ inputs.engine }}
      run: |
        set -euo pipefail
        case "${ENGINE}" in
          copilot) copilot --version ;;
          codex)   codex --version ;;
        esac

    - name: Run CLI Agent
      if: inputs.engine != 'claude'
      shell: bash
      env:
        AGENT_TOKEN: ${{ inputs.agent_token }}
        ENGINE: ${{ inputs.engine }}
        MAX_TURNS: ${{ inputs.max_turns }}
        MODEL: ${{ inputs.model }}
        PROMPT: ${{ inputs.prompt_text }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        # Set engine-specific auth env var
        case "${ENGINE}" in
          copilot) export COPILOT_GITHUB_TOKEN="${AGENT_TOKEN}" ;;
          codex)   export OPENAI_API_KEY="${AGENT_TOKEN}" ;;
        esac
        # Run
        case "${ENGINE}" in
          copilot)
            ARGS=(-p "${PROMPT}" --no-ask-user)
            if [[ -n "${MAX_TURNS}" ]]; then ARGS+=(--max-turns "${MAX_TURNS}"); fi
            if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
            copilot "${ARGS[@]}"
            ;;
          codex)
            ARGS=(--prompt "${PROMPT}" --auto-approve)
            if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
            codex "${ARGS[@]}"
            ;;
        esac
