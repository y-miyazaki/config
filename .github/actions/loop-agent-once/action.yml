name: loop-agent-once
description: "Run a single AI agent session (claude/copilot/codex/cursor). For non-loop one-shot use."

inputs:
  agent_token:
    description: "Authentication token for the selected engine (ANTHROPIC_API_KEY for claude, COPILOT_GITHUB_TOKEN for copilot, CURSOR_API_KEY for cursor, OPENAI_API_KEY for codex)"
    required: true
  cli_version:
    default: "latest"
    description: "CLI package version"
    required: false
  engine:
    description: "AI engine (claude or copilot or codex or cursor)"
    required: true
  max_turns:
    default: "5"
    description: "Maximum agent conversation turns"
    required: false
  model:
    default: ""
    description: "Optional model override"
    required: false
  node_version:
    default: "24.18.0"
    description: "Node.js version for MCP servers (npx); keep aligned with mise.toml node"
    required: false
  output_file:
    default: ""
    description: "Optional path to write agent stdout"
    required: false
  prompt_text:
    description: "Prompt text to pass to the agent"
    required: true
  uv_version:
    default: "0.11.28"
    description: "uv version for MCP servers (uvx); keep aligned with mise.toml aqua:astral-sh/uv"
    required: false
  working_directory:
    default: "."
    description: "Working directory for agent execution"
    required: false

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true
        prune-cache: true
        version: ${{ inputs.uv_version }}

    - name: Install CLI
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli_version }}
        ENGINE: ${{ inputs.engine }}
      run: bash "${GITHUB_ACTION_PATH}/../loop-install-cli/lib/install.sh"

    - name: Run CLI Agent
      shell: bash
      env:
        AGENT_TOKEN: ${{ inputs.agent_token }}
        ENGINE: ${{ inputs.engine }}
        MAX_TURNS: ${{ inputs.max_turns }}
        MODEL: ${{ inputs.model }}
        OUTPUT_FILE: ${{ inputs.output_file }}
        PROMPT: ${{ inputs.prompt_text }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source "${GITHUB_ACTION_PATH}/../loop-execute/lib/mcp.sh"
        run_agent() {
          prepare_agent_mcps "${ENGINE}" "${WORKING_DIRECTORY:-.}"
          case "${ENGINE}" in
            claude)
              export ANTHROPIC_API_KEY="${AGENT_TOKEN}"
              ARGS=(-p "${PROMPT}" --bare)
              append_agent_mcp_args ARGS "${ENGINE}"
              if [[ -n "${MAX_TURNS}" ]]; then ARGS+=(--max-turns "${MAX_TURNS}"); fi
              if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx claude "${ARGS[@]}"
              ;;
            copilot)
              export COPILOT_GITHUB_TOKEN="${AGENT_TOKEN}"
              ARGS=(-p "${PROMPT}" --no-ask-user)
              append_agent_mcp_args ARGS "${ENGINE}"
              if [[ -n "${MAX_TURNS}" ]]; then ARGS+=(--max-turns "${MAX_TURNS}"); fi
              if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx copilot "${ARGS[@]}"
              ;;
            codex)
              export OPENAI_API_KEY="${AGENT_TOKEN}"
              ARGS=(--prompt "${PROMPT}" --auto-approve)
              append_agent_mcp_args ARGS "${ENGINE}"
              if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
              npx codex "${ARGS[@]}"
              ;;
            cursor)
              export CURSOR_API_KEY="${AGENT_TOKEN}"
              ARGS=(-p "${PROMPT}" --trust)
              append_agent_mcp_args ARGS "${ENGINE}"
              if [[ "${WORKING_DIRECTORY}" != "." ]]; then
                ARGS+=(--force)
              fi
              if [[ -n "${MODEL}" ]]; then ARGS+=(--model "${MODEL}"); fi
              if command -v agent >/dev/null 2>&1; then
                agent "${ARGS[@]}"
              elif command -v cursor-agent >/dev/null 2>&1; then
                cursor-agent "${ARGS[@]}"
              else
                echo "::error::Cursor CLI (agent) not found in PATH"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported engine: ${ENGINE}"
              exit 1
              ;;
          esac
        }
        if [[ -n "${OUTPUT_FILE}" ]]; then
          run_agent 2>&1 | tee "${OUTPUT_FILE}"
        else
          run_agent
        fi
