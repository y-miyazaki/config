name: loop-detect
description: "Detect loop work: enumerate branches/PRs, run detect script per context, build target_matrix."

inputs:
  agent_implementer_max_turns:
    description: "Maximum implementer agent turns per loop attempt"
    required: true
  agent_implementer_model:
    description: "Implementer model override"
    required: true
  agent_loop_max_attempts:
    description: "Maximum Agent→Verify loop attempts"
    required: true
  agent_verifier_criteria:
    description: "Domain-specific APPROVE/REJECT criteria (markdown)"
    required: true
  agent_verifier_max_turns:
    description: "Maximum verifier agent turns"
    required: true
  agent_verifier_model:
    description: "Verifier model override"
    required: true
  allowlist:
    description: "Comma-separated glob allowlist passed to execute"
    required: true
  base_branch:
    description: "Default branch for state migration and fallback integration scan"
    required: true
  budget_file:
    default: ".loop/loop-budget.json"
    description: "Path to loop budget JSON policy file (per-loop keys override budget_max_* inputs)"
    required: false
  budget_max_runs_per_day:
    default: ""
    description: "Default daily run limit when budget file is absent or omits max_runs_per_day"
    required: false
  budget_max_tokens_per_day:
    default: ""
    description: "Default daily token limit when budget file is absent or omits max_tokens_per_day"
    required: false
  detect_script:
    description: "Path to domain detect script (bash)"
    required: true
  engine:
    description: "AI engine (claude | copilot | codex | cursor)"
    required: true
  infer_files_pattern:
    default: ""
    description: "Optional extended-regex to infer file paths from verifier text"
    required: false
  level:
    description: "Autonomy level (L1 | L2 | L3)"
    required: true
  loop_branch_match:
    default: "glob"
    description: "Branch pattern mode: list | glob | regex"
    required: false
  loop_finalize_integration:
    default: "open_pr"
    description: "Finalize strategy for integration targets: open_pr | push"
    required: false
  loop_finalize_pull_request:
    default: "open_pr"
    description: "Finalize strategy for pull_request targets: open_pr | push_head"
    required: false
  loop_integration_branches:
    default: ""
    description: "Comma-separated integration branch patterns (empty = base_branch only)"
    required: false
  loop_max_targets_per_schedule:
    default: "3"
    description: "Maximum targets per detect run (fan-out cap)"
    required: false
  loop_name:
    description: "Loop name for budget lookup (e.g. docs-triage)"
    required: true
  loop_pr_exclude:
    default: "fork,draft,label:no-loop"
    description: "PR exclusion tokens (fork,draft,label:<name>,wip_title)"
    required: false
  loop_pr_include_bots:
    default: ""
    description: "Bot logins to include when scanning PRs (empty = exclude all bots)"
    required: false
  loop_pr_enabled:
    default: "false"
    description: "Whether to enumerate open pull request heads (pr_enabled)"
    required: false
  loop_priority:
    default: "integration,pull_request"
    description: "Target mode priority order (comma-separated)"
    required: false
  loop_state_push_branch:
    default: ""
    description: "Branch for .loop/* persistence (empty = repository default branch)"
    required: false
  no_changes_verdict:
    default: "APPROVE"
    description: "Verdict when implementer produces no file changes (APPROVE or REJECT)"
    required: false
  pr_body:
    default: ""
    description: "PR body static section for finalize (domain-specific)"
    required: false
  pr_title:
    default: ""
    description: "PR title for finalize"
    required: false
  prompt_instructions:
    default: ""
    description: "Domain-specific implementer instructions passed to loop-prompt-generate"
    required: false
  run_log_file:
    default: ".loop/loop-run-log.md"
    description: "Path to JSONL run log for budget aggregation"
    required: false
  skill_name:
    description: "Skill name to invoke (e.g. loop-docs-triage)"
    required: true
  state_file:
    default: ""
    description: "Path to loop state JSON file (default: .loop/state-<loop_name>.json)"
    required: false
  token:
    description: "GitHub token for PR enumeration (defaults to github.token in caller)"
    default: ""
    required: false

outputs:
  agent_implementer_max_turns:
    description: "Implementer max turns"
    value: ${{ steps.config.outputs.agent_implementer_max_turns }}
  agent_implementer_model:
    description: "Implementer model"
    value: ${{ steps.config.outputs.agent_implementer_model }}
  agent_loop_max_attempts:
    description: "Loop max attempts"
    value: ${{ steps.config.outputs.agent_loop_max_attempts }}
  agent_verifier_criteria:
    description: "Verifier criteria"
    value: ${{ steps.config.outputs.agent_verifier_criteria }}
  agent_verifier_max_turns:
    description: "Verifier max turns"
    value: ${{ steps.config.outputs.agent_verifier_max_turns }}
  agent_verifier_model:
    description: "Verifier model"
    value: ${{ steps.config.outputs.agent_verifier_model }}
  allowlist:
    description: "Allowlist for execute job"
    value: ${{ inputs.allowlist }}
  base_branch:
    description: "Base branch"
    value: ${{ steps.config.outputs.base_branch }}
  consecutive_failures:
    description: "Consecutive failures for first matrix cell (legacy compat)"
    value: ${{ steps.detect.outputs.consecutive_failures }}
  current_sha:
    description: "Current SHA for first matrix cell (legacy compat)"
    value: ${{ steps.detect.outputs.current_sha }}
  engine:
    description: "AI engine"
    value: ${{ steps.config.outputs.engine }}
  infer_files_pattern:
    description: "Infer files pattern for execute"
    value: ${{ inputs.infer_files_pattern }}
  last_sha:
    description: "Last processed SHA for first matrix cell (legacy compat)"
    value: ${{ steps.detect.outputs.last_sha }}
  level:
    description: "Autonomy level"
    value: ${{ steps.config.outputs.level }}
  loop_name:
    description: "Loop name for budget lookup and run log pattern"
    value: ${{ inputs.loop_name }}
  no_changes_verdict:
    description: "Verdict when implementer produces no file changes"
    value: ${{ inputs.no_changes_verdict }}
  pr_body:
    description: "PR body static section for finalize"
    value: ${{ inputs.pr_body }}
  pr_title:
    description: "PR title for finalize"
    value: ${{ inputs.pr_title }}
  prompt:
    description: "Generated implementer prompt for first matrix cell (legacy compat)"
    value: ${{ steps.detect.outputs.prompt }}
  should_run:
    description: "Whether the execute job should run"
    value: ${{ steps.detect.outputs.should_run }}
  skill_name:
    description: "Skill name"
    value: ${{ steps.config.outputs.skill_name }}
  skip_reason:
    description: "Why execution was skipped (none | no_changes | circuit_breaker | budget | target_budget | checkout_failed | config_error | pending_pr)"
    value: ${{ steps.detect.outputs.skip_reason }}
  state_file:
    description: "Resolved loop state JSON path"
    value: ${{ steps.paths.outputs.state_file }}
  handoff_artifact_name:
    description: "Uploaded artifact name for loop-handoff bundle (empty when should_run=false)"
    value: ${{ steps.handoff.outputs.artifact_name }}
  target_matrix:
    description: "JSON array of candidates for matrix fan-out"
    value: ${{ steps.detect.outputs.target_matrix }}

runs:
  using: composite
  steps:
    - name: Pack Config
      id: config
      shell: bash
      env:
        AGENT_IMPLEMENTER_MAX_TURNS: ${{ inputs.agent_implementer_max_turns }}
        AGENT_IMPLEMENTER_MODEL: ${{ inputs.agent_implementer_model }}
        AGENT_LOOP_MAX_ATTEMPTS: ${{ inputs.agent_loop_max_attempts }}
        AGENT_VERIFIER_CRITERIA: ${{ inputs.agent_verifier_criteria }}
        AGENT_VERIFIER_MAX_TURNS: ${{ inputs.agent_verifier_max_turns }}
        AGENT_VERIFIER_MODEL: ${{ inputs.agent_verifier_model }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        ENGINE: ${{ inputs.engine }}
        LEVEL: ${{ inputs.level }}
        SKILL_NAME: ${{ inputs.skill_name }}
      run: |
        set -euo pipefail
        CRITERIA_DELIM="CRITERIA_$(openssl rand -hex 8)"
        {
          echo "agent_implementer_max_turns=${AGENT_IMPLEMENTER_MAX_TURNS}"
          echo "agent_implementer_model=${AGENT_IMPLEMENTER_MODEL}"
          echo "agent_loop_max_attempts=${AGENT_LOOP_MAX_ATTEMPTS}"
          echo "agent_verifier_criteria<<${CRITERIA_DELIM}"
          echo "${AGENT_VERIFIER_CRITERIA}"
          echo "${CRITERIA_DELIM}"
          echo "agent_verifier_max_turns=${AGENT_VERIFIER_MAX_TURNS}"
          echo "agent_verifier_model=${AGENT_VERIFIER_MODEL}"
          echo "base_branch=${BASE_BRANCH}"
          echo "engine=${ENGINE}"
          echo "level=${LEVEL}"
          echo "skill_name=${SKILL_NAME}"
        } >> "$GITHUB_OUTPUT"

    - name: Resolve State File
      id: paths
      shell: bash
      env:
        LOOP_NAME: ${{ inputs.loop_name }}
        STATE_FILE_INPUT: ${{ inputs.state_file }}
      run: |
        set -euo pipefail
        if [[ -n "${STATE_FILE_INPUT}" ]]; then
          echo "state_file=${STATE_FILE_INPUT}" >> "$GITHUB_OUTPUT"
        else
          echo "state_file=.loop/state-${LOOP_NAME}.json" >> "$GITHUB_OUTPUT"
        fi

    - name: Detect Targets
      id: detect
      shell: bash
      env:
        ALLOWLIST: ${{ inputs.allowlist }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        BUDGET_FILE: ${{ inputs.budget_file }}
        BUDGET_MAX_RUNS_PER_DAY: ${{ inputs.budget_max_runs_per_day }}
        BUDGET_MAX_TOKENS_PER_DAY: ${{ inputs.budget_max_tokens_per_day }}
        DETECT_SCRIPT: ${{ inputs.detect_script }}
        GH_TOKEN: ${{ inputs.token != '' && inputs.token || github.token }}
        LEVEL: ${{ inputs.level }}
        LOOP_BRANCH_MATCH: ${{ inputs.loop_branch_match }}
        LOOP_FINALIZE_INTEGRATION: ${{ inputs.loop_finalize_integration }}
        LOOP_FINALIZE_PULL_REQUEST: ${{ inputs.loop_finalize_pull_request }}
        LOOP_INTEGRATION_BRANCHES: ${{ inputs.loop_integration_branches }}
        LOOP_MAX_TARGETS_PER_SCHEDULE: ${{ inputs.loop_max_targets_per_schedule }}
        LOOP_NAME: ${{ inputs.loop_name }}
        LOOP_PR_EXCLUDE: ${{ inputs.loop_pr_exclude }}
        LOOP_PR_INCLUDE_BOTS: ${{ inputs.loop_pr_include_bots }}
        LOOP_PR_ENABLED: ${{ inputs.loop_pr_enabled }}
        LOOP_PRIORITY: ${{ inputs.loop_priority }}
        LOOP_STATE_PUSH_BRANCH: ${{ inputs.loop_state_push_branch }}
        PROMPT_INSTRUCTIONS: ${{ inputs.prompt_instructions }}
        RUN_LOG_FILE: ${{ inputs.run_log_file }}
        SKILL_NAME: ${{ inputs.skill_name }}
        STATE_FILE: ${{ steps.paths.outputs.state_file }}
      run: bash "${GITHUB_ACTION_PATH}/lib/detect.sh"

    - name: Record Handoff Artifact Name
      id: handoff
      if: steps.detect.outputs.should_run == 'true'
      shell: bash
      run: echo "artifact_name=loop-handoff-${GITHUB_RUN_ID}" >> "${GITHUB_OUTPUT}"

    - name: Upload Loop Handoff Artifact
      if: steps.detect.outputs.should_run == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: loop-handoff-${{ github.run_id }}
        path: ${{ runner.temp }}/loop-handoff
        retention-days: 1
