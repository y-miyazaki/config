name: loop-finalize
description: "Finalize a loop run per target_json: strategy, state, run-log, optional domain persistence."

inputs:
  agent_result:
    default: "success"
    description: "Result of the agent job (success/failure/cancelled/skipped)"
    required: false
  attempts:
    default: ""
    description: "Number of Agent→Verify attempts (empty when execute did not run)"
    required: false
  auto_merge:
    default: "false"
    description: "Enable auto-merge on created PR (L3 + open_pr only)"
    required: false
  base_branch:
    default: "main"
    description: "Fallback base branch when target_json is absent"
    required: false
  branch:
    default: ""
    description: "Agent branch with changes (empty if none)"
    required: false
  current_sha:
    description: "SHA to record in per-target state"
    required: true
  detect_result_json:
    default: "{}"
    description: "Detect script JSON (failures[]) for PR Failure context"
    required: false
  domain_persistence_script:
    default: ""
    description: "Optional bash script for domain ledger persistence"
    required: false
  additional_commit_paths:
    default: ""
    description: "Comma-separated paths to commit with state after domain persistence"
    required: false
  execute_branch:
    default: ""
    description: "Agent branch name for domain_persistence_script env"
    required: false
  has_changes:
    default: "false"
    description: "Whether agent produced changes"
    required: false
  labels:
    default: "loop-automation"
    description: "Comma-separated labels for the PR"
    required: false
  level:
    default: ""
    description: "Loop level for PR footer (e.g. L2)"
    required: false
  loop_name:
    default: ""
    description: "Loop name / pattern for run log (e.g. docs-triage)"
    required: false
  notify_context_json:
    default: "{}"
    description: "notify_context_json from loop-execute (changed_files, agent_report_summary)"
    required: false
  open_rejections:
    default: "[]"
    description: "JSON array of unresolved structured rejections from the agent loop"
    required: false
  outcome_override:
    default: ""
    description: "Optional explicit outcome (e.g. watch from Skill classification)"
    required: false
  pr_body:
    default: ""
    description: "Static markdown prefix (finalize composes final body)"
    required: false
  pr_title:
    default: "chore: automated update (loop)"
    description: "PR title"
    required: false
  reject_reason:
    default: ""
    description: "Verifier rejection reason (recorded in state on REJECT)"
    required: false
  run_log_file:
    default: ".loop/loop-run-log.md"
    description: "Path to JSONL run log markdown file"
    required: false
  run_started_at:
    default: ""
    description: "Workflow run start timestamp (ISO 8601) for run log duration"
    required: false
  skip_reason:
    default: "none"
    description: "Detect skip reason recorded in run log"
    required: false
  state_bundle_with_fix_pr:
    default: "false"
    description: "Deprecated: commit state on fix branch before open_pr"
    required: false
  state_file:
    description: "Path to state JSON file"
    required: true
  state_push_branch:
    default: ""
    description: "Branch for .loop/* commits (empty = base_branch)"
    required: false
  target_json:
    default: ""
    description: "Target descriptor JSON from loop-detect matrix cell"
    required: false
  token:
    description: "GitHub token for PR creation and state push"
    required: true
  tokens_estimate:
    default: "52000"
    description: "Estimated token spend when measured usage is unavailable"
    required: false
  usage_json:
    default: ""
    description: "Measured token usage JSON from loop-execute (empty when unavailable)"
    required: false
  verdict:
    default: ""
    description: "Verifier verdict (APPROVE or REJECT, empty if no verification)"
    required: false
  workflow_run:
    default: ${{ github.run_id }}
    description: "GitHub Actions workflow run ID for run log"
    required: false

outputs:
  commit_sha:
    description: "Commit SHA on target branch after push_head (empty when not pushed)"
    value: ${{ steps.push_target.outputs.commit_sha }}
  outcome:
    description: "Final outcome written to state"
    value: ${{ steps.outcome.outputs.value }}
  pr_url:
    description: "URL of created PR (empty if not created)"
    value: ${{ steps.pr.outputs.url }}
  pr_number:
    description: "Number of created PR (empty if not created)"
    value: ${{ steps.pr.outputs.number }}

runs:
  using: composite
  steps:
    - name: Parse Target
      id: target
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        TARGET_JSON: ${{ inputs.target_json }}
      run: |
        set -euo pipefail
        if [[ -n "${TARGET_JSON}" ]] && jq -e . >/dev/null 2>&1 <<< "${TARGET_JSON}"; then
          echo "target_key=$(jq -r '.key' <<< "${TARGET_JSON}")" >> "$GITHUB_OUTPUT"
          echo "finalize_strategy=$(jq -r '.finalize // "open_pr"' <<< "${TARGET_JSON}")" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=$(jq -r '.to.branch' <<< "${TARGET_JSON}")" >> "$GITHUB_OUTPUT"
          echo "to_branch=$(jq -r '.to.branch' <<< "${TARGET_JSON}")" >> "$GITHUB_OUTPUT"
        else
          echo "target_key=integration:${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "finalize_strategy=open_pr" >> "$GITHUB_OUTPUT"
          echo "pr_base_branch=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "to_branch=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine Outcome
      id: outcome
      shell: bash
      env:
        AGENT_RESULT: ${{ inputs.agent_result }}
        HAS_CHANGES: ${{ inputs.has_changes }}
        OUTCOME_OVERRIDE: ${{ inputs.outcome_override }}
        VERDICT: ${{ inputs.verdict }}
      run: |
        set -euo pipefail
        if [[ -n "${OUTCOME_OVERRIDE}" ]]; then
          echo "value=${OUTCOME_OVERRIDE}" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [[ "${AGENT_RESULT}" != "success" && "${AGENT_RESULT}" != "skipped" ]]; then
          echo "value=error" >> "$GITHUB_OUTPUT"
        elif [[ "${HAS_CHANGES}" != "true" ]]; then
          if [[ "${VERDICT}" == "REJECT" ]]; then
            echo "value=rejected" >> "$GITHUB_OUTPUT"
          else
            echo "value=no-changes" >> "$GITHUB_OUTPUT"
          fi
        elif [[ "${VERDICT}" == "APPROVE" ]]; then
          echo "value=pr-created" >> "$GITHUB_OUTPUT"
        elif [[ "${VERDICT}" == "REJECT" ]]; then
          echo "value=rejected" >> "$GITHUB_OUTPUT"
        else
          echo "value=error" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve State Write Mode
      id: state_mode
      shell: bash
      env:
        BUNDLE_STATE: ${{ inputs.state_bundle_with_fix_pr }}
        FINALIZE_STRATEGY: ${{ steps.target.outputs.finalize_strategy }}
        HAS_CHANGES: ${{ inputs.has_changes }}
        OUTCOME: ${{ steps.outcome.outputs.value }}
        VERDICT: ${{ inputs.verdict }}
      run: |
        set -euo pipefail
        if [[ "${BUNDLE_STATE}" == "true" && "${VERDICT}" == "APPROVE" && "${HAS_CHANGES}" == "true" && "${FINALIZE_STRATEGY}" == "open_pr" ]]; then
          echo "mode=advance" >> "$GITHUB_OUTPUT"
          echo "bundle=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "bundle=false" >> "$GITHUB_OUTPUT"
        if [[ "${VERDICT}" == "APPROVE" && "${HAS_CHANGES}" == "true" ]]; then
          case "${FINALIZE_STRATEGY}" in
            open_pr)
              echo "mode=pending" >> "$GITHUB_OUTPUT"
              ;;
            push|push_head)
              echo "mode=advance" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "mode=metadata" >> "$GITHUB_OUTPUT"
              ;;
          esac
        else
          echo "mode=metadata" >> "$GITHUB_OUTPUT"
        fi

    - name: Run Domain Persistence
      if: inputs.domain_persistence_script != ''
      shell: bash
      env:
        DOMAIN_PERSISTENCE_SCRIPT: ${{ inputs.domain_persistence_script }}
        EXECUTE_BRANCH: ${{ inputs.execute_branch != '' && inputs.execute_branch || inputs.branch }}
        LOOP_NAME: ${{ inputs.loop_name }}
        OUTCOME: ${{ steps.outcome.outputs.value }}
        STATE_FILE: ${{ inputs.state_file }}
        TARGET_JSON: ${{ inputs.target_json }}
        VERDICT: ${{ inputs.verdict }}
      run: |
        set -euo pipefail
        bash "${DOMAIN_PERSISTENCE_SCRIPT}"

    - name: Write Bundled State
      if: >-
        inputs.current_sha != '' &&
        steps.state_mode.outputs.bundle == 'true' &&
        inputs.branch != ''
      shell: bash
      env:
        ACTING_ON_ACTION: clear
        ACTING_ON_LOOP_NAME: ${{ inputs.loop_name }}
        ACTING_ON_TARGET_KEY: ${{ steps.target.outputs.target_key }}
        ADDITIONAL_COMMIT_PATHS: ${{ inputs.additional_commit_paths }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        COMMIT_TARGET_BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}
        LOOP_NAME: ${{ inputs.loop_name }}
        OPEN_REJECTIONS: ${{ inputs.open_rejections }}
        OUTCOME: ${{ steps.outcome.outputs.value }}
        REJECT_REASON: ${{ inputs.reject_reason }}
        SHA: ${{ inputs.current_sha }}
        SKIP_STATE_PR: "true"
        STATE_FILE: ${{ inputs.state_file }}
        STATE_PUSH_BRANCH: ${{ inputs.state_push_branch }}
        STATE_WRITE_MODE: advance
        TARGET_KEY: ${{ steps.target.outputs.target_key }}
        WRITE_TARGET_STATE: "true"
      run: bash "${GITHUB_ACTION_PATH}/../loop-state-write/lib/run.sh"

    - name: Push to Target Branch
      id: push_target
      if: >-
        inputs.verdict == 'APPROVE' &&
        inputs.has_changes == 'true' &&
        inputs.branch != '' &&
        steps.target.outputs.finalize_strategy != 'open_pr'
      shell: bash
      env:
        AGENT_BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}
        TO_BRANCH: ${{ steps.target.outputs.to_branch }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin "${AGENT_BRANCH}" "${TO_BRANCH}" --prune
        git checkout -B "${TO_BRANCH}" "origin/${TO_BRANCH}"
        git merge --no-ff "origin/${AGENT_BRANCH}" -m "chore(loop): automated fix [skip ci]"
        git push origin HEAD:"${TO_BRANCH}"
        echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        echo "pushed=true" >> "$GITHUB_OUTPUT"

    - name: Create PR
      id: pr
      if: >-
        inputs.verdict == 'APPROVE' &&
        inputs.has_changes == 'true' &&
        inputs.branch != '' &&
        steps.target.outputs.finalize_strategy == 'open_pr'
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        DETECT_RESULT_JSON: ${{ inputs.detect_result_json }}
        GH_TOKEN: ${{ inputs.token }}
        LABELS: ${{ inputs.labels }}
        LEVEL: ${{ inputs.level }}
        NOTIFY_CONTEXT_JSON: ${{ inputs.notify_context_json }}
        PR_BASE_BRANCH: ${{ steps.target.outputs.pr_base_branch }}
        PR_BODY: ${{ inputs.pr_body }}
        PR_TITLE: ${{ inputs.pr_title }}
        SKIP_REASON: ${{ inputs.skip_reason }}
        TARGET_JSON: ${{ inputs.target_json }}
      run: |
        set -euo pipefail
        NOTIFY_JSON="${NOTIFY_CONTEXT_JSON:-{}}"
        if ! jq -e . >/dev/null 2>&1 <<< "${NOTIFY_JSON}"; then
          NOTIFY_JSON='{}'
        fi
        if ! jq -e . >/dev/null 2>&1 <<< "${DETECT_RESULT_JSON:-{}}"; then
          DETECT_RESULT_JSON='{}'
        fi
        CHANGED_FILES_JSON="$(jq -c '.changed_files // []' <<< "${NOTIFY_JSON}")"
        AGENT_REPORT_SUMMARY="$(jq -r '.agent_report_summary // empty' <<< "${NOTIFY_JSON}")"
        TARGET_KEY="$(jq -r '.key // empty' <<< "${TARGET_JSON:-{}}" 2>/dev/null || true)"

        export PR_BODY_PREFIX="${PR_BODY}"
        export DETECT_RESULT_JSON
        export CHANGED_FILES_JSON
        export AGENT_REPORT_SUMMARY
        export LEVEL
        export TARGET_KEY
        export SKIP_REASON

        COMPOSED="$(bash "${GITHUB_ACTION_PATH}/lib/render_pr_body.sh")"
        ARGS=(
          --repo "${GITHUB_REPOSITORY}"
          --base "${PR_BASE_BRANCH}"
          --head "${BRANCH}"
          --title "${PR_TITLE}"
        )
        if [[ -n "${COMPOSED}" ]]; then
          ARGS+=(--body "${COMPOSED}")
        fi
        if [[ -n "${LABELS}" ]]; then
          ARGS+=(--label "${LABELS}")
        fi
        URL=$(gh pr create "${ARGS[@]}")
        NUMBER=$(gh pr view "${URL}" --json number --jq '.number')
        echo "url=${URL}" >> "$GITHUB_OUTPUT"
        echo "number=${NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Enable Auto-Merge
      if: >-
        inputs.verdict == 'APPROVE' &&
        inputs.has_changes == 'true' &&
        inputs.branch != '' &&
        steps.target.outputs.finalize_strategy == 'open_pr' &&
        inputs.auto_merge == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ steps.pr.outputs.url }}
      run: |
        set -euo pipefail
        if [[ -n "${PR_URL}" ]]; then
          gh pr merge "${PR_URL}" --auto --squash
        fi

    - name: Write State
      if: >-
        inputs.current_sha != '' &&
        steps.state_mode.outputs.bundle != 'true'
      shell: bash
      env:
        ACTING_ON_ACTION: clear
        ACTING_ON_LOOP_NAME: ${{ inputs.loop_name }}
        ACTING_ON_TARGET_KEY: ${{ steps.target.outputs.target_key }}
        ADDITIONAL_COMMIT_PATHS: ${{ inputs.additional_commit_paths }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        GH_TOKEN: ${{ inputs.token }}
        LOOP_NAME: ${{ inputs.loop_name }}
        OPEN_REJECTIONS: ${{ inputs.open_rejections }}
        OUTCOME: ${{ steps.outcome.outputs.value }}
        PENDING_PR_NUMBER: ${{ steps.pr.outputs.number || '' }}
        PENDING_PR_URL: ${{ steps.pr.outputs.url || '' }}
        REJECT_REASON: ${{ inputs.reject_reason }}
        SHA: ${{ inputs.current_sha }}
        STATE_FILE: ${{ inputs.state_file }}
        STATE_PUSH_BRANCH: ${{ inputs.state_push_branch }}
        STATE_WRITE_MODE: ${{ steps.state_mode.outputs.mode }}
        TARGET_KEY: ${{ steps.target.outputs.target_key }}
        WRITE_TARGET_STATE: "true"
      run: bash "${GITHUB_ACTION_PATH}/../loop-state-write/lib/run.sh"

    - name: Delete Branch on Rejection
      if: inputs.verdict == 'REJECT' && inputs.branch != ''
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if ! [[ "${BRANCH}" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
          echo "::error::Invalid branch name: ${BRANCH}"
          exit 1
        fi
        gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}" 2>/dev/null || true

    - name: Append Run Log
      if: inputs.loop_name != ''
      shell: bash
      env:
        ATTEMPTS: ${{ inputs.attempts }}
        BASE_BRANCH: ${{ inputs.state_push_branch != '' && inputs.state_push_branch || inputs.base_branch }}
        HAS_CHANGES: ${{ inputs.has_changes }}
        LOOP_NAME: ${{ inputs.loop_name }}
        OUTCOME: ${{ steps.outcome.outputs.value }}
        RUN_LOG_FILE: ${{ inputs.run_log_file }}
        RUN_STARTED_AT: ${{ inputs.run_started_at }}
        SKIP_REASON: ${{ inputs.skip_reason }}
        TOKEN: ${{ inputs.token }}
        TOKENS_ESTIMATE: ${{ inputs.tokens_estimate }}
        USAGE_JSON: ${{ inputs.usage_json }}
        VERDICT: ${{ inputs.verdict }}
        WORKFLOW_RUN: ${{ inputs.workflow_run }}
      run: bash "${GITHUB_ACTION_PATH}/../loop-run-log/lib/run.sh"
