# Detect permissions profiles for ci-loop-caller reusable workflow.
# Single source of truth for detect job permissions and caller workflow additions.
# Registry: docs/explanation/loop-engineering/loop-caller-reusable-design.md#detect-permissions-profile
execute_baseline:
  actions: read
  contents: write
  copilot-requests: write
  pull-requests: write

profiles:
  default:
    caller_workflow: ci-loop-caller.yaml
    description: Git-based detect only (changelog, docs-triage, tech-debt)
    implemented: true
    job: detect
    job_permissions:
      actions: write
      contents: read
    caller_adds:
      actions: write

  pr-scan:
    caller_workflow: ci-loop-caller-pr-scan.yaml
    description: PR head enumeration when pr_enabled=true (no Actions API CI scan)
    implemented: true
    job: detect
    job_permissions:
      actions: write
      contents: read
      pull-requests: read
    caller_adds:
      actions: write

  ci-monitor:
    caller_workflow: ci-loop-caller.yaml
    description: Failed CI scan via Actions API (not yet implemented in ci-loop-caller)
    implemented: false
    job: detect-ci-monitor
    job_permissions:
      actions: read
      contents: read
    caller_adds:
      actions: read

  full-github:
    caller_workflow: ci-loop-caller-full-github.yaml
    description: CI failure scan plus PR enumeration (ci-sweeper)
    implemented: true
    job: detect
    job_permissions:
      actions: write
      contents: read
      pull-requests: read
    caller_adds:
      actions: write
