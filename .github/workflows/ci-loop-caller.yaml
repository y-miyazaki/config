# Reusable workflow: Loop caller orchestration
# Shared detect → execute (matrix) → record-skip job graph for on-loop-*.yaml callers.
# Design doc: docs/explanation/loop-engineering/loop-caller-reusable-design.md
# Inputs reference: docs/explanation/loop-engineering/workflows/loop-caller-inputs-reference.md
name: ci-loop-caller

on:
  workflow_call:
    inputs:
      additional_commit_paths:
        default: ""
        description: "Extra paths included in finalize commit (e.g. ledger file)"
        required: false
        type: string
      agent_implementer_max_turns:
        description: "Maximum implementer agent turns per loop attempt"
        required: true
        type: string
      agent_implementer_model:
        description: "Implementer model ID"
        required: true
        type: string
      agent_loop_max_attempts:
        description: "Maximum Agent→Verify retry cycles"
        required: true
        type: string
      agent_verifier_criteria:
        description: "Domain-specific APPROVE/REJECT rubric"
        required: true
        type: string
      agent_verifier_max_turns:
        description: "Maximum verifier agent turns per verification"
        required: true
        type: string
      agent_verifier_model:
        description: "Verifier model ID"
        required: true
        type: string
      allowlist:
        description: "Comma-separated globs the implementer may modify"
        required: true
        type: string
      branch_match:
        default: ""
        description: "Comma-separated integration branch patterns to watch (empty = branch_state only)"
        required: false
        type: string
      branch_match_mode:
        default: glob
        description: "How to interpret branch_match: list, glob, or regex"
        required: false
        type: string
      branch_state:
        description: "Branch for .loop/* persistence, state migration, and watch fallback when branch_match is empty"
        required: true
        type: string
      budget_file:
        default: .loop/loop-budget.json
        description: "Path to loop budget JSON"
        required: false
        type: string
      budget_max_runs_per_day:
        description: "Daily run cap keyed by loop_name"
        required: false
        type: number
      budget_max_tokens_per_day:
        description: "Daily aggregated token cap"
        required: false
        type: number
      denylist:
        default: ""
        description: "Comma-separated globs the implementer must not touch"
        required: false
        type: string
      detect_domain_env_json:
        default: "{}"
        description: "JSON object of domain detect script environment variables"
        required: false
        type: string
      detect_script:
        description: "Path to domain detect_*.sh script"
        required: true
        type: string
      domain_persistence_script:
        default: ""
        description: "Bash script for loop-finalize domain persistence"
        required: false
        type: string
      engine:
        description: "AI engine: claude | copilot | codex | cursor"
        required: true
        type: string
      environment:
        default: default
        description: "GitHub environment for maintenance bot secrets"
        required: false
        type: string
      finalize_integration:
        default: open_pr
        description: "Finalize for integration targets: open_pr | push"
        required: false
        type: string
      finalize_pull_request:
        default: open_pr
        description: "Finalize for PR head targets: open_pr | push_head"
        required: false
        type: string
      infer_files_pattern:
        default: ""
        description: "Extended regex to infer file paths from verifier text"
        required: false
        type: string
      level:
        default: L2
        description: "Autonomy: L1 | L2 | L3"
        required: false
        type: string
      loop_name:
        description: "Loop identifier for state, budget, and concurrency"
        required: true
        type: string
      max_targets_per_schedule:
        default: 3
        description: "Max targets per cron tick after filters"
        required: false
        type: number
      no_changes_verdict:
        default: REJECT
        description: "APPROVE | REJECT when implementer produces no file diff"
        required: false
        type: string
      pr_body:
        default: ""
        description: "Static markdown prefix for finalize PR body"
        required: false
        type: string
      pr_enabled:
        default: false
        description: "Watch open PR heads for detect (pr_enabled)"
        required: false
        type: boolean
      pr_exclude:
        default: fork,draft,label:no-loop
        description: "PR exclusion tokens"
        required: false
        type: string
      pr_include_bots:
        default: ""
        description: "Comma-separated bot logins to include when scanning PRs"
        required: false
        type: string
      pr_title:
        default: ""
        description: "PR title when finalize strategy is open_pr"
        required: false
        type: string
      priority:
        default: integration,pull_request
        description: "Target mode priority order (comma-separated)"
        required: false
        type: string
      prompt_instructions:
        default: ""
        description: "Domain-specific implementer instructions"
        required: false
        type: string
      run_log_file:
        default: .loop/loop-run-log.md
        description: "JSONL run log path for budget aggregation"
        required: false
        type: string
      skill_name:
        description: "Skill package name"
        required: true
        type: string
      state_file:
        default: ""
        description: "Override state JSON path (default .loop/state-<loop_name>.json)"
        required: false
        type: string
    secrets:
      AGENT_TOKEN:
        description: "Authentication token for the selected engine"
        required: true
      BOT_APP_CLIENT_ID:
        description: "GitHub App client ID for ruleset-bypass .loop/* pushes"
        required: false
      BOT_APP_PRIVATE_KEY:
        description: "GitHub App private key for ruleset-bypass .loop/* pushes"
        required: false
      GH_TOKEN_OVERRIDE:
        description: "GitHub token override for PR enumeration and detect scripts (defaults to github.token when empty)"
        required: false
      GH_TOKEN_PUSH:
        description: "GitHub token with push permission (defaults to github.token when empty)"
        required: false

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    outputs:
      additional_commit_paths: ${{ inputs.additional_commit_paths }}
      agent_implementer_max_turns: ${{ steps.detect.outputs.agent_implementer_max_turns }}
      agent_implementer_model: ${{ steps.detect.outputs.agent_implementer_model }}
      agent_loop_max_attempts: ${{ steps.detect.outputs.agent_loop_max_attempts }}
      agent_verifier_criteria: ${{ steps.detect.outputs.agent_verifier_criteria }}
      agent_verifier_max_turns: ${{ steps.detect.outputs.agent_verifier_max_turns }}
      agent_verifier_model: ${{ steps.detect.outputs.agent_verifier_model }}
      allowlist: ${{ steps.detect.outputs.allowlist }}
      branch_state: ${{ inputs.branch_state }}
      denylist: ${{ inputs.denylist }}
      domain_persistence_script: ${{ inputs.domain_persistence_script }}
      engine: ${{ steps.detect.outputs.engine }}
      handoff_artifact_name: ${{ steps.detect.outputs.handoff_artifact_name }}
      infer_files_pattern: ${{ steps.detect.outputs.infer_files_pattern }}
      level: ${{ steps.detect.outputs.level }}
      loop_name: ${{ steps.detect.outputs.loop_name }}
      no_changes_verdict: ${{ steps.detect.outputs.no_changes_verdict }}
      pr_body: ${{ steps.detect.outputs.pr_body }}
      pr_title: ${{ steps.detect.outputs.pr_title }}
      run_started_at: ${{ steps.timing.outputs.started_at }}
      should_run: ${{ steps.detect.outputs.should_run }}
      skill_name: ${{ steps.detect.outputs.skill_name }}
      skip_reason: ${{ steps.detect.outputs.skip_reason }}
      state_file: ${{ steps.detect.outputs.state_file }}
      state_push_branch: ${{ inputs.branch_state }}
      target_matrix: ${{ steps.detect.outputs.target_matrix }}
    steps:
      - name: Record Run Start
        id: timing
        run: echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Export Detect Domain Env
        shell: bash
        env:
          DETECT_DOMAIN_ENV_JSON: ${{ inputs.detect_domain_env_json }}
        run: |
          set -euo pipefail
          if [[ -n "${DETECT_DOMAIN_ENV_JSON}" && "${DETECT_DOMAIN_ENV_JSON}" != "{}" ]]; then
            if ! echo "${DETECT_DOMAIN_ENV_JSON}" | jq -e 'type == "object"' >/dev/null; then
              echo "detect_domain_env_json must be a JSON object" >&2
              exit 1
            fi
            if ! echo "${DETECT_DOMAIN_ENV_JSON}" | jq -e \
              '[to_entries[] | select(.value != "" and ((.value | tostring) | test("[\r\n]")))] | length == 0' \
              >/dev/null; then
              bad_key="$(echo "${DETECT_DOMAIN_ENV_JSON}" | jq -r \
                'to_entries[] | select(.value != "" and ((.value | tostring) | test("[\r\n]"))) | .key' \
                | head -1)"
              echo "detect_domain_env_json values must not contain newlines (key: ${bad_key})" >&2
              exit 1
            fi
            while IFS= read -r -d '' entry; do
              printf '%s\n' "${entry}" >> "${GITHUB_ENV}"
            done < <(echo "${DETECT_DOMAIN_ENV_JSON}" | jq -jr \
              'to_entries[] | select(.value != "") | "\(.key)=\(.value)\u0000"')
          fi

      - name: Detect Loop Work
        id: detect
        uses: y-miyazaki/config/.github/actions/loop-detect@231a3d8bde740d533d16f724ae18c5b5030e9074 # v1.8.46
        with:
          agent_implementer_max_turns: ${{ format('{0}', inputs.agent_implementer_max_turns) }}
          agent_implementer_model: ${{ inputs.agent_implementer_model }}
          agent_loop_max_attempts: ${{ format('{0}', inputs.agent_loop_max_attempts) }}
          agent_verifier_criteria: ${{ inputs.agent_verifier_criteria }}
          agent_verifier_max_turns: ${{ format('{0}', inputs.agent_verifier_max_turns) }}
          agent_verifier_model: ${{ inputs.agent_verifier_model }}
          allowlist: ${{ inputs.allowlist }}
          base_branch: ${{ inputs.branch_state }}
          budget_file: ${{ inputs.budget_file }}
          budget_max_runs_per_day: ${{ inputs.budget_max_runs_per_day != null && format('{0}', inputs.budget_max_runs_per_day) || '' }}
          budget_max_tokens_per_day: ${{ inputs.budget_max_tokens_per_day != null && format('{0}', inputs.budget_max_tokens_per_day) || '' }}
          detect_script: ${{ inputs.detect_script }}
          engine: ${{ inputs.engine }}
          infer_files_pattern: ${{ inputs.infer_files_pattern }}
          level: ${{ inputs.level }}
          loop_branch_match: ${{ inputs.branch_match_mode }}
          loop_finalize_integration: ${{ inputs.finalize_integration }}
          loop_finalize_pull_request: ${{ inputs.finalize_pull_request }}
          loop_integration_branches: ${{ inputs.branch_match }}
          loop_max_targets_per_schedule: ${{ format('{0}', inputs.max_targets_per_schedule) }}
          loop_name: ${{ inputs.loop_name }}
          loop_pr_exclude: ${{ inputs.pr_exclude }}
          loop_pr_include_bots: ${{ inputs.pr_include_bots }}
          loop_pr_enabled: ${{ inputs.pr_enabled && 'true' || 'false' }}
          loop_priority: ${{ inputs.priority }}
          loop_state_push_branch: ${{ inputs.branch_state }}
          no_changes_verdict: ${{ inputs.no_changes_verdict }}
          pr_body: ${{ inputs.pr_body }}
          pr_title: ${{ inputs.pr_title }}
          prompt_instructions: ${{ inputs.prompt_instructions }}
          run_log_file: ${{ inputs.run_log_file }}
          skill_name: ${{ inputs.skill_name }}
          state_file: ${{ inputs.state_file }}
          token: ${{ secrets.GH_TOKEN_OVERRIDE != '' && secrets.GH_TOKEN_OVERRIDE || github.token }}

  execute:
    if: needs.detect.outputs.should_run == 'true'
    needs: detect
    permissions:
      actions: read
      contents: write
      copilot-requests: write # zizmor: ignore[excessive-permissions]
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.target_matrix) }}
    uses: y-miyazaki/config/.github/workflows/ci-loop-agent.yaml@231a3d8bde740d533d16f724ae18c5b5030e9074 # v1.8.46
    with:
      additional_commit_paths: ${{ needs.detect.outputs.additional_commit_paths }}
      agent_implementer_max_turns: ${{ needs.detect.outputs.agent_implementer_max_turns }}
      agent_implementer_model: ${{ needs.detect.outputs.agent_implementer_model }}
      agent_loop_max_attempts: ${{ needs.detect.outputs.agent_loop_max_attempts }}
      agent_verifier_criteria: ${{ needs.detect.outputs.agent_verifier_criteria }}
      agent_verifier_max_turns: ${{ needs.detect.outputs.agent_verifier_max_turns }}
      agent_verifier_model: ${{ needs.detect.outputs.agent_verifier_model }}
      allowlist: ${{ needs.detect.outputs.allowlist }}
      auto_merge: ${{ (needs.detect.outputs.level == 'L3' && matrix.target.target_json.finalize == 'open_pr') && 'true' || 'false' }}
      base_branch: ${{ matrix.target.target_json.mode == 'pull_request' && matrix.target.target_json.base.branch || matrix.target.target_json.to.branch }}
      current_sha: ${{ matrix.target.target_json.from.ref }}
      denylist: ${{ needs.detect.outputs.denylist }}
      detect_result_json: "{}"
      domain_persistence_script: ${{ needs.detect.outputs.domain_persistence_script }}
      engine: ${{ needs.detect.outputs.engine }}
      environment: ${{ inputs.environment }}
      finalize_enabled: true
      handoff_artifact_name: ${{ needs.detect.outputs.handoff_artifact_name }}
      handoff_key: ${{ matrix.target.handoff_key }}
      infer_files_pattern: ${{ needs.detect.outputs.infer_files_pattern }}
      level: ${{ needs.detect.outputs.level }}
      loop_name: ${{ needs.detect.outputs.loop_name }}
      no_changes_verdict: ${{ needs.detect.outputs.no_changes_verdict }}
      pr_body: ${{ needs.detect.outputs.pr_body }}
      pr_title: ${{ needs.detect.outputs.pr_title }}
      prompt_text: ${{ matrix.target.prompt }}
      run_started_at: ${{ needs.detect.outputs.run_started_at }}
      skill_name: ${{ needs.detect.outputs.skill_name }}
      skip_reason: ${{ needs.detect.outputs.skip_reason }}
      state_file: ${{ needs.detect.outputs.state_file }}
      state_push_branch: ${{ needs.detect.outputs.state_push_branch }}
      target_json: ${{ toJson(matrix.target.target_json) }}
      verifier_context: ${{ matrix.target.verifier_context }}
    secrets:
      AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
      BOT_APP_CLIENT_ID: ${{ secrets.BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      GH_TOKEN_PUSH: ${{ secrets.GH_TOKEN_PUSH }}

  record-skip:
    if: >-
      needs.detect.result == 'success' &&
      needs.detect.outputs.should_run == 'false' &&
      (needs.detect.outputs.skip_reason == 'circuit_breaker' ||
      needs.detect.outputs.skip_reason == 'budget')
    needs: detect
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate App Bot Token
        continue-on-error: true
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          permission-contents: write
          permission-pull-requests: write
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Resolve Push Token
        id: push_token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_TOKEN_PUSH: ${{ secrets.GH_TOKEN_PUSH }}
        run: |
          set -euo pipefail
          if [[ -n "${APP_TOKEN}" ]]; then
            token="${APP_TOKEN}"
          elif [[ -n "${GH_TOKEN_PUSH}" ]]; then
            token="${GH_TOKEN_PUSH}"
          else
            token="${GITHUB_TOKEN}"
          fi
          echo "::add-mask::${token}"
          echo "token=${token}" >> "${GITHUB_OUTPUT}"

      - name: Append Skip Run Log
        uses: y-miyazaki/config/.github/actions/loop-run-log@231a3d8bde740d533d16f724ae18c5b5030e9074 # v1.8.46
        with:
          base_branch: ${{ needs.detect.outputs.branch_state }}
          loop_name: ${{ needs.detect.outputs.loop_name }}
          outcome: skipped
          run_started_at: ${{ needs.detect.outputs.run_started_at }}
          skip_reason: ${{ needs.detect.outputs.skip_reason }}
          token: ${{ steps.push_token.outputs.token }}
