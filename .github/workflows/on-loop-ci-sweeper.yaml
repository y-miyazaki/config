# Loop workflow: CI sweeper
# Polls for failed CI on main (schedule), runs bounded Agent→Verify loop, then finalizes.
# Design doc: docs/explanation/workflows/loop-ci-sweeper-workflow-design.md
# Caller inputs: docs/explanation/workflows/loop-caller-inputs-reference.md
# Requires repository secret: AGENT_TOKEN (engine API key; see engine input).
# Pass credentials via secrets: (callee BOT_APP_* / AGENT_TOKEN; remap MAINTENANCE_BOT_*). Optional with.environment for env-scoped secrets inside the reusable.
name: on-loop-ci-sweeper

on:
  schedule:
    - cron: "*/15 * * * 1-5"
  # workflow_run: event-driven trigger (disabled — zizmor dangerous-triggers).
  # Enable only after security review. Embed event keys in detect_domain_env_json when enabled:
  #   detect_domain_env_json: ${{ format('{"CI_SWEEPER_EXCLUDED_WORKFLOWS":"...","CI_SWEEPER_HEAD_SHA":"{0}","CI_SWEEPER_WORKFLOW_RUN_ID":"{1}","CI_SWEEPER_HEAD_BRANCH":"{2}"}', github.event.workflow_run.head_sha || github.sha, github.event.workflow_run.id || '', github.event.workflow_run.head_branch || 'main') }}
  # workflow_run:
  #   branches:
  #     - main
  #   types:
  #     - completed
  #   workflows:
  #     - ci-apm-audit
  #     - ci-github-actions-workflow
  #     - ci-markdown
  #     - ci-shell-script
  workflow_call:
    secrets:
      AGENT_TOKEN:
        description: "Engine API key (mapped per engine input)"
        required: true
      MAINTENANCE_BOT_APP_CLIENT_ID:
        description: "GitHub App client ID; remapped to BOT_APP_CLIENT_ID on ci-loop-caller"
        required: false
      MAINTENANCE_BOT_APP_PRIVATE_KEY:
        description: "GitHub App private key; remapped to BOT_APP_PRIVATE_KEY on ci-loop-caller"
        required: false
  workflow_dispatch: {}

permissions:
  actions: read
  contents: write
  copilot-requests: write # zizmor: ignore[excessive-permissions]
  pull-requests: write

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}

jobs:
  loop:
    uses: ./.github/workflows/ci-loop-caller-full-github.yaml
    with:
      additional_commit_paths: .loop/state-ci-sweeper-run-ledger.json
      agent_implementer_max_turns: 8
      agent_implementer_model: grok-4.5-medium
      agent_loop_max_attempts: 3
      agent_verifier_criteria: |
        ## Criteria for APPROVE

        ALL of the following must be true:
        1. Changes directly address the specific CI failure described in the detection result
        2. The diff is minimal — no unrelated refactors, formatting sweeps, or drive-by edits
        3. No files outside the allowlist were modified
        4. No denylist paths were touched
        5. No secrets, credentials, or sensitive values were added or exposed
        6. The implementer report lists validation commands run and their outcome

        ## Criteria for REJECT

        ANY of the following triggers REJECT:
        - Symptom-only changes that do not address the logged failure
        - Changes touching more than five files without clear necessity
        - Modifications outside the allowlist
        - Missing validation when the failure type is lint/syntax/test
        - Fixes for infra/env failures that should have been deferred
        - Hallucinated paths, commands, or APIs not present in the repository
      agent_verifier_max_turns: 3
      agent_verifier_model: composer-2.5
      allowlist: ".github/**,.apm/packages/**,scripts/**,apm.yml,mise.toml,renovate/**,docs/**/*.md,README.md,mkdocs.yml"
      branch_match: main
      branch_state: main
      budget_max_runs_per_day: 5
      budget_max_tokens_per_day: 1000000
      denylist: "**/.env,**/credentials*,**/secrets*,**/migration/*.sql,**/infrastructure/**"
      detect_domain_env_json: >-
        {"CI_SWEEPER_EXCLUDED_WORKFLOWS":"on-loop-changelog,on-loop-ci-sweeper,on-loop-docs-triage,ci-loop-agent,ci-loop-caller,ci-loop-caller-full-github","CI_SWEEPER_INCLUDED_WORKFLOWS":"","CI_SWEEPER_LEDGER_FILE":".loop/state-ci-sweeper-run-ledger.json","CI_SWEEPER_REJECT_MAX_RETRIES":"3","CI_SWEEPER_REJECT_RETRY_POLICY":"block"}
      detect_script: .agents/skills/loop-ci-sweeper/scripts/detect_ci_failures.sh
      domain_persistence_script: .agents/skills/loop-ci-sweeper/scripts/update_run_ledger.sh
      engine: cursor
      environment: default
      finalize_integration: open_pr
      finalize_pull_request: push_head
      infer_files_pattern: '[[:alnum:]_.-]+/[^[:space:],)]+\.(md|ya?ml|sh|go|toml|json)'
      loop_name: ci-sweeper
      max_targets_per_schedule: 3
      no_changes_verdict: REJECT
      pr_body: |
        ## Summary

        Automated minimal CI fix by `loop-ci-sweeper`.

        ---
        *This PR was created by a loop automation. Review before merging.*
      pr_exclude: fork,draft,label:no-loop
      pr_include_bots: ""
      pr_title: "fix(ci): automated CI repair (loop-ci-sweeper)"
      prompt_instructions: |
        Fix the failing CI checks identified in the detection result.
        Classify flakes and infra/env failures as Watch — do not edit code for those.
        Apply the smallest change that resolves the logged failure.
        Run stack-appropriate validation skills before finishing.
      pull_requests: true
      skill_name: loop-ci-sweeper
    secrets:
      AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
