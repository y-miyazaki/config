# Reusable workflow: static application security testing (SAST)
# Runs CodeQL and Semgrep. Language-specific; keep govulncheck in ci-go.
name: ci-sast

on:
  workflow_call:
    inputs:
      codeql_languages:
        default: '["actions","go"]'
        description: 'JSON array of CodeQL languages (e.g. ["go","actions","javascript-typescript"])'
        required: false
        type: string
      python_version:
        default: "3.14"
        description: "Python version for Semgrep install"
        required: false
        type: string
      semgrep_config:
        default: auto
        description: "Semgrep config (auto, p/ci, or ruleset path)"
        required: false
        type: string
      semgrep_version:
        default: 1.171.0
        description: "Semgrep Python package version"
        required: false
        type: string
      uv_version:
        default: "0.11.29"
        description: "uv version for Semgrep install; keep aligned with loop composite actions"
        required: false
        type: string

permissions:
  contents: read
  security-events: write

env:
  CODEQL_LANGUAGES: ${{ inputs.codeql_languages }}
  PYTHON_VERSION: ${{ inputs.python_version }}
  SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
  SEMGREP_VERSION: ${{ inputs.semgrep_version }}
  UV_VERSION: ${{ inputs.uv_version }}

jobs:
  codeql:
    if: ${{ inputs.codeql_languages != '[]' && inputs.codeql_languages != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.codeql_languages) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: codeql-${{ matrix.language }}

  semgrep:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          version: ${{ env.UV_VERSION }}

      - name: Install Semgrep
        run: uv tool install "semgrep==${SEMGREP_VERSION}"

      - name: Prepare security output directory
        run: mkdir -p security

      - name: Exec Semgrep scans
        run: |
          set -euo pipefail
          semgrep scan \
            --config "${SEMGREP_CONFIG}" \
            --json-output=security/semgrep.json \
            --sarif-output=security/semgrep.sarif \
            --text-output=security/semgrep.txt \
            .
          semgrep scan \
            --config "${SEMGREP_CONFIG}" \
            --error \
            --text \
            .

      - name: Print Semgrep findings
        if: always()
        run: |
          set -euo pipefail
          if [ ! -s security/semgrep.json ]; then
            echo "No Semgrep JSON report was generated."
            exit 0
          fi
          count="$(jq '.results | length' security/semgrep.json)"
          echo "Semgrep findings: ${count}"
          if [ "${count}" -eq 0 ]; then
            exit 0
          fi
          jq -r '
            .results[]
            | "[\(.extra.severity // "UNKNOWN")] \(.check_id) \(.path):\(.start.line) - \(.extra.message)"
          ' security/semgrep.json

      - name: Write Semgrep findings summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Semgrep Findings"
            echo ""
            if [ ! -s security/semgrep.json ]; then
              echo "_No Semgrep JSON report was generated._"
              exit 0
            fi
            count="$(jq '.results | length' security/semgrep.json)"
            echo "**Total:** ${count}"
            echo ""
            if [ "${count}" -eq 0 ]; then
              echo "No findings."
              exit 0
            fi
            echo "| Severity | Rule | Location | Message |"
            echo "| --- | --- | --- | --- |"
            jq -r '
              .results[]
              | "| \(.extra.severity // "UNKNOWN")"
                + " | `\(.check_id)`"
                + " | `\(.path):\(.start.line)`"
                + " | \(.extra.message | gsub("[|]"; "\\|") | gsub("\n"; " "))"
                + " |"
            ' security/semgrep.json
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Semgrep SARIF to GitHub Security
        if: always() && hashFiles('security/semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: semgrep
          sarif_file: security/semgrep.sarif

      - name: Upload Semgrep Report Artifact
        if: always() && hashFiles('security/semgrep.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-report
          path: |
            security/semgrep.json
            security/semgrep.sarif
            security/semgrep.txt
          retention-days: 30

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@01a42fc43c278cf8a38616de8de24fe7b6285f04 # v1.8.56
        with:
          artifacts: |
            semgrep-report
          outputs: |
            semgrep_json: security/semgrep.json
            semgrep_sarif: security/semgrep.sarif
            semgrep_txt: security/semgrep.txt
          params: |
            semgrep_config: ${{ env.SEMGREP_CONFIG }}
            semgrep_version: ${{ env.SEMGREP_VERSION }}
            task: sast-semgrep
          status: "${{ job.status }}"
          title: "SAST CI: semgrep"
