# Deploy MkDocs documentation to GitHub Pages on push to main
name: on-cd-mkdocs

on:
    push:
        branches:
            - "main"
        paths:
            - "docs/**"
            - "mkdocs.yml"
    workflow_dispatch:

permissions:
    contents: read
    id-token: write
    pages: write

jobs:
    build:
        permissions:
            contents: read
        uses: y-miyazaki/config/.github/workflows/cd-mkdocs.yaml@311cb20c66c268c978229c119abac90af9af4f48 # v1.7.6
        with:
            artifact_name: mkdocs-site
            config_file: mkdocs.yml
            pip_packages: mkdocs-material mdx-truly-sane-lists

    deploy:
        needs: build
        permissions:
            contents: read
            id-token: write
            pages: write
        uses: y-miyazaki/config/.github/workflows/cd-github-pages.yaml@311cb20c66c268c978229c119abac90af9af4f48 # v1.7.6
        with:
            artifact_name: mkdocs-site
