# Deploy MkDocs documentation to GitHub Pages on push to main
name: on-cd-mkdocs

on:
  push:
    branches:
      - "main"
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build:
    permissions:
      contents: read
    uses: y-miyazaki/config/.github/workflows/cd-mkdocs.yaml@e0433542c1084203d5684f97f593346186e391fa # v1.8.27
    with:
      artifact_name: mkdocs-site
      config_file: mkdocs.yml
      pip_packages: mkdocs-material mdx-truly-sane-lists

  deploy:
    needs: build
    permissions:
      contents: read
      id-token: write
      pages: write
    uses: y-miyazaki/config/.github/workflows/cd-github-pages.yaml@e0433542c1084203d5684f97f593346186e391fa # v1.8.27
    with:
      artifact_name: mkdocs-site
