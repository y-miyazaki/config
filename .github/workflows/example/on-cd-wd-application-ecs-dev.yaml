# Manual workflow: ECS deployment (application, dev)
name: on-cd-wd-application-ecs-dev

on:
  workflow_dispatch: # Manual deployment workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  ecs-deploy:
    permissions:
      contents: read
      id-token: write
    uses: y-miyazaki/config/.github/workflows/cd-aws-ecs.yaml@eff5232023d6139ae064aaff01d86680e5bc7b32 # v1.8.24
    with:
      ecs_service_base_dir: "ecs/ecs-service/test-server"
      environment: "dev"
    secrets:
      AWS_IAM_ROLE_ARN: ${{ secrets.AWS_IAM_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
