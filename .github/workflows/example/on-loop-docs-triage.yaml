# Loop workflow: Documentation triage
# Detects doc-impacting changes, runs bounded Agent→Verify loop, then finalizes.
# Requires repository secret: AGENT_TOKEN (engine API key; see DEFAULT_ENGINE).
name: on-loop-docs-triage

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  copilot-requests: write
  pull-requests: write

concurrency:
  cancel-in-progress: true
  group: loop-docs-triage

# cursor model: `agent --list-models`
env:
  AGENT_LOOP_MAX_ATTEMPTS: "3"
  AGENT_TRIAGE_MAX_TURNS: "5"
  AGENT_TRIAGE_MODEL: grok-4.5-medium
  AGENT_VERIFIER_CRITERIA: |
    ## Criteria for APPROVE

    ALL of the following must be true:
    1. Changes are limited to documentation files (docs/, README.md, mkdocs.yml nav)
    2. Content is factually consistent with the codebase
    3. No sensitive information is exposed
    4. Changes address the documented triage items
    5. No duplicate documentation is introduced
    6. Existing documentation structure is preserved unless explicitly required by triage items

    ## Criteria for REJECT

    ANY of the following triggers REJECT:
    - Changes outside allowed documentation paths
    - Factual inaccuracies or hallucinated content
    - Sensitive data exposure
    - Gratuitous changes not related to triage items
    - Duplicate content that restates existing documentation
    - Unnecessary restructuring of document headings or sections
  AGENT_VERIFIER_MAX_TURNS: "3"
  AGENT_VERIFIER_MODEL: composer-2.5
  DEFAULT_BASE_BRANCH: main
  DEFAULT_ENGINE: cursor
  DEFAULT_LEVEL: L2
  SKILL_NAME: loop-docs-triage
  STATE_FILE: .loop/state-docs-triage.json

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      agent_implementer_max_turns: ${{ steps.config.outputs.agent_implementer_max_turns }}
      agent_implementer_model: ${{ steps.config.outputs.agent_implementer_model }}
      agent_loop_max_attempts: ${{ steps.config.outputs.agent_loop_max_attempts }}
      agent_verifier_criteria: ${{ steps.config.outputs.agent_verifier_criteria }}
      agent_verifier_max_turns: ${{ steps.config.outputs.agent_verifier_max_turns }}
      agent_verifier_model: ${{ steps.config.outputs.agent_verifier_model }}
      base_branch: ${{ steps.config.outputs.base_branch }}
      consecutive_failures: ${{ steps.state.outputs.consecutive_failures }}
      current_sha: ${{ steps.state.outputs.current_sha }}
      engine: ${{ steps.config.outputs.engine }}
      last_sha: ${{ steps.state.outputs.last_sha }}
      level: ${{ steps.config.outputs.level }}
      paused: ${{ steps.changes.outputs.paused }}
      prompt: ${{ steps.prompt.outputs.prompt }}
      skill_name: ${{ steps.config.outputs.skill_name }}
      skip: ${{ steps.changes.outputs.skip }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set Config Outputs
        id: config
        shell: bash
        env:
          AGENT_VERIFIER_CRITERIA: ${{ env.AGENT_VERIFIER_CRITERIA }}
        run: |
          set -euo pipefail
          CRITERIA_DELIM="CRITERIA_$(openssl rand -hex 8)"
          {
            echo "agent_implementer_max_turns=${AGENT_TRIAGE_MAX_TURNS}"
            echo "agent_implementer_model=${AGENT_TRIAGE_MODEL}"
            echo "agent_loop_max_attempts=${AGENT_LOOP_MAX_ATTEMPTS}"
            echo "agent_verifier_criteria<<${CRITERIA_DELIM}"
            echo "${AGENT_VERIFIER_CRITERIA}"
            echo "${CRITERIA_DELIM}"
            echo "agent_verifier_max_turns=${AGENT_VERIFIER_MAX_TURNS}"
            echo "agent_verifier_model=${AGENT_VERIFIER_MODEL}"
            echo "base_branch=${DEFAULT_BASE_BRANCH}"
            echo "engine=${DEFAULT_ENGINE}"
            echo "level=${DEFAULT_LEVEL}"
            echo "skill_name=${SKILL_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Read Loop State
        id: state
        uses: y-miyazaki/config/.github/actions/loop-state-read@a07d550c58bd517fd3966fcde86ec396e7c76fb1 # v1.7.3
        with:
          state_file: ${{ env.STATE_FILE }}

      - name: Detect Changes
        id: changes
        shell: bash
        env:
          CONSECUTIVE_FAILURES: ${{ steps.state.outputs.consecutive_failures }}
          LAST_SHA: ${{ steps.state.outputs.last_sha }}
        run: |
          set -euo pipefail
          if [[ "${CONSECUTIVE_FAILURES}" -ge 3 ]]; then
            echo "::warning::Loop paused after ${CONSECUTIVE_FAILURES} consecutive rejections"
            {
              echo "paused=true"
              echo "skip=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DETECT_SCRIPT=".claude/skills/docs-updater/scripts/detect_changes.sh"
          RESULT=$(bash "${DETECT_SCRIPT}" --scope range --since "${LAST_SHA}")
          SKIP=$(echo "${RESULT}" | jq -r 'if (.skip | type) == "boolean" then (.skip | tostring) else "true" end' 2>/dev/null || echo "true")
          DELIM="RESULT_$(openssl rand -hex 8)"
          {
            echo "paused=false"
            echo "skip=${SKIP}"
            echo "result<<${DELIM}"
            echo "${RESULT}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Prompt
        if: steps.changes.outputs.skip == 'false'
        id: prompt
        uses: y-miyazaki/config/.github/actions/loop-prompt-generate@a07d550c58bd517fd3966fcde86ec396e7c76fb1 # v1.7.3
        with:
          context: |
            Last SHA: ${{ steps.state.outputs.last_sha }}
            Current SHA: ${{ steps.state.outputs.current_sha }}

            ## Change Detection Result
            ${{ steps.changes.outputs.result }}

            ## Instructions
            You are operating at ${{ steps.config.outputs.level }} level.
            Edit documentation files directly to address the triage findings.
            Allowed paths: docs/**/*.md, README.md, mkdocs.yml (nav section only).
            Do NOT modify any other files.
          skill_name: ${{ steps.config.outputs.skill_name }}

  execute:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    uses: y-miyazaki/config/.github/workflows/ci-loop-agent.yaml@a07d550c58bd517fd3966fcde86ec396e7c76fb1 # v1.7.3
    permissions:
      contents: write
      copilot-requests: write
    with:
      agent_implementer_max_turns: ${{ needs.detect.outputs.agent_implementer_max_turns }}
      agent_implementer_model: ${{ needs.detect.outputs.agent_implementer_model }}
      agent_loop_max_attempts: ${{ needs.detect.outputs.agent_loop_max_attempts }}
      agent_verifier_criteria: ${{ needs.detect.outputs.agent_verifier_criteria }}
      agent_verifier_max_turns: ${{ needs.detect.outputs.agent_verifier_max_turns }}
      agent_verifier_model: ${{ needs.detect.outputs.agent_verifier_model }}
      base_branch: ${{ needs.detect.outputs.base_branch }}
      denylist: "**/.env,**/credentials*,**/secrets*,**/migration/*.sql,**/infrastructure/**"
      engine: ${{ needs.detect.outputs.engine }}
      level: ${{ needs.detect.outputs.level }}
      prompt_text: ${{ needs.detect.outputs.prompt }}
      skill_name: ${{ needs.detect.outputs.skill_name }}
    secrets:
      AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
      GH_TOKEN_PUSH: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: [detect, execute]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.paused != 'true' &&
      needs.execute.result != 'cancelled'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Finalize
        uses: y-miyazaki/config/.github/actions/loop-finalize@a07d550c58bd517fd3966fcde86ec396e7c76fb1 # v1.7.3
        with:
          agent_result: ${{ needs.execute.result }}
          auto_merge: ${{ needs.detect.outputs.level == 'L3' }}
          base_branch: ${{ needs.detect.outputs.base_branch }}
          branch: ${{ needs.execute.outputs.branch }}
          current_sha: ${{ needs.detect.outputs.current_sha }}
          has_changes: ${{ needs.execute.outputs.has_changes }}
          pr_body: |
            ## Summary

            Automated documentation update by `loop-docs-triage` (${{ needs.detect.outputs.level }}).

            - Commits scanned: `${{ needs.detect.outputs.last_sha }}..${{ needs.detect.outputs.current_sha }}`
            - Verifier verdict: ${{ needs.execute.outputs.verdict || 'SKIPPED' }}
            - Attempts: ${{ needs.execute.outputs.attempts || '0' }}
            ${{ needs.execute.outputs.reason != '' && format('- Last verifier note: {0}', needs.execute.outputs.reason) || '' }}

            ---
            *This PR was created by a loop automation. Review before merging.*
          pr_title: "docs: automated documentation update (loop-docs-triage)"
          reject_reason: ${{ needs.execute.outputs.reason }}
          state_file: ${{ env.STATE_FILE }}
          token: ${{ github.token }}
          verdict: ${{ needs.execute.outputs.verdict }}
