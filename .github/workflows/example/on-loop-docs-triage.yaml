# Example: consume loop-docs-triage from y-miyazaki/config
#
# Customize env in the source workflow or fork .github/workflows/on-loop-docs-triage.yaml
# and pin actions to a release SHA (not @main).
name: on-loop-docs-triage

on:
    workflow_dispatch: {}

permissions:
    contents: write
    copilot-requests: write
    pull-requests: write

concurrency:
    cancel-in-progress: true
    group: loop-docs-triage

jobs:
    loop:
        secrets:
            AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
        uses: y-miyazaki/config/.github/workflows/on-loop-docs-triage.yaml@5991a1c4412e3c22cb31b5634f7be657dc1e3df5 # v1.7.9
