# CI workflow: APM install and audit on push/PR
name: on-ci-push-apm-audit

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".apm/**"
            - ".agents/**"
            - ".github/**"
            - "apm.lock.yaml"
            - "apm.yml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".apm/**"
            - ".agents/**"
            - ".github/**"
            - "apm.lock.yaml"
            - "apm.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    apm-audit:
        uses: y-miyazaki/config/.github/workflows/ci-apm-audit.yaml@4531917ea75dc79807a04ae7cdc6679294d81b4e # v1.7.7
        permissions:
            contents: read
