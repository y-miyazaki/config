# CI workflow: APM install and audit on push/PR
name: on-ci-push-apm-audit

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apm-audit:
    uses: y-miyazaki/config/.github/workflows/ci-apm-audit.yaml@1bdad6bbbe6c0acd740551a08a05e7eb3231a9a8 # v1.8.50
    permissions:
      contents: read
