# CI workflow: APM install and audit on push/PR
name: on-ci-push-apm-audit

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apm-audit:
    uses: y-miyazaki/config/.github/workflows/ci-apm-audit.yaml@f6d5c20514efa26ac0bf80ba83a025917845e9d6 # v1.4.0
    permissions:
      contents: read
