# CI workflow: APM install and audit on push/PR
name: on-ci-push-apm-audit

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".apm/**"
            - ".agents/**"
            - ".github/**"
            - "apm.lock.yaml"
            - "apm.yml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".apm/**"
            - ".agents/**"
            - ".github/**"
            - "apm.lock.yaml"
            - "apm.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

