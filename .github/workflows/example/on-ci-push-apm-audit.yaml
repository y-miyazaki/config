# CI workflow: APM install and audit on push/PR
name: on-ci-push-apm-audit

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".apm/**"
      - ".agents/**"
      - ".github/**"
      - "apm.lock.yaml"
      - "apm.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apm-audit:
    uses: y-miyazaki/config/.github/workflows/ci-apm-audit.yaml@cff949f38d5776f64c289436e4daf9ec62205068 # v1.8.54
    permissions:
      contents: read
