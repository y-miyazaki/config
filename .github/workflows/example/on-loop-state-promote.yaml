# Platform workflow: promote pending loop state when a fix PR closes.
# Design: docs/explanation/loop-engineering/multi-branch-loops-design.md#state-delivery-philosophy
# Requires MAINTENANCE_BOT_APP_CLIENT_ID and MAINTENANCE_BOT_APP_PRIVATE_KEY (passed via repository secrets).
name: on-loop-state-promote

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  promote:
    environment: default
    if: contains(github.event.pull_request.labels.*.name, 'loop-automation')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate App Bot Token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
          permission-contents: write
          permission-pull-requests: write
          private-key: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}

      - name: Promote Pending State
        uses: y-miyazaki/config/.github/actions/loop-state-promote@4f3ef86bd5699872523e0e3a80985320db4a46bd # v1.8.31
        with:
          merged: ${{ github.event.pull_request.merged && 'true' || 'false' }}
          pr_number: ${{ github.event.pull_request.number }}
          state_push_branch: ""
          token: ${{ steps.app_token.outputs.token }}
