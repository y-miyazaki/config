# Platform workflow: promote pending loop state when a fix PR closes.
# Design: docs/explanation/multi-branch-loops-design.md#state-delivery-philosophy
# Requires environment secrets on `default`: MAINTENANCE_BOT_APP_CLIENT_ID, MAINTENANCE_BOT_APP_PRIVATE_KEY.
name: on-loop-state-promote

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  promote:
    environment: default
    if: contains(github.event.pull_request.labels.*.name, 'loop-automation')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Maintenance Bot Token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
          permission-contents: write
          permission-pull-requests: write
          private-key: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}

      - name: Promote Pending State
        uses: y-miyazaki/config/.github/actions/loop-state-promote@4d93be4adee01e60c48fb3deaee0ab7930e22fa6 # v1.8.18
        with:
          merged: ${{ github.event.pull_request.merged && 'true' || 'false' }}
          pr_number: ${{ github.event.pull_request.number }}
          state_push_branch: ""
          token: ${{ steps.app_token.outputs.token }}
