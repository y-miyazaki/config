# CI workflow: GitHub Actions workflow lint on push/PR
name: on-ci-push-github-actions-workflow

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".github/workflows/**/*.yml"
            - ".github/workflows/**/*.yaml"
            - ".github/actions/**/*.yml"
            - ".github/actions/**/*.yaml"
            - "**/action.yml"
            - "**/action.yaml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".github/workflows/**/*.yml"
            - ".github/workflows/**/*.yaml"
            - ".github/actions/**/*.yml"
            - ".github/actions/**/*.yaml"
            - "**/action.yml"
            - "**/action.yaml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    github-actions-workflow-ci:
        uses: y-miyazaki/config/.github/workflows/ci-github-actions-workflow.yaml@311cb20c66c268c978229c119abac90af9af4f48 # v1.7.6
        permissions:
            contents: read
