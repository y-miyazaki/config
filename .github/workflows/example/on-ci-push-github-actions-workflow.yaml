# CI workflow: GitHub Actions workflow lint on push/PR
name: on-ci-push-github-actions-workflow

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".github/workflows/**/*.yml"
            - ".github/workflows/**/*.yaml"
            - ".github/actions/**/*.yml"
            - ".github/actions/**/*.yaml"
            - "**/action.yml"
            - "**/action.yaml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - ".github/workflows/**/*.yml"
            - ".github/workflows/**/*.yaml"
            - ".github/actions/**/*.yml"
            - ".github/actions/**/*.yaml"
            - "**/action.yml"
            - "**/action.yaml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
