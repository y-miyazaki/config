# CI workflow: Shell script lint on push/PR
name: on-ci-push-shell-script

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.sh"
            - "**/*.bats"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.sh"
            - "**/*.bats"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    checks: write
    contents: read
    pull-requests: write

