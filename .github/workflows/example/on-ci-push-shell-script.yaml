# CI workflow: Shell script lint on push/PR
name: on-ci-push-shell-script

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.sh"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.sh"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    checks: write
    contents: read
    pull-requests: write

jobs:
    shell-script-ci:
        uses: y-miyazaki/config/.github/workflows/ci-shell-script.yaml@a8c05ca01034ca94d61e6817a3df10f158aebc18 # v1.7.3
        with:
            script_path: "**/*.sh"
        permissions:
            checks: write
            contents: read
            pull-requests: write
