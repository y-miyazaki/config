# CI workflow: Markdown lint on push/PR
name: on-ci-push-markdown

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.md"
            - "docs/**/*.md"
            - ".markdownlint-cli2.yaml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.md"
            - "docs/**/*.md"
            - ".markdownlint-cli2.yaml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
