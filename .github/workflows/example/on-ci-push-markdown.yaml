# CI workflow: Markdown lint on push/PR
name: on-ci-push-markdown

on:
    push:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.md"
            - "docs/**/*.md"
            - ".markdownlint-cli2.yaml"
    pull_request:
        branches:
            - "main"
            - "master"
            - "hotfix/**"
            - "release/**"
            - "develop"
            - "feature/**"
        paths:
            - "**/*.md"
            - "docs/**/*.md"
            - ".markdownlint-cli2.yaml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    markdown-ci:
        uses: y-miyazaki/config/.github/workflows/ci-markdown.yaml@952f663047aea2c0b5ac4f143340fae91cd8c562 # v1.7.4
        permissions:
            contents: read
            pull-requests: write
        with:
            markdownlint_flags: "README*.md docs/**/*.md"
