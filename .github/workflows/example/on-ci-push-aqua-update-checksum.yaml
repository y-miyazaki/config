# CI workflow: Aqua checksum update on push
# Usage: This workflow requires a GitHub App for auto-committing checksum updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Pass BOT_APP_* via secrets: (remap MAINTENANCE_BOT_* as needed).
name: on-ci-push-aqua-update-checksum

on:
    push:
        paths:
            - "aqua.yaml"
            - "aqua/*.yaml"

concurrency:
    cancel-in-progress: true
    group: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: read

jobs:
