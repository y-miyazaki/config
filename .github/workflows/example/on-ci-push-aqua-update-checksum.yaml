# CI workflow: Aqua checksum update on push
# Requires: BOT_APP_PRIVATE_KEY and BOT_APP_CLIENT_ID secrets.
name: on-ci-push-aqua-update-checksum

on:
  push:
    paths:
      - "aqua.yaml"
      - "aqua/*.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aqua-update-checksum:
    uses: y-miyazaki/config/.github/workflows/ci-aqua-update-checksum.yaml@4d5104b3af3d62cc3afa960f5c9f99ae95699979 # v1.0.6
    permissions:
      contents: read
    with:
      environment: "default"
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
