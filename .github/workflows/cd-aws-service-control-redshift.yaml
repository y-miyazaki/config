# Reusable workflow: Redshift cluster control (pause/resume)
# Pauses or resumes Redshift clusters with automatic resource discovery.
name: cd-aws-service-control-redshift

on:
  workflow_call:
    inputs:
      action:
        description: "Action to perform (start or stop)"
        required: true
        type: string
      auto_discover:
        default: false
        description: "Automatically discover Redshift clusters (if true, clusters input is ignored)"
        required: false
        type: boolean
      clusters:
        default: "[]"
        description: "JSON array of Redshift cluster identifiers to control ['cluster-1', 'cluster-2']"
        required: false
        type: string
      environment:
        description: "Target environment (dev, qa, stg, prd, etc.)"
        required: true
        type: string
      exclude_patterns:
        default: "[]"
        description: "JSON array of patterns to exclude from auto-discovery (partial match on cluster identifier) ['pattern1', 'pattern2']"
        required: false
        type: string
      include_patterns:
        default: "[]"
        description: "JSON array of patterns to include in auto-discovery (partial match). If empty, all are included ['pattern1', 'pattern2']"
        required: false
        type: string
      wait_for_stable:
        default: true
        description: "Wait for cluster to reach desired state after operation (set to false to skip waiting)"
        required: false
        type: boolean
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true

permissions: {}

env:
  ACTION: ${{ inputs.action }}
  AUTO_DISCOVER: ${{ inputs.auto_discover }}
  CLUSTERS: ${{ inputs.clusters }}
  EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
  INCLUDE_PATTERNS: ${{ inputs.include_patterns }}

jobs:
  discover-clusters:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      discovered_clusters_b64: ${{ steps.discover.outputs.discovered_clusters_b64 }}
    steps:
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}

      - name: Discover Redshift Clusters
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          # Helper: Check jq availability
          check_jq() {
            command -v jq >/dev/null 2>&1 || { echo "❌ jq is required"; exit 1; }
          }

          # Short-circuit when auto-discover is disabled
          if [[ "$AUTO_DISCOVER" != "true" ]]; then
            echo "discovered_clusters=[]" >> "$GITHUB_OUTPUT"
            echo "discovered_clusters_b64=" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Auto-discover disabled"
            exit 0
          fi

          check_jq

          echo "🔍 Discovering Redshift clusters..."

          # List all Redshift clusters (JSON output enables automatic pagination)
          mapfile -t clusters < <(aws redshift describe-clusters --output json | jq -r '.Clusters[].ClusterIdentifier')

          FILTERED_CLUSTERS=()
          INCLUDE_PATTERNS_ARRAY=$(echo "$INCLUDE_PATTERNS" | jq -r '.[]' 2>/dev/null || echo "")
          EXCLUDE_PATTERNS_ARRAY=$(echo "$EXCLUDE_PATTERNS" | jq -r '.[]' 2>/dev/null || echo "")

          for cluster_id in "${clusters[@]}"; do
            [[ -z "$cluster_id" ]] && continue

            # Check exclude patterns
            EXCLUDED=false
            if [[ -n "$EXCLUDE_PATTERNS_ARRAY" ]]; then
              while IFS= read -r pattern; do
                if [[ "$cluster_id" == *"$pattern"* ]]; then
                  echo "  ⊖ Excluding: $cluster_id [matched exclude pattern: $pattern]"
                  EXCLUDED=true
                  break
                fi
              done <<< "$EXCLUDE_PATTERNS_ARRAY"
            fi

            [[ "$EXCLUDED" == true ]] && continue

            # Check include patterns
            if [[ -n "$INCLUDE_PATTERNS_ARRAY" ]]; then
              INCLUDED=false
              while IFS= read -r pattern; do
                if [[ "$cluster_id" == *"$pattern"* ]]; then
                  INCLUDED=true
                  break
                fi
              done <<< "$INCLUDE_PATTERNS_ARRAY"

              if [[ "$INCLUDED" == false ]]; then
                echo "  ⊖ Skipping: $cluster_id [no include pattern matched]"
                continue
              fi
            fi

            echo "  ✓ Discovered: $cluster_id"
            FILTERED_CLUSTERS+=("\"$cluster_id\"")
          done

          # Create JSON array
          if [ ${#FILTERED_CLUSTERS[@]} -eq 0 ]; then
            DISCOVERED_JSON='[]'
          else
            DISCOVERED_JSON=$(printf '%s\n' "${FILTERED_CLUSTERS[@]}" | jq -s .)
          fi

          # echo "discovered_clusters=$DISCOVERED_JSON" >> "$GITHUB_OUTPUT"
          # Provide a base64-encoded form to avoid unsafe template expansion in downstream steps
          DISCOVERED_B64=$(printf '%s' "$DISCOVERED_JSON" | base64 -w0)
          echo "discovered_clusters_b64=$DISCOVERED_B64" >> "$GITHUB_OUTPUT"
          echo "✅ Discovered ${#FILTERED_CLUSTERS[@]} Redshift cluster(s)"
          printf '%s' "$DISCOVERED_JSON" | jq .

  validate:
    needs: [discover-clusters]
    if: ${{ always() && github.actor != 'dependabot[bot]' && (needs.discover-clusters.result == 'success' || needs.discover-clusters.result == 'skipped') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      action_validated: ${{ steps.validate-inputs.outputs.action }}
      target_clusters: ${{ steps.validate-inputs.outputs.targets }}
    steps:
      - name: Validate inputs
        id: validate-inputs
        uses: y-miyazaki/config/.github/actions/aws-service-control-validate@0a112b80cbf78595afc2919cec7e266bb0762658 # v1.8.61
        with:
          action: ${{ env.ACTION }}
          auto_discover: ${{ env.AUTO_DISCOVER }}
          discovered_b64: ${{ needs.discover-clusters.outputs.discovered_clusters_b64 }}
          input_field_name: clusters
          manual_targets_json: ${{ env.CLUSTERS }}
          resource_label: Redshift clusters

  control-clusters:
    needs: validate
    if: ${{ github.actor != 'dependabot[bot]' && needs.validate.result == 'success' && needs.validate.outputs.target_clusters != '[]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: redshift-control-${{ inputs.environment }}-${{ matrix.cluster }}-${{ inputs.action }}
      cancel-in-progress: false
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(needs.validate.outputs.target_clusters) }}
    steps:
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}

      - name: Control Redshift Cluster
        env:
          CLUSTER: ${{ matrix.cluster }}
        shell: bash
        run: |
          set -euo pipefail

          # Check current cluster status
          CURRENT_STATUS=$(aws redshift describe-clusters \
            --cluster-identifier "$CLUSTER" \
            --query 'Clusters[0].ClusterStatus' \
            --output text 2>/dev/null || echo "unknown")

          echo "Current cluster status: $CURRENT_STATUS"

          if [[ "$ACTION" == "stop" ]]; then
            # Skip pause if already paused or in pausing state
            if [[ "$CURRENT_STATUS" == "paused" ]]; then
              echo "ℹ️ Redshift cluster is already paused (skipping)"
              exit 0
            elif [[ "$CURRENT_STATUS" == "pausing" ]]; then
              echo "ℹ️ Redshift cluster is already pausing (skipping)"
              exit 0
            elif [[ "$CURRENT_STATUS" != "available" ]]; then
              echo "ℹ️ Redshift cluster is not available (status: $CURRENT_STATUS). Cannot pause (skipping)"
              exit 0
            fi

            echo "🛑 Pausing Redshift cluster: $CLUSTER"
            ERR=$(aws redshift pause-cluster --cluster-identifier "$CLUSTER" 2>&1) || RC=$?
            if [ "${RC:-0}" -ne 0 ]; then
              if echo "$ERR" | grep -qiE "is in paused state|already.*paused|InvalidClusterStateFault|cannot be paused"; then
                echo "ℹ️ Redshift cluster cannot be paused or is already paused (ignoring): $ERR"
              else
                echo "$ERR"
                exit "${RC:-1}"
              fi
            else
              echo "✅ Pause command sent for Redshift cluster: $CLUSTER"
            fi

          elif [[ "$ACTION" == "start" ]]; then
            # Skip resume if already available or in resuming state
            if [[ "$CURRENT_STATUS" == "available" ]]; then
              echo "ℹ️ Redshift cluster is already available (skipping)"
              exit 0
            elif [[ "$CURRENT_STATUS" == "resuming" ]]; then
              echo "ℹ️ Redshift cluster is already resuming (skipping)"
              exit 0
            elif [[ "$CURRENT_STATUS" != "paused" ]]; then
              echo "ℹ️ Redshift cluster is not paused (status: $CURRENT_STATUS). Cannot resume (skipping)"
              exit 0
            fi

            echo "▶️  Resuming Redshift cluster: $CLUSTER"
            ERR=$(aws redshift resume-cluster --cluster-identifier "$CLUSTER" 2>&1) || RC=$?
            if [ "${RC:-0}" -ne 0 ]; then
              if echo "$ERR" | grep -qiE "is in available state|already.*available|InvalidClusterStateFault|cannot be resumed"; then
                echo "ℹ️ Redshift cluster cannot be resumed or is already available (ignoring): $ERR"
              else
                echo "$ERR"
                exit "${RC:-1}"
              fi
            else
              echo "✅ Resume command sent for Redshift cluster: $CLUSTER"
            fi
          fi

      - name: Wait for Redshift Cluster Status
        if: ${{ inputs.wait_for_stable }}
        timeout-minutes: 30
        env:
          CLUSTER: ${{ matrix.cluster }}
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_STATUS="available"
          if [[ "$ACTION" == "stop" ]]; then
            EXPECTED_STATUS="paused"
          fi

          echo "⏳ Waiting for Redshift cluster to reach status: $EXPECTED_STATUS"

          for i in {1..60}; do
            STATUS=$(aws redshift describe-clusters \
              --cluster-identifier "$CLUSTER" \
              --query 'Clusters[0].ClusterStatus' \
              --output text)

            echo "Current status: $STATUS (attempt $i/60)"

            if [[ "$STATUS" == "$EXPECTED_STATUS" ]]; then
              echo "✅ Redshift cluster reached expected status: $EXPECTED_STATUS"
              exit 0
            fi

            sleep 30
          done

          echo "⚠️  Warning: Redshift cluster did not reach expected status within timeout"
          exit 1
