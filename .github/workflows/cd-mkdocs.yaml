# Reusable workflow: Build MkDocs site and upload as artifact
# Installs mkdocs-material via pip and builds the site.
# Use with cd-github-pages.yaml for deployment.
name: cd-mkdocs

on:
  workflow_call:
    inputs:
      artifact_name:
        default: "mkdocs-site"
        description: "Name of the uploaded artifact"
        required: false
        type: string
      config_file:
        default: "mkdocs.yml"
        description: "Path to mkdocs configuration file"
        required: false
        type: string
      pip_packages:
        default: "mkdocs-material"
        description: "Space-separated pip packages to install (default: mkdocs-material)"
        required: false
        type: string
      python_version:
        default: "3.x"
        description: "Python version for setup-python"
        required: false
        type: string
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build:
    outputs:
      artifact_name: ${{ inputs.artifact_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: mkdocs-pip-${{ runner.os }}-${{ hashFiles(inputs.config_file) }}
          path: ~/.cache/pip
          restore-keys: |
            mkdocs-pip-${{ runner.os }}-

      - name: Install dependencies
        env:
          PIP_PACKAGES: ${{ inputs.pip_packages }}
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          pip install --quiet ${PIP_PACKAGES}

      - name: Build site
        env:
          CONFIG_FILE: ${{ inputs.config_file }}
        shell: bash
        run: |
          set -euo pipefail
          mkdocs build --config-file "${CONFIG_FILE}" --strict
          echo "✅ MkDocs build complete"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact_name }}
          path: site/
          retention-days: 1
