# Loop workflow: Structural refactor
# Detects H1 structure hints, runs bounded Agent→Verify loop, then finalizes.
# Design doc: docs/explanation/loop-engineering/workflows/loop-refactor-workflow-design.md
# Caller inputs: docs/explanation/loop-engineering/workflows/loop-caller-inputs-reference.md
# Requires repository secret: AGENT_TOKEN (engine API key; see engine input).
# Pass credentials via secrets: (callee BOT_APP_* / AGENT_TOKEN; remap MAINTENANCE_BOT_*). Optional with.environment for env-scoped secrets inside the reusable.
name: on-loop-refactor

on:
  schedule:
    - cron: "0 10 * * 0"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  copilot-requests: write # zizmor: ignore[excessive-permissions]
  pull-requests: write

concurrency:
  cancel-in-progress: false
  group: loop-state-main
  queue: max

jobs:
  loop:
    uses: ./.github/workflows/ci-loop-caller.yaml
    with:
      agent_implementer_max_turns: 5
      agent_implementer_model: cursor-grok-4.5-low
      agent_loop_max_attempts: 3
      agent_verifier_criteria: |
        ## Criteria for APPROVE

        ALL of the following must be true:
        1. Changes address the single detect hint described in the detection result
        2. The diff is behavior-preserving structural work (O1/O2 only)
        3. No files outside the allowlist were modified
        4. No denylist paths were touched
        5. No cross-package redesign, GoF patterns, or public API semantics changes
        6. No lint/style-only or architecture-improvement refactors
        7. The implementer report lists validation commands run and their outcome

        ## Criteria for REJECT

        ANY of the following triggers REJECT:
        - Changes touching more than five files without clear necessity
        - Cross-package moves, new design patterns, or deep-module redesign
        - Architecture-improvement or O3-style proposal-only output with no safe O1/O2 apply
        - Lint-primary diffs (rename/quote/gofmt-only) not tied to the hint
        - Feature, behavior-changing, or dependency upgrade changes
        - Modifications outside the allowlist
        - Missing validation when the stack supports an existing gate
        - Hallucinated paths, commands, or APIs not present in the repository
      agent_verifier_max_turns: 3
      agent_verifier_model: composer-2.5
      allowlist: ".apm/packages/**,scripts/**"
      branch_match: main
      branch_state: main
      budget_max_runs_per_day: 1
      budget_max_tokens_per_day: 500000
      detect_domain_env_json: >-
        {"REFACTOR_DUP_MIN_LINES":"8","REFACTOR_OVERSIZED_FILE_LINES":"400","REFACTOR_SCAN_GLOBS":".apm/packages/**,scripts/**"}
      detect_script: .agents/skills/refactor/scripts/detect_refactor.sh
      engine: cursor
      environment: default
      finalize_integration: open_pr
      infer_files_pattern: '[[:alnum:]_.-]+/[^[:space:],)]+\.(md|ya?ml|sh|go|toml|json)'
      loop_name: refactor
      max_targets_per_schedule: 1
      no_changes_verdict: REJECT
      pr_body: ""
      pr_title: "refactor(loop): structural improvement"
      prompt_instructions: |
        Run the refactor skill for one mechanical hint (duplication_block or oversized_unit).
        Force structural intent only — O2 cap; no architecture-improvement / O3 proposal path.
        Follow the refactor skill contract: one target, characterization when required, minimal O1/O2 diff.
        Stack validation (A'): shell-script-validation, go-validation, github-actions-validation, markdown-validation as applicable via ## Instructions.
        Invoke named validation skills for touched stacks before finalize.
      pr_enabled: false
      skill_name: refactor
    secrets:
      AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}

