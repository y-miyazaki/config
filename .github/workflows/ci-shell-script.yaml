# Reusable workflow: Shell script lint and validation
# Uses shellcheck, shfmt, bash syntax checks, and shebang verification.
name: ci-shell-script

on:
  workflow_call:
    inputs:
      fail_level:
        default: "warning"
        description: "Otherwise, exit code 1 for reviewdog if it finds at least 1 issue with severity greater than or equal to the given level. Possible values: [none,any,info,warning,error]"
        required: false
        type: string
      fail_on_warnings:
        default: false
        description: "When true, treat warnings as failures for selected steps (boolean)."
        required: false
        type: boolean
      script_path:
        default: ""
        description: "Comma-separated glob(s) of script files to check. If empty, all **/*.sh and **/*.bats are checked"
        required: false
        type: string
      shfmt_flags:
        default: "-l -s -i 4 -ci -bn -sr"
        description: "Flags passed to shfmt via reviewdog/action-shfmt."
        required: false
        type: string

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  FAIL_LEVEL: ${{ inputs.fail_level }}
  FAIL_ON_WARNINGS: ${{ inputs.fail_on_warnings }}
  SCRIPT_PATH: ${{ inputs.script_path }}
  SHFMT_FLAGS: ${{ inputs.shfmt_flags }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git auth
        if: github.event_name == 'pull_request'
        uses: y-miyazaki/config/.github/actions/git-auth@cf11d87d5638a708323bc96ccb307d1049db59e9 # v1.8.27
        with:
          operation: configure
          token: ${{ github.token }}

      - name: Setup Expand file list
        id: file-list
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086,SC2046
          # If script_path is empty, check all shell scripts in the repo
          raw_input="${SCRIPT_PATH}"
          if [ -z "$raw_input" ]; then
            raw_input='**/*.sh,**/*.bats'
          fi
          IFS=',' read -ra patterns <<< "$raw_input"
          files=()
          shopt -s globstar nullglob
          for p in "${patterns[@]}"; do
            for f in $p; do
              files+=("$f")
            done
          done
          shopt -u globstar nullglob
          if [ ${#files[@]} -eq 0 ]; then
            {
              echo "no_files=true"
              echo "files_list="
            } >> "$GITHUB_OUTPUT"
          else
            printf "%s\n" "${files[@]}" > /tmp/scripts_to_check.txt
            # Join files with a comma (no trailing comma) for reviewdog 'path' input
            files_csv=$(IFS=,; echo "${files[*]}")
            {
              echo "no_files=false"
              echo "files_list=$files_csv"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Exec shfmt + reviewdog (PR comments)
        if: steps.file-list.outputs.no_files == 'false' && github.event_name == 'pull_request'
        uses: reviewdog/action-shfmt@c5e3ba7497c338866921924691aef4fa18bc1fe0 # v1.1.0
        with:
          filter_mode: file
          github_token: ${{ github.token }}
          level: error
          reviewdog_flags: "-fail-level=${{ env.FAIL_LEVEL }} -reporter=github-pr-review"
          shfmt_flags: ${{ env.SHFMT_FLAGS }}
          workdir: "."

      - name: Exec shfmt + reviewdog (push/check)
        if: steps.file-list.outputs.no_files == 'false' && github.event_name != 'pull_request'
        uses: reviewdog/action-shfmt@c5e3ba7497c338866921924691aef4fa18bc1fe0 # v1.1.0
        with:
          filter_mode: file
          github_token: ${{ github.token }}
          level: error
          reviewdog_flags: "-fail-level=${{ env.FAIL_LEVEL }} -reporter=github-check"
          shfmt_flags: ${{ env.SHFMT_FLAGS }}
          workdir: "."

      - name: Exec ShellCheck + reviewdog (PR comments)
        if: steps.file-list.outputs.no_files == 'false' && github.event_name == 'pull_request'
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          fail_level: ${{ env.FAIL_LEVEL }}
          filter_mode: file
          github_token: ${{ github.token }}
          level: error
          path: ${{ steps.file-list.outputs.files_list }}
          reporter: github-pr-review
          shellcheck_flags: "-x"

      - name: Exec ShellCheck + reviewdog (push/check)
        if: steps.file-list.outputs.no_files == 'false' && github.event_name != 'pull_request'
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1.32.0
        with:
          fail_level: ${{ env.FAIL_LEVEL }}
          filter_mode: file
          github_token: ${{ github.token }}
          level: error
          path: ${{ steps.file-list.outputs.files_list }}
          reporter: github-check
          shellcheck_flags: "-x"

      - name: Exec Bash syntax check (bash -n)
        if: steps.file-list.outputs.no_files == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          set -euo pipefail
          while IFS= read -r f; do
            if [[ "$f" == *.bats ]]; then
              echo "Skipping bash syntax check for Bats file: $f"
              continue
            fi
            echo "Checking syntax: $f"
            bash -n "$f"
          done < /tmp/scripts_to_check.txt

      - name: Exec Shebang check (shell or bats)
        if: steps.file-list.outputs.no_files == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          set -euo pipefail
          while IFS= read -r f; do
            first_line=$(head -n1 "$f" || true)
            if [[ ! "$first_line" =~ ^#!/.*sh ]] && [[ ! "$first_line" =~ ^#!/.*bats ]]; then
              echo "Invalid shebang in $f: $first_line" >&2
              exit 2
            fi
          done < /tmp/scripts_to_check.txt

      - name: Exec Permissions check
        if: steps.file-list.outputs.no_files == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          set -euo pipefail
          rc=0
          while IFS= read -r f; do
            if [[ "$f" == *.bats ]]; then
              continue
            fi
            if [[ ! -x "$f" ]]; then
              # Emit GitHub workflow warning annotation for visibility
              echo "::warning file=$f::Script is not executable"
              rc=1
            fi
          done < /tmp/scripts_to_check.txt

          if [[ $rc -ne 0 ]]; then
            if [[ "${FAIL_ON_WARNINGS:-false}" == "true" ]]; then
              echo "Failing due to non-executable scripts and fail_on_warnings=true" >&2
              exit 1
            else
              echo "One or more scripts are not executable; continue because fail_on_warnings=false"
            fi
          fi

      - name: Clear git auth
        if: always() && github.event_name == 'pull_request'
        uses: y-miyazaki/config/.github/actions/git-auth@cf11d87d5638a708323bc96ccb307d1049db59e9 # v1.8.27
        with:
          operation: clear
          token: ${{ github.token }}

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@cf11d87d5638a708323bc96ccb307d1049db59e9 # v1.8.27
        with:
          artifacts: |
            (none)
          outputs: |
            files_list: ${{ steps.file-list.outputs.files_list }}
          params: |
            script_path: ${{ env.SCRIPT_PATH }}
            fail_level: ${{ env.FAIL_LEVEL }}
          status: "${{ job.status }}"
          title: "Shell Script Lint"
