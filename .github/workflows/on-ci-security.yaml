# CI workflow: repository security (Trivy + SBOM + SAST) on schedule and security-relevant changes
# Design doc: docs/superpowers/specs/2026-07-24-ci-security-workflow-design.md
name: on-ci-security

on:
  pull_request:
    branches:
      - "develop"
      - "feature/**"
      - "hotfix/**"
      - "main"
      - "master"
      - "release/**"
    paths:
      - "**/.tflint.hcl"
      - "**/*.go"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tsx"
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package-lock.json"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - ".github/workflows/ci-sast.yaml"
      - ".github/workflows/ci-security.yaml"
      - ".github/workflows/on-ci-security.yaml"
      - ".semgrepignore"
      - ".trivyignore"
      - "nodejs/**"
      - "trivy.yaml"
      - "trivy-secrets.yaml"
  push:
    branches:
      - "develop"
      - "feature/**"
      - "hotfix/**"
      - "main"
      - "master"
      - "release/**"
    paths:
      - "**/.tflint.hcl"
      - "**/*.go"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tsx"
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package-lock.json"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - ".github/workflows/ci-sast.yaml"
      - ".github/workflows/ci-security.yaml"
      - ".github/workflows/on-ci-security.yaml"
      - ".semgrepignore"
      - ".trivyignore"
      - "nodejs/**"
      - "trivy.yaml"
      - "trivy-secrets.yaml"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  sast:
    uses: ./.github/workflows/ci-sast.yaml
    with:
      # Go repos:       codeql_languages: '["go","actions"]'
      # Node.js repos:  codeql_languages: '["javascript-typescript","actions"]'
      # Terraform/IaC-only (no app source): codeql_languages: '["actions"]'
      codeql_languages: '["actions"]'
    permissions:
      actions: read
      contents: read
      security-events: write

  security:
    uses: ./.github/workflows/ci-security.yaml
    permissions:
      contents: read
      pull-requests: write
      security-events: write
