# Reusable workflow: Terraform CI (lint, security, plan)
# Runs terraform fmt, validate, tflint, trivy, and terraform plan.
name: ci-terraform-aws

on:
  workflow_call:
    inputs:
      component:
        description: "Terraform component (base, monitor, management)"
        required: true
        type: string
      deploy:
        default: false
        description: "Whether to execute terraform apply"
        required: false
        type: boolean
      environment:
        description: "Target environment (dev, qa, stg, prd, audit, root)"
        required: true
        type: string
      terraform_path:
        description: "Path to terraform configuration"
        required: true
        type: string
      terraform_version:
        default: "1.15.4"
        description: "Terraform version to use"
        required: false
        type: string
      tfbackend_file:
        default: ""
        description: "Backend config file name (default: terraform.{environment}.tfbackend)"
        required: false
        type: string
      tfcmt_checksum:
        default: "475e3fb36765b10fec5c7a199f86116f6ef764340f96d6baa2becf609418b760" # pragma: allowlist secret
        # To get checksum: curl -sL "https://github.com/suzuki-shunsuke/tfcmt/releases/download/v4.14.13/tfcmt_linux_amd64.tar.gz" | sha256sum | awk '{print $1}'
        description: "SHA256 checksum for tfcmt release tarball"
        required: false
        type: string
      tfcmt_version:
        default: "4.14.13"
        description: "tfcmt (tfcmt) version to use for PR plan comments"
        required: false
        type: string
      tflint_config_path:
        default: ""
        description: "TFLint config file path (default: auto-detect .tflint.hcl in terraform_path or repository root)"
        required: false
        type: string
      tflint_version:
        default: "v0.62.1"
        description: "TFLint version to use"
        required: false
        type: string
      tfvars_file:
        default: ""
        description: "Var file name (default: terraform.{environment}.tfvars)"
        required: false
        type: string
      trivy_config:
        default: "trivy.yaml"
        description: "Trivy config file path"
        required: false
        type: string
      trivy_version:
        default: "v0.70.0"
        description: "Trivy version to use"
        required: false
        type: string
    secrets:
      AWS_IAM_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

# Keep top-level env for truly global constants only (tool defaults etc.)
env:
  COMPONENT: ${{ inputs.component }}
  DEPLOY: ${{ inputs.deploy }}
  ENVIRONMENT: ${{ inputs.environment }}
  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  PR_NUMBER: ${{ github.event.number }}
  TERRAFORM_PATH: ${{ inputs.terraform_path }}
  TERRAFORM_VERSION: ${{ inputs.terraform_version }}
  TFBACKEND_FILE: ${{ inputs.tfbackend_file || format('terraform.{0}.tfbackend', inputs.environment) }}
  TFCMT_CHECKSUM: ${{ inputs.tfcmt_checksum }}
  TFCMT_VERSION: ${{ inputs.tfcmt_version }}
  TFLINT_CONFIG_PATH: ${{ inputs.tflint_config_path }}
  TFLINT_VERSION: ${{ inputs.tflint_version }}
  TFVARS_FILE: ${{ inputs.tfvars_file || format('terraform.{0}.tfvars', inputs.environment) }}
  TRIVY_CONFIG: ${{ inputs.trivy_config }}
  TRIVY_VERSION: ${{ inputs.trivy_version }}

jobs:
  init:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: ${{ inputs.environment }}
    # env moved to top-level for consistency
    outputs:
      tf_init_cache_key: ${{ steps.compute-init-cache-key.outputs.key }}
      tf_plugin_cache_key: ${{ steps.compute-plugin-cache-key.outputs.key }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terraform plugin cache
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' >~/.terraformrc
          mkdir --parents ~/.terraform.d/plugin-cache

      - name: Setup Terraform plugin cache key
        id: compute-plugin-cache-key
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016,SC2086
          echo "key=terraform-plugin-cache-${ENVIRONMENT}-${COMPONENT}-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', env.TERRAFORM_PATH)) }}" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform init cache key
        id: compute-init-cache-key
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016,SC2086
          echo "key=terraform-init-${ENVIRONMENT}-${COMPONENT}-${{ runner.os }}-${{ hashFiles(format('{0}/{1}', env.TERRAFORM_PATH, env.TFBACKEND_FILE), format('{0}/.terraform.lock.hcl', env.TERRAFORM_PATH), format('{0}/**/*.tf', env.TERRAFORM_PATH), 'modules/**/*.tf') }}" >> "$GITHUB_OUTPUT"

      - name: Cache Terraform plugin cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ steps.compute-plugin-cache-key.outputs.key }}
          path: |
            ~/.terraform.d/plugin-cache

      - name: Cache Terraform init
        id: cache-terraform-init
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ steps.compute-init-cache-key.outputs.key }}
          path: |
            ${{ env.TERRAFORM_PATH }}/.terraform
            ${{ env.TERRAFORM_PATH }}/.terraform.lock.hcl

      - name: Exec Terraform init
        id: init
        if: steps.cache-terraform-init.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Cache miss or incomplete modules - initializing Terraform for ${COMPONENT}"
          terraform -chdir="${TERRAFORM_PATH}" init -reconfigure -backend-config="${TFBACKEND_FILE}"

  lint:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: init
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform with cache
        id: terraform-setup
        shell: bash
        run: |
          set -euo pipefail
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' >~/.terraformrc
          mkdir --parents ~/.terraform.d/plugin-cache

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Restore Cache Terraform plugin cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ needs.init.outputs.tf_plugin_cache_key }}
          path: |
            ~/.terraform.d/plugin-cache

      - name: Restore Cache Terraform init
        id: restore-terraform-init
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ needs.init.outputs.tf_init_cache_key }}
          path: |
            ${{ env.TERRAFORM_PATH }}/.terraform
            ${{ env.TERRAFORM_PATH }}/.terraform.lock.hcl

      - name: Setup TFLint plugin cache
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.tflint.d/plugins

      - name: Resolve TFLint config path
        id: tflint-config
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${TFLINT_CONFIG_PATH}" ]; then
            echo "path=${TFLINT_CONFIG_PATH}" >> "$GITHUB_OUTPUT"
          elif [ -f "${TERRAFORM_PATH}/.tflint.hcl" ]; then
            echo "path=${TERRAFORM_PATH}/.tflint.hcl" >> "$GITHUB_OUTPUT"
          elif [ -f ".tflint.hcl" ]; then
            echo "path=.tflint.hcl" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          cache: true
          tflint_config_path: ${{ steps.tflint-config.outputs.path }}
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Exec Terraform init
        id: init
        if: steps.restore-terraform-init.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Cache miss or incomplete modules - initializing Terraform for ${COMPONENT}"
          terraform -chdir="${TERRAFORM_PATH}" init -backend=false -reconfigure

      - name: Exec Terraform fmt check
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TERRAFORM_PATH}" fmt -check -recursive

      - name: Exec Terraform validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TERRAFORM_PATH}" validate

      - name: Exec TFLint init
        shell: bash
        run: |
          set -euo pipefail
          config_path="${{ steps.tflint-config.outputs.path }}"
          if [ -n "${config_path}" ]; then
            tflint --init --config "${config_path}"
          else
            tflint --init
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Exec TFLint
        shell: bash
        run: |
          set -euo pipefail
          config_path="${{ steps.tflint-config.outputs.path }}"
          args=(-f compact --recursive --var-file="${TFVARS_FILE}")
          if [ -n "${config_path}" ]; then
            args+=(--config "${config_path}")
          fi
          tflint "${args[@]}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

  security:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: init
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # https://github.com/aquasecurity/trivy-action/?tab=readme-ov-file#inputs
      - name: Exec Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: 1
          format: table
          scan-ref: .
          scan-type: "fs"
          scanners: license,misconfig,secret,vuln
          severity: HIGH,CRITICAL
          trivy-config: ${{ env.TRIVY_CONFIG }}
          version: ${{ env.TRIVY_VERSION }}

      # https://github.com/aquasecurity/trivy-action/?tab=readme-ov-file#inputs
      - name: Exec Trivy Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: 0
          format: cyclonedx
          output: ${{ env.TERRAFORM_PATH }}/sbom-${{ env.COMPONENT }}-${{ env.ENVIRONMENT }}.json
          scan-ref: .
          scan-type: "fs"
          version: ${{ env.TRIVY_VERSION }}

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ env.COMPONENT }}-${{ env.ENVIRONMENT }}
          path: ${{ env.TERRAFORM_PATH }}/sbom-${{ env.COMPONENT }}-${{ env.ENVIRONMENT }}.json
          retention-days: 30

  plan:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [init]
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}

      - name: Setup Terraform with cache
        shell: bash
        run: |
          set -euo pipefail
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' >~/.terraformrc
          mkdir --parents ~/.terraform.d/plugin-cache

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Restore Cache Terraform plugin cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ needs.init.outputs.tf_plugin_cache_key }}
          path: |
            ~/.terraform.d/plugin-cache

      - name: Restore Cache Terraform init
        id: restore-terraform-init
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ needs.init.outputs.tf_init_cache_key }}
          path: |
            ${{ env.TERRAFORM_PATH }}/.terraform
            ${{ env.TERRAFORM_PATH }}/.terraform.lock.hcl

      - name: Exec Terraform init
        id: init
        if: steps.restore-terraform-init.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Cache miss or incomplete modules - initializing Terraform for ${COMPONENT}"
          terraform -chdir="${TERRAFORM_PATH}" init -reconfigure -backend-config="${TFBACKEND_FILE}"

      - name: Setup tfcmt
        if: ${{ github.event_name == 'pull_request' }}
        uses: y-miyazaki/config/.github/actions/install-github-release@27d12e224bb20d2fdd2edfcafbe5160c348c331a # v1.1.18
        with:
          asset_pattern: "{binary}_linux_amd64.tar.gz"
          binary: tfcmt
          checksum: ${{ env.TFCMT_CHECKSUM }}
          repo: suzuki-shunsuke/tfcmt
          version: ${{ env.TFCMT_VERSION }}

      - name: Exec Terraform plan (PR)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016,SC2086
          if [ -n "$PR_HEAD_SHA" ]; then
            export GITHUB_SHA=$PR_HEAD_SHA
          fi
          tfcmt -repo "${GITHUB_REPOSITORY#*/}" -pr "$PR_NUMBER" plan -- terraform -chdir="${TERRAFORM_PATH}" plan -lock=false -var-file="${TFVARS_FILE}"

      - name: Exec Terraform plan (Push) (deploy=false)
        if: ${{ github.event_name != 'pull_request' && env.DEPLOY == 'false' }}
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TERRAFORM_PATH}" plan -lock=false -var-file="${TFVARS_FILE}"

      - name: Exec Terraform apply (Push) (deploy=true)
        if: ${{ github.event_name != 'pull_request' && env.DEPLOY == 'true' }}
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="${TERRAFORM_PATH}" apply --auto-approve -var-file="${TFVARS_FILE}"

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@27d12e224bb20d2fdd2edfcafbe5160c348c331a # v1.1.18
        with:
          artifacts: |
            (none)
          outputs: |
            (none)
          params: |
            component: ${{ env.COMPONENT }}
            environment: ${{ env.ENVIRONMENT }}
            terraform_path: ${{ env.TERRAFORM_PATH }}
            deploy: ${{ env.DEPLOY }}
          status: "${{ job.status }}"
          title: "${{ format('Terraform CI: {0}', env.COMPONENT) }}"
