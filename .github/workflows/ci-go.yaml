# Reusable workflow: Go CI (test, lint, security)
# Runs Go tests, golangci-lint, govulncheck, and trivy scanning.
name: ci-go

on:
  workflow_call:
    inputs:
      codecov_token:
        description: "Codecov token for private repositories (optional for public repos). If provided, the token will be used to upload coverage."
        required: false
        type: string
      component:
        description: "Logical component name (e.g. base)"
        required: true
        type: string
      go_project_path:
        description: "Path (relative) to the Go project root (directory containing go.mod)"
        required: true
        type: string
      go_version:
        default: "1.26.4"
        description: "Go version to use for setup-go and linting"
        required: false
        type: string
      golangci_lint_version:
        default: "v2.12.2"
        description: "golangci-lint version to use"
        required: false
        type: string
      govulncheck_version:
        default: "v1.1.4"
        description: "govulncheck version to use"
        required: false
        type: string
      trivy_version:
        default: "v0.72.0"
        description: "Trivy version to use"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  COMPONENT: ${{ inputs.component }}
  GOLANGCI_LINT_VERSION: ${{ inputs.golangci_lint_version }}
  GOVULNCHECK_VERSION: ${{ inputs.govulncheck_version }}
  GO_PROJECT_PATH: ${{ inputs.go_project_path }}
  GO_VERSION: ${{ inputs.go_version }}
  TRIVY_VERSION: ${{ inputs.trivy_version }}

jobs:
  precheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version: ${{ env.GO_VERSION }}

      - name: Determine Go cache paths
        id: go-cache-paths
        working-directory: ${{ env.GO_PROJECT_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "gomodcache=$(go env GOMODCACHE)"
            echo "gocache=$(go env GOCACHE)"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Go build and module caches
        id: go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles(format('{0}/go.mod', env.GO_PROJECT_PATH), format('{0}/go.sum', env.GO_PROJECT_PATH)) }}
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          restore-keys: |
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-

      - name: Download Go Modules
        if: steps.go-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.GO_PROJECT_PATH }}
        run: go mod download

      - name: Exec go mod tidy
        shell: bash
        run: |
          set -euo pipefail
          cd "${GO_PROJECT_PATH}"
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum are not tidy. Run 'go mod tidy' locally and commit the changes."
            exit 1
          fi

  test:
    needs: precheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      CODECOV_TOKEN: ${{ inputs.codecov_token }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version: ${{ env.GO_VERSION }}

      - name: Determine Go cache paths
        id: go-cache-paths
        working-directory: ${{ env.GO_PROJECT_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "gomodcache=$(go env GOMODCACHE)"
            echo "gocache=$(go env GOCACHE)"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Go build and module caches
        id: go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles(format('{0}/go.mod', env.GO_PROJECT_PATH), format('{0}/go.sum', env.GO_PROJECT_PATH)) }}
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          restore-keys: |
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-

      - name: Download Go Modules
        if: steps.go-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.GO_PROJECT_PATH }}
        run: go mod download

      - name: Exec Go Tests (with race + coverage)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage
          go test ./... -race -count=1 -covermode=atomic -coverprofile=coverage/coverage.out
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt
        working-directory: ${{ env.GO_PROJECT_PATH }}

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ env.COMPONENT }}
          path: ${{ env.GO_PROJECT_PATH }}/coverage
          retention-days: 30

      - name: Determine repository visibility
        id: repo_visibility
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            return data.private ? 'true' : 'false';

      - name: Upload to Codecov
        if: ${{ (steps.repo_visibility.outputs.result != 'true') || (env.CODECOV_TOKEN != '') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          files: ${{ env.GO_PROJECT_PATH }}/coverage/coverage.out
          token: ${{ env.CODECOV_TOKEN }}
          use_oidc: true

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@dac927215f6eda487c6009ca943ae385153e0688 # v1.8.1
        with:
          artifacts: |
            coverage-${{ env.COMPONENT }}
          outputs: |
            (none)
          params: |
            component: ${{ env.COMPONENT }}
            task: test
          status: "${{ job.status }}"
          title: "${{ format('Go CI: {0} ({1})', env.COMPONENT, 'test') }}"

  lint:
    needs: precheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version: ${{ env.GO_VERSION }}

      - name: Determine Go cache paths
        id: go-cache-paths
        working-directory: ${{ env.GO_PROJECT_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "gomodcache=$(go env GOMODCACHE)"
            echo "gocache=$(go env GOCACHE)"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Go build and module caches
        id: go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles(format('{0}/go.mod', env.GO_PROJECT_PATH), format('{0}/go.sum', env.GO_PROJECT_PATH)) }}
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          restore-keys: |
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-

      - name: Download Go Modules
        if: steps.go-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.GO_PROJECT_PATH }}
        run: go mod download

      - name: Configure git auth
        if: github.event_name == 'pull_request'
        uses: y-miyazaki/config/.github/actions/git-auth@dac927215f6eda487c6009ca943ae385153e0688 # v1.8.1
        with:
          operation: configure
          token: ${{ github.token }}

      - name: Exec GolangCI-Lint via reviewdog (PR inline comments)
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          cache: false
          fail_level: error
          filter_mode: file
          github_token: ${{ github.token }}
          go_version: ${{ env.GO_VERSION }}
          golangci_lint_flags: "--new-from-rev=origin/${{ env.PR_BASE_REF }}"
          golangci_lint_version: ${{ env.GOLANGCI_LINT_VERSION }}
          level: error
          reporter: github-pr-review
          workdir: ${{ env.GO_PROJECT_PATH }}

      - name: Exec Enforce golangci-lint (non-PR)
        if: github.event_name != 'pull_request'
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: --max-same-issues=0 --max-issues-per-linter=0
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ env.GO_PROJECT_PATH }}

      - name: Clear git auth
        if: always() && github.event_name == 'pull_request'
        uses: y-miyazaki/config/.github/actions/git-auth@dac927215f6eda487c6009ca943ae385153e0688 # v1.8.1
        with:
          operation: clear
          token: ${{ github.token }}

      - name: Post PR failure comment
        if: failure() && github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifacts = [
              `coverage-${process.env.COMPONENT}`,
              `govulncheck-${process.env.COMPONENT}`,
              `sbom-${process.env.COMPONENT}`,
            ].join('\n- ');
            const body = `❌ Go CI failed for component: ${process.env.COMPONENT}\n\n`+
              `Run page (artifacts available): ${runUrl}\n\n`+
              `Artifacts:\n- ${artifacts}\n\n`+
              `See inline PR review comments from golangci-lint (via reviewdog) for details.\n\n`+
              `Re-run guidance:\n- Fix issues locally\n- Commit & push to trigger CI again.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@dac927215f6eda487c6009ca943ae385153e0688 # v1.8.1
        with:
          artifacts: |
            (none)
          outputs: |
            (none)
          params: |
            component: ${{ env.COMPONENT }}
            task: lint
          status: "${{ job.status }}"
          title: "${{ format('Go CI: {0} ({1})', env.COMPONENT, 'lint') }}"

  security:
    needs: precheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version: ${{ env.GO_VERSION }}

      - name: Determine Go cache paths
        id: go-cache-paths
        working-directory: ${{ env.GO_PROJECT_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "gomodcache=$(go env GOMODCACHE)"
            echo "gocache=$(go env GOCACHE)"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Go build and module caches
        id: go-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-${{ hashFiles(format('{0}/go.mod', env.GO_PROJECT_PATH), format('{0}/go.sum', env.GO_PROJECT_PATH)) }}
          path: |
            ${{ steps.go-cache-paths.outputs.gomodcache }}
            ${{ steps.go-cache-paths.outputs.gocache }}
          restore-keys: |
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-${{ env.GO_VERSION }}-
            go-cache-${{ env.COMPONENT }}-${{ runner.os }}-

      - name: Download Go Modules
        if: steps.go-cache.outputs.cache-hit != 'true'
        shell: bash
        working-directory: ${{ env.GO_PROJECT_PATH }}
        run: go mod download

      - name: Setup govulncheck
        working-directory: ${{ env.GO_PROJECT_PATH }}
        shell: bash
        run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      # Do not fail the job on vulnerabilities; save reports as artifacts instead
      - name: Exec govulncheck (no-fail, save artifacts)
        working-directory: ${{ env.GO_PROJECT_PATH }}
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p security
          # JSON report for machine processing
          govulncheck -format=json ./... > "security/govulncheck-${COMPONENT}.json" || true
          # Text report for easy reading
          govulncheck ./... > "security/govulncheck-${COMPONENT}.txt" || true

      - name: Upload govulncheck Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: govulncheck-${{ env.COMPONENT }}
          path: ${{ env.GO_PROJECT_PATH }}/security
          retention-days: 30

      # https://github.com/aquasecurity/trivy-action/?tab=readme-ov-file#inputs
      - name: Exec Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: 1
          format: table
          scan-ref: .
          scan-type: "fs"
          scanners: license,misconfig,secret,vuln
          severity: HIGH,CRITICAL
          trivy-config: trivy.yaml
          version: ${{ env.TRIVY_VERSION }}

      # https://github.com/aquasecurity/trivy-action/?tab=readme-ov-file#inputs
      - name: Exec Trivy Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          exit-code: 0
          format: cyclonedx
          output: ${{ env.GO_PROJECT_PATH }}/sbom-${{ env.COMPONENT }}.json
          scan-ref: .
          scan-type: "fs"
          version: ${{ env.TRIVY_VERSION }}

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ env.COMPONENT }}
          path: ${{ env.GO_PROJECT_PATH }}/sbom-${{ env.COMPONENT }}.json
          retention-days: 30

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@dac927215f6eda487c6009ca943ae385153e0688 # v1.8.1
        with:
          artifacts: |
            govulncheck-${{ env.COMPONENT }}
            sbom-${{ env.COMPONENT }}
          outputs: |
            (none)
          params: |
            component: ${{ env.COMPONENT }}
            task: security
          status: "${{ job.status }}"
          title: "${{ format('Go CI: {0} ({1})', env.COMPONENT, 'security') }}"
