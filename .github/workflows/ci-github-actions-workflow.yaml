# Reusable workflow: GitHub Actions workflow lint and validation
# Uses actionlint, ghalint, and zizmor for syntax, security, and static analysis.
name: ci-github-actions-workflow

on:
  workflow_call:
    inputs:
      actionlint_checksum:
        default: "233b280d05e100837f4af1433c7b40a5dcb306e3aa68fb4f17f8a7f45a7df7b4" # pragma: allowlist secret
        # To get checksum: curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.9/actionlint_linux_amd64.tar.gz" | sha256sum | awk '{print $1}'
        description: "SHA256 checksum for actionlint release tarball"
        required: false
        type: string
      actionlint_version:
        default: "1.7.9"
        description: "actionlint version to use"
        required: false
        type: string
      ghalint_checksum:
        default: "977555b7142cc057aad4663679772510a9ed3f1687f26f2359d18bb6b67314fe" # pragma: allowlist secret
        # To get checksum: curl -sL "https://github.com/suzuki-shunsuke/ghalint/releases/download/v1.5.4/ghalint_linux_amd64.tar.gz" | sha256sum | awk '{print $1}'
        description: "SHA256 checksum for ghalint release tarball"
        required: false
        type: string
      ghalint_version:
        default: "1.5.4"
        description: "ghalint version to use"
        required: false
        type: string
      zizmor_version:
        default: "1.25.2"
        description: "zizmor version to use"
        required: false
        type: string

permissions:
  contents: read

env:
  ACTIONLINT_CHECKSUM: ${{ inputs.actionlint_checksum }}
  ACTIONLINT_VERSION: ${{ inputs.actionlint_version }}
  GHALINT_CHECKSUM: ${{ inputs.ghalint_checksum }}
  GHALINT_VERSION: ${{ inputs.ghalint_version }}
  ZIZMOR_VERSION: ${{ inputs.zizmor_version }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # GitHub Actions workflow linter
      - name: Setup actionlint
        uses: y-miyazaki/config/.github/actions/install-github-release@bd3c5a4687c38c0b150bd068d869290b9d6bc353 # v1.1.32
        with:
          binary: actionlint
          checksum: ${{ env.ACTIONLINT_CHECKSUM }}
          repo: rhysd/actionlint
          version: ${{ env.ACTIONLINT_VERSION }}

      # Security and settings validation (persist-credentials, timeout-minutes, etc.)
      - name: Setup ghalint
        uses: y-miyazaki/config/.github/actions/install-github-release@bd3c5a4687c38c0b150bd068d869290b9d6bc353 # v1.1.32
        with:
          binary: ghalint
          checksum: ${{ env.GHALINT_CHECKSUM }}
          repo: suzuki-shunsuke/ghalint
          version: ${{ env.GHALINT_VERSION }}

      - name: Exec actionlint
        shell: bash
        run: actionlint -color -oneline

      - name: Exec ghalint
        shell: bash
        run: ghalint run
        continue-on-error: true

      # Static analysis tool for GitHub Actions security
      - name: Exec zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          min-severity: medium
          version: ${{ env.ZIZMOR_VERSION }}

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@bd3c5a4687c38c0b150bd068d869290b9d6bc353 # v1.1.32
        with:
          artifacts: |
            (none)
          params: |
            actionlint_version: ${{ env.ACTIONLINT_VERSION }}
            ghalint_version: ${{ env.GHALINT_VERSION }}
            zizmor_version: ${{ env.ZIZMOR_VERSION }}
          status: "${{ job.status }}"
          title: "GitHub Actions Workflow Lint"
