# CI workflow: mise lockfile update on push
# Usage: This workflow requires a GitHub App for auto-committing lockfile updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Create the following secrets (repository or environment):
#    - BOT_APP_CLIENT_ID: The GitHub App's Client ID
#    - BOT_APP_PRIVATE_KEY: The GitHub App's private key (PEM format)
name: on-ci-push-mise-update-lock

on:
  push:
    paths:
      - "mise.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mise-update-lock:
    uses: y-miyazaki/config/.github/workflows/ci-mise-update-lock.yaml@85cdd8420d16e571381c9add44e005d230a7d5a4 # v1.8.17
    permissions:
      contents: read
    with:
      environment: "default"
      mise_version: "2026.6.13"
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
