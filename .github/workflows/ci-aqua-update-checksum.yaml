# Reusable workflow: Aqua checksum update
# Updates aqua-checksums.json and auto-commits via GitHub App.
# Requires: BOT_APP_PRIVATE_KEY and BOT_APP_CLIENT_ID secrets.
name: ci-aqua-update-checksum

on:
  workflow_call:
    inputs:
      aqua_version:
        default: "v2.58.1"
        description: "aqua version to use"
        required: false
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
    secrets:
      BOT_APP_PRIVATE_KEY:
        description: "GitHub App private key for auto commit"
        required: true
      BOT_APP_CLIENT_ID:
        description: "GitHub App Client for auto commit"
        required: true

permissions: {}

jobs:
  update-checksum:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    concurrency:
      group: aqua-update-checksum-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: ${{ inputs.aqua_version }}

      - name: Fix aqua-checksums.json
        shell: bash
        run: aqua upc -prune

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          permission-contents: write
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Configure git auth
        uses: y-miyazaki/config/.github/actions/git-auth@fe15f0d44ed1c7a34b2388b5dd7340542c3393c0 # v1.8.17
        with:
          operation: configure
          token: ${{ steps.app-token.outputs.token }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: ${{ github.head_ref || github.ref_name }}
          commit_message: "chore(ci): update aqua checksums"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_user_name: "repo-maintenance-bot[app]"
          file_pattern: aqua-checksums.json

      - name: Clear git auth
        if: always()
        uses: y-miyazaki/config/.github/actions/git-auth@fe15f0d44ed1c7a34b2388b5dd7340542c3393c0 # v1.8.17
        with:
          operation: clear
          token: ${{ steps.app-token.outputs.token }}

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@fe15f0d44ed1c7a34b2388b5dd7340542c3393c0 # v1.8.17
        with:
          params: |
            aqua_version: ${{ inputs.aqua_version }}
            environment: ${{ inputs.environment }}
          status: "${{ job.status }}"
          title: "Aqua Update Checksum"
