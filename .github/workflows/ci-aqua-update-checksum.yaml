# Reusable workflow: Aqua checksum update
# Updates aqua-checksums.json and auto-commits via GitHub App.
# Requires: BOT_APP_PRIVATE_KEY and BOT_APP_CLIENT_ID secrets.
name: ci-aqua-update-checksum

on:
  workflow_call:
    inputs:
      aqua_version:
        default: "v2.58.1"
        description: "aqua version to use"
        required: false
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
    secrets:
      BOT_APP_PRIVATE_KEY:
        description: "GitHub App private key for auto commit"
        required: true
      BOT_APP_CLIENT_ID:
        description: "GitHub App Client for auto commit"
        required: true

permissions: {}

jobs:
  update-checksum:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    concurrency:
      group: aqua-update-checksum-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: ${{ inputs.aqua_version }}

      - name: Fix aqua-checksums.json
        run: aqua upc -prune

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Configure git auth
        uses: y-miyazaki/config/.github/actions/git-auth@ae434803ee16c58a449f5e1b925db1097687a556 # v1.0.8
        with:
          operation: configure
          token: ${{ steps.app-token.outputs.token }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(ci): update aqua checksums"
          commit_user_name: "repo-maintenance-bot[app]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: aqua-checksums.json

      - name: Clear git auth
        if: always()
        uses: y-miyazaki/config/.github/actions/git-auth@ae434803ee16c58a449f5e1b925db1097687a556 # v1.0.8
        with:
          operation: clear
          token: ${{ steps.app-token.outputs.token }}

      - name: Summary
        if: always()
        uses: y-miyazaki/config/.github/actions/summary@ae434803ee16c58a449f5e1b925db1097687a556 # v1.0.8
        with:
          params: |
            aqua_version: ${{ inputs.aqua_version }}
            environment: ${{ inputs.environment }}
          status: "${{ job.status }}"
          title: "Aqua Update Checksum"
