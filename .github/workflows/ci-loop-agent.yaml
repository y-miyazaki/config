# Reusable workflow: Loop agent execution
# L1: single read-only agent session (loop-agent-once)
# L2/L3: worktree + bounded Agent→Verify loop (loop-execute)
#
# Contract (L2/L3): outputs { branch, has_changes, verdict, reason, attempts }
name: ci-loop-agent

on:
  workflow_call:
    inputs:
      agent_implementer_max_turns:
        default: "5"
        description: "Maximum implementer agent turns per loop attempt"
        required: false
        type: string
      agent_implementer_model:
        default: ""
        description: "Implementer model override"
        required: false
        type: string
      agent_loop_max_attempts:
        default: "3"
        description: "Maximum Agent→Verify loop attempts (L2/L3)"
        required: false
        type: string
      agent_verifier_criteria:
        default: ""
        description: "Domain-specific APPROVE/REJECT criteria (L2/L3)"
        required: false
        type: string
      agent_verifier_max_turns:
        default: "3"
        description: "Maximum verifier agent turns (L2/L3)"
        required: false
        type: string
      agent_verifier_model:
        default: ""
        description: "Verifier model override (L2/L3)"
        required: false
        type: string
      allowlist:
        default: ""
        description: "Comma-separated glob allowlist for verifier (L2/L3)"
        required: false
        type: string
      base_branch:
        default: "main"
        description: "Base branch for verify diff (L2/L3)"
        required: false
        type: string
      branch_prefix:
        default: "loop"
        description: "Worktree branch prefix (L2/L3)"
        required: false
        type: string
      cli_version:
        default: "latest"
        description: "CLI agent version"
        required: false
        type: string
      commit_message:
        default: "chore: loop-automated update"
        description: "Commit message prefix for loop attempts (L2/L3)"
        required: false
        type: string
      denylist:
        default: "**/.env,**/credentials*,**/secrets*,**/migration/*.sql,**/infrastructure/**"
        description: "Comma-separated path denylist for verifier (L2/L3)"
        required: false
        type: string
      engine:
        description: "AI engine (claude | copilot | codex | cursor)"
        required: true
        type: string
      infer_files_pattern:
        default: ""
        description: "Optional extended-regex to infer file paths from verifier text (L2/L3)"
        required: false
        type: string
      level:
        default: "L1"
        description: "Loop level: L1 (read-only), L2 (edits with branch), or L3 (edits with auto-merge)"
        required: false
        type: string
      no_changes_verdict:
        default: "APPROVE"
        description: "Verdict when implementer produces no file changes (APPROVE or REJECT, L2/L3)"
        required: false
        type: string
      prompt_file:
        default: ""
        description: "Path to prompt file (alternative to prompt_text)"
        required: false
        type: string
      prompt_implementer_feedback:
        default: ""
        description: "Implementer retry prompt template (L2/L3). Placeholders: {{base_prompt}}, {{feedback}}"
        required: false
        type: string
      prompt_text:
        default: ""
        description: "Inline prompt text (used if prompt_file is empty)"
        required: false
        type: string
      prompt_verifier_default_criteria:
        default: ""
        description: "Default verifier criteria when agent_verifier_criteria is empty (L2/L3)"
        required: false
        type: string
      prompt_verifier_initial:
        default: ""
        description: "Verifier INITIAL mode intro (L2/L3). Placeholder: {{attempt}}"
        required: false
        type: string
      prompt_verifier_output_contract:
        default: ""
        description: "Verifier JSON output contract (L2/L3)"
        required: false
        type: string
      prompt_verifier_regression:
        default: ""
        description: "Verifier REGRESSION mode body (L2/L3). Placeholders: {{attempt}}, {{open_rejections}}, {{attempt_delta}}"
        required: false
        type: string
      prompt_verifier_task:
        default: ""
        description: "Verifier task section before criteria (L2/L3)"
        required: false
        type: string
      skill_name:
        default: ""
        description: "Skill name (used for L2 branch naming)"
        required: false
        type: string
      verifier_context:
        default: ""
        description: "Additional verifier context such as CI logs or lint output (L2/L3)"
        required: false
        type: string
    outputs:
      attempts:
        description: "Number of Agent→Verify attempts (L2/L3)"
        value: ${{ jobs.agent-l2.outputs.attempts || '0' }}
      branch:
        description: "Branch with changes (L2 only, empty if L1 or no changes)"
        value: ${{ jobs.agent-l2.outputs.branch || '' }}
      has_changes:
        description: "Whether agent produced file changes (L2 only)"
        value: ${{ jobs.agent-l2.outputs.has_changes || 'false' }}
      open_rejections:
        description: "JSON array of unresolved structured rejections (L2/L3)"
        value: ${{ jobs.agent-l2.outputs.open_rejections || '[]' }}
      reason:
        description: "Final verifier reason (L2/L3)"
        value: ${{ jobs.agent-l2.outputs.reason || '' }}
      usage_json:
        description: "Measured token usage JSON (L2/L3)"
        value: ${{ jobs.agent-l2.outputs.usage_json || '' }}
      verdict:
        description: "Final verifier verdict APPROVE/REJECT (L2/L3)"
        value: ${{ jobs.agent-l2.outputs.verdict || '' }}
    secrets:
      AGENT_TOKEN:
        description: "Authentication token for the selected engine"
        required: true
      GH_TOKEN_PUSH:
        description: "GitHub token with push permission (required for L2)"
        required: false

permissions:
  contents: read
  copilot-requests: write

jobs:
  agent-l1:
    if: inputs.level == 'L1'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      copilot-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Agent Once
        uses: y-miyazaki/config/.github/actions/loop-agent-once@6aaff31f3fd826188a4f18443701b582215e9276 # v1.7.8
        with:
          agent_token: ${{ secrets.AGENT_TOKEN }}
          cli_version: ${{ inputs.cli_version }}
          engine: ${{ inputs.engine }}
          max_turns: ${{ inputs.agent_implementer_max_turns }}
          model: ${{ inputs.agent_implementer_model }}
          prompt_text: ${{ inputs.prompt_file != '' && format('/skill {0}', inputs.prompt_file) || inputs.prompt_text }}

  agent-l2:
    if: inputs.level == 'L2' || inputs.level == 'L3'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      attempts: ${{ steps.execute.outputs.attempts }}
      branch: ${{ steps.worktree.outputs.branch }}
      has_changes: ${{ steps.execute.outputs.has_changes }}
      open_rejections: ${{ steps.execute.outputs.open_rejections }}
      reason: ${{ steps.execute.outputs.reason }}
      usage_json: ${{ steps.execute.outputs.usage_json }}
      verdict: ${{ steps.execute.outputs.verdict }}
    permissions:
      contents: write
      copilot-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Worktree
        id: worktree
        uses: y-miyazaki/config/.github/actions/loop-worktree-setup@6aaff31f3fd826188a4f18443701b582215e9276 # v1.7.8
        with:
          branch_prefix: ${{ inputs.branch_prefix }}
          skill_name: ${{ inputs.skill_name }}
          token: ${{ secrets.GH_TOKEN_PUSH || github.token }}

      - name: Execute Bounded Loop
        id: execute
        uses: y-miyazaki/config/.github/actions/loop-execute@6aaff31f3fd826188a4f18443701b582215e9276 # v1.7.8
        with:
          agent_implementer_max_turns: ${{ inputs.agent_implementer_max_turns }}
          agent_implementer_model: ${{ inputs.agent_implementer_model }}
          agent_loop_max_attempts: ${{ inputs.agent_loop_max_attempts }}
          agent_token: ${{ secrets.AGENT_TOKEN }}
          agent_verifier_criteria: ${{ inputs.agent_verifier_criteria }}
          agent_verifier_max_turns: ${{ inputs.agent_verifier_max_turns }}
          agent_verifier_model: ${{ inputs.agent_verifier_model }}
          allowlist: ${{ inputs.allowlist }}
          base_branch: ${{ inputs.base_branch }}
          branch: ${{ steps.worktree.outputs.branch }}
          cli_version: ${{ inputs.cli_version }}
          commit_message: ${{ inputs.commit_message }}
          denylist: ${{ inputs.denylist }}
          engine: ${{ inputs.engine }}
          infer_files_pattern: ${{ inputs.infer_files_pattern }}
          no_changes_verdict: ${{ inputs.no_changes_verdict }}
          prompt_implementer_feedback: ${{ inputs.prompt_implementer_feedback }}
          prompt_text: ${{ inputs.prompt_file != '' && format('/skill {0}', inputs.prompt_file) || inputs.prompt_text }}
          prompt_verifier_default_criteria: ${{ inputs.prompt_verifier_default_criteria }}
          prompt_verifier_initial: ${{ inputs.prompt_verifier_initial }}
          prompt_verifier_output_contract: ${{ inputs.prompt_verifier_output_contract }}
          prompt_verifier_regression: ${{ inputs.prompt_verifier_regression }}
          prompt_verifier_task: ${{ inputs.prompt_verifier_task }}
          skill_name: ${{ inputs.skill_name }}
          token: ${{ secrets.GH_TOKEN_PUSH || github.token }}
          verifier_context: ${{ inputs.verifier_context }}
          worktree_path: ${{ steps.worktree.outputs.worktree_path }}

