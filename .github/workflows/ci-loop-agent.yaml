# Reusable workflow: Loop agent execution
# Invokes an AI agent with a prompt via the unified loop-agent-run action.
# Supports L1 (read-only report) and L2 (branch creation with edits).
#
# Architecture:
#   - L1: Agent runs read-only on the repo
#   - L2 Claude: claude-code-action manages branch internally (branch_prefix)
#   - L2 CLI: worktree isolation with loop-worktree-setup/push
#
# Contract: L2 outputs { branch, has_changes } regardless of engine.
name: ci-loop-agent

on:
  workflow_call:
    inputs:
      cli_version:
        default: "latest"
        description: "CLI agent version (copilot/codex engine)"
        required: false
        type: string
      engine:
        description: "AI engine (claude | copilot | codex)"
        required: true
        type: string
      level:
        default: "L1"
        description: "Loop level: L1 (read-only), L2 (edits with branch), or L3 (edits with auto-merge)"
        required: false
        type: string
      max_turns:
        default: "5"
        description: "Maximum agent conversation turns"
        required: false
        type: string
      model:
        default: ""
        description: "Optional model override"
        required: false
        type: string
      prompt_file:
        default: ""
        description: "Path to prompt file (alternative to prompt_text)"
        required: false
        type: string
      prompt_text:
        default: ""
        description: "Inline prompt text (used if prompt_file is empty)"
        required: false
        type: string
      skill_name:
        default: ""
        description: "Skill name (used for L2 branch naming)"
        required: false
        type: string
    outputs:
      branch:
        description: "Branch with changes (L2 only, empty if L1 or no changes)"
        value: ${{ jobs.agent-claude-l2.outputs.branch || jobs.agent-cli-l2.outputs.branch || '' }}
      has_changes:
        description: "Whether agent produced file changes (L2 only)"
        value: ${{ jobs.agent-claude-l2.outputs.has_changes || jobs.agent-cli-l2.outputs.has_changes || 'false' }}
    secrets:
      AGENT_TOKEN:
        description: "Authentication token for the selected engine (ANTHROPIC_API_KEY for claude, COPILOT_GITHUB_TOKEN for copilot, OPENAI_API_KEY for codex)"
        required: true
      GH_TOKEN_PUSH:
        description: "GitHub token with push permission (required for L2)"
        required: false

permissions:
  contents: read
  copilot-requests: write

jobs:
  # ============================================================
  # L1 (read-only, report mode)
  # ============================================================
  agent-l1:
    if: inputs.level == 'L1'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      copilot-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Agent
        uses: y-miyazaki/config/.github/actions/loop-agent-run@d83036476eb26965baac7cbab152125f1b1985cc # v1.4.6
        with:
          agent_token: ${{ secrets.AGENT_TOKEN }}
          cli_version: ${{ inputs.cli_version }}
          engine: ${{ inputs.engine }}
          max_turns: ${{ inputs.max_turns }}
          model: ${{ inputs.model }}
          prompt_text: ${{ inputs.prompt_file != '' && format('/skill {0}', inputs.prompt_file) || inputs.prompt_text }}

  # ============================================================
  # L2: Claude (Action-managed branch)
  # ============================================================
  agent-claude-l2:
    if: inputs.engine == 'claude' && (inputs.level == 'L2' || inputs.level == 'L3')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      branch: ${{ steps.result.outputs.branch }}
      has_changes: ${{ steps.result.outputs.has_changes }}
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GH_TOKEN_PUSH || github.token }}

      - name: Run Claude Code Action (L2)
        id: claude
        uses: anthropics/claude-code-action@80b31826338489861333dc17217865dfe8085cdc # v1.0.155
        with:
          anthropic_api_key: ${{ secrets.AGENT_TOKEN }}
          branch_prefix: "loop/${{ inputs.skill_name }}/"
          claude_args: "--max-turns ${{ inputs.max_turns }}${{ inputs.model != '' && format(' --model {0}', inputs.model) || '' }}"
          github_token: ${{ secrets.GH_TOKEN_PUSH || github.token }}
          prompt: ${{ inputs.prompt_file != '' && format('/skill {0}', inputs.prompt_file) || inputs.prompt_text }}

      - name: Extract Result
        id: result
        shell: bash
        env:
          BRANCH_NAME: ${{ steps.claude.outputs.branch_name }}
        run: |
          set -euo pipefail
          if [[ -n "${BRANCH_NAME}" ]]; then
            echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ============================================================
  # L2: CLI engines (worktree isolation)
  # ============================================================
  agent-cli-l2:
    if: inputs.engine != 'claude' && (inputs.level == 'L2' || inputs.level == 'L3')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      branch: ${{ steps.worktree.outputs.branch }}
      has_changes: ${{ steps.push.outputs.has_changes }}
    permissions:
      contents: write
      copilot-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Worktree
        id: worktree
        uses: y-miyazaki/config/.github/actions/loop-worktree-setup@d83036476eb26965baac7cbab152125f1b1985cc # v1.4.6
        with:
          skill_name: ${{ inputs.skill_name }}
          token: ${{ secrets.GH_TOKEN_PUSH || github.token }}

      - name: Run Agent
        uses: y-miyazaki/config/.github/actions/loop-agent-run@d83036476eb26965baac7cbab152125f1b1985cc # v1.4.6
        with:
          agent_token: ${{ secrets.AGENT_TOKEN }}
          cli_version: ${{ inputs.cli_version }}
          engine: ${{ inputs.engine }}
          max_turns: ${{ inputs.max_turns }}
          model: ${{ inputs.model }}
          prompt_text: ${{ inputs.prompt_file != '' && format('/skill {0}', inputs.prompt_file) || inputs.prompt_text }}
          working_directory: ${{ steps.worktree.outputs.worktree_path }}

      - name: Push Changes
        id: push
        uses: y-miyazaki/config/.github/actions/loop-worktree-push@d83036476eb26965baac7cbab152125f1b1985cc # v1.4.6
        with:
          branch: ${{ steps.worktree.outputs.branch }}
          token: ${{ secrets.GH_TOKEN_PUSH || github.token }}
          worktree_path: ${{ steps.worktree.outputs.worktree_path }}
